ear": "R3-4D", "category": "健康保険組合"}, {"id": 670, "question": "健康保険組合は、組合会議員の定数の4分の3以上の多数による議決があったときは、厚生労働大臣の認可を受けて解散することができる。", "answer": true, "explanation": "法26条1項、2項。組合の任意解散における議決要件（4分の3以上）及び大臣認可に関する正しい記述である。[Source 3, p.144]", "year": "R3-4E", "category": "健康保険組合"}, {"id": 671, "question": "臓器移植を必要とする被保険者が国内における待機状況を考慮すると海外で移植を受けない限りは生命の維持が不可能となる恐れが高い場合には、海外において療養等を受けた場合に支給される療養費の「保険者がやむを得ないものと認めるとき」に該当する場合と判断できる。", "answer": true, "explanation": "法87条1項、通知。やむを得ない理由による海外受診として療養費の支給が認められるケースに関する正しい記述である。[Source 3, p.146-問6]", "year": "R2", "category": "療養費"}, {"id": 672, "question": "被保険者は、被保険者又はその被扶養者が40歳に達することにより介護保険第2号被保険者に該当するに至ったときは、遅滞なく、所定の事項を記載した届書を提出しなければならない（1日生まれを除く）。", "answer": false, "explanation": "則41条1項。40歳に達したことによる該当については、年齢により判別可能なため、原則として届出は不要である。[Source 3, p.65-問7]", "year": "R2", "category": "資格の得喪の確認及び届出等"}, {"id": 673, "question": "指定訪問看護事業者が、訪問看護事業所の看護師等の従業者について、厚生労働省令で定める基準や員数を満たすことができなくなったとしても、厚生労働大臣は指定訪問看護事業者の指定を取り消すことはできない。", "answer": false, "explanation": "法95条1号。従業者の員数等の基準を満たさなくなった場合は、厚生労働大臣は指定を取り消すことができる。[Source 3, p.134-問5]", "year": "R2", "category": "指定訪問看護事業者"}, {"id": 674, "question": "高額療養費は公的医療保険による医療費だけを算定の対象にするのではなく、食事療養標準負担額、生活療養標準負担額又は保険外併用療養に係る自己負担分についても算定の対象とされている。", "answer": false, "explanation": "法115条、令41条。高額療養費は保険による医療費のみを対象としており、食事・生活療養の標準負担額や保険外併用療養費の自己負担分は対象外である。[Source 3, p.156-問4]", "year": "R2", "category": "高額療養費"}, {"id": 675, "question": "定期健康診断によって初めて結核症と診断された患者について、その時のツベルクリン反応、血沈検査、エックス線検査等の費用は保険給付の対象とはならない。", "answer": true, "explanation": "法63条1項、通知。健康診断そのものは保険対象外であるが、診断の結果必要となった検査等は療養の給付の対象となるが、本肢のケースは健康診断の一環とみなされ対象外とする取扱いの通りである。[Source 3, p.138-問1]", "year": "R2", "category": "療養の給付"}, {"id": 676, "question": "患者申出療養の申出は、中央社会保険医療協議会に対し、当該申出に係る療養を行う臨床研究中核病院の開設者の意見書その他必要な書類を添えて行うものとする。", "answer": false, "explanation": "法63条4項。患者申出療養の申出先は「厚生労働大臣」であり、中央社会保険医療協議会ではない。[Source 3, p.144-問2]", "year": "R2", "category": "保険外併用療養費"}, {"id": 677, "question": "社会保険診療報酬支払基金に委託して行う診療報酬の審査及び支払に要する費用は、保険者が負担する。", "answer": true, "explanation": "法76条4項。診療報酬の審査支払事務に係る手数料等の費用負担に関する規定通りの内容である。[Source 3, p.140-問11]", "year": "R2", "category": "療養の給付"}, {"id": 678, "question": "新たに適用事業所に使用されることになった者が、当初から自宅待機とされた場合の被保険者資格については、雇用契約が成立しており、かつ、休業手当が支払われているときは、その休業手当の支払いの対象となった日の初日に被保険者の資格を取得するものとされる。", "answer": true, "explanation": "法35条、通知。使用関係が認められる（休業手当の支払がある等）場合は、自宅待機中であっても資格を取得する。[Source 3, p.154-問24]", "year": "R2", "category": "一般の被保険者等"}, {"id": 679, "question": "実際には労務を提供せず労務の対償として報酬の支払いを受けていないにもかかわらず、偽って被保険者の資格を取得した者が、保険給付を受けたときには、その資格を取り消し、それまで受けた保険給付に要した費用を返還させることとされている。", "answer": true, "explanation": "法3条1項、法58条1項。架空の資格取得による給付は不当利得であり、遡及して資格取消および給付費の返還請求が行われる。[Source 3, p.164-問25]", "year": "R2", "category": "一般の被保険者等"}, {"id": 680, "question": "被保険者が道路交通法違反である無免許運転により起こした事故のため死亡した場合には、所定の要件を満たす者に埋葬料が支給される。", "answer": true, "explanation": "法116条、通知。犯罪行為等による死亡であっても、埋葬料は支給されるとする運用の通りである。[Source 3, p.194-問3]", "year": "R2", "category": "給付制限・損害賠償との調整"}, {"id": 681, "question": "日雇特例被保険者が療養の給付を受けるには、これを受ける日において、当該日の属する月の前2か月間に通算して26日分以上又は当該日の属する月の前6か月間に通算して78日分以上の保険料が納付されていなければならない。", "answer": true, "explanation": "法129条2項1号。日雇特例被保険者の受給要件（前2月26日分または前6月78日分）に関する規定通りである。[Source 3, p.204-問1]", "year": "R2", "category": "日雇特例被保険者"}, {"id": 682, "question": "厚生労働大臣は、保険医療機関若しくは保険薬局又は指定訪問看護事業者の指定に関し必要があると認めるときは、当該指定に係る開設者若しくは管理者又は申請者の社会保険料の納付状況につき、当該社会保険料を徴収する者に対し、必要な書類の閲覧又は資料の提供を求めることができる。", "answer": true, "explanation": "法199条2項。指定に際しての社会保険料の納付状況確認に関する正しい規定である。[Source 3, p.231-問7]", "year": "R2", "category": "保険医療機関及び保険薬局等"}, {"id": 683, "question": "保険者は、被保険者又は被保険者であった者が、自己の故意の犯罪行為により、又は故意に給付事由を生じさせたときは、当該給付事由に係る保険給付は行わない。", "answer": true, "explanation": "法116条。故意の犯罪行為等による絶対的給付制限に関する規定通りの内容である。[Source 3, p.194-問1]", "year": "R2", "category": "給付制限・損害賠償との調整"}, {"id": 684, "question": "育児休業取得中の被保険者について、給与の支払いがいっさいない育児休業取得中の期間において昇給があり、固定的賃金に変動があった場合、育児休業取得中であっても随時改定が行われる。", "answer": false, "explanation": "法43条1項、通知。随時改定は継続した3か月間に支払われた報酬を基礎とするため、休業中で報酬支払がない期間は改定の対象とならない。[Source 3, p.84-問5]", "year": "R2", "category": "標準報酬月額"}, {"id": 685, "question": "全国健康保険協会管掌健康保険の被保険者資格を取得した際の標準報酬月額の決定について、固定的賃金の算定誤りがあった場合には訂正することはできるが、残業代のような非固定的賃金について、その見込みが当初の算定額より増減した場合には訂正することができないとされている。", "answer": true, "explanation": "法42条。資格取得時決定における固定的賃金の誤りは訂正可能だが、非固定的賃金の予測との差異は訂正の対象外とする取扱いの通りである。[Source 3, p.82-問3]", "year": "R2", "category": "標準報酬月額"}, {"id": 686, "question": "任意継続被保険者において被保険者の4分の3以上の申出があった場合、事業主は当該事業所を適用事業所ではなくするための認可の申請をしなければならない。", "answer": true, "explanation": "法33条1項。任意適用事業所の取消申請（4分の3以上の同意）に関する正しい記述である。[Source 3, p.28-問8]", "year": "R2", "category": "適用事業所"}, {"id": 687, "question": "健康保険組合の理事の定数は偶数とし、その半数は理事のうちから理事が互選し、他の半数は事業主において選定する。", "answer": false, "explanation": "法21条2項。理数の定数は偶数だが、半数は事業主選定の「選定議員」の中から、他の半数は組合員互選の「互選議員」の中から、それぞれ互選される。[Source 3, p.18-問5]", "year": "R元", "category": "健康保険組合"}, {"id": 688, "question": "被保険者の資格を取得した際に決定された標準報酬月額は、その年の6月1日から12月31日までの間に取得した者については、翌年の9月までの各月の標準報酬月額とする。", "answer": false, "explanation": "法42条2項。6月以降に資格取得した者の標準報酬月額は、原則として翌年の「8月」まで適用される。9月ではない。[Source 3, p.82-問4]", "year": "R元", "category": "標準報酬月額"}, {"id": 689, "question": "公害健康被害の補償等に関する法律による療養の給付等がされた場合、同一の事由について健康保険の保険者は、当該補償給付の価額の限度で保険給付を行わない。", "answer": true, "explanation": "法55条。他法令による公費負担給付等との併給調整に関する規定通りの内容である。[Source 3, p.192-問8]", "year": "R元", "category": "受給権の保護・併給調整等"}, {"id": 690, "question": "代表者が1人の法人の事業所であって、代表者以外に従業員を雇用していないものについては、適用事業所とはならない。", "answer": false, "explanation": "法3条3項、通知。法人の代表者であっても報酬を受けていれば被保険者となり、その法人の事業所は強制適用事業所となり得る。[Source 3, p.25-問33]", "year": "R元", "category": "適用事業所"}, {"id": 691, "question": "健康保険法第3条第3項第1号の規定により、常時5人以上の従業員を使用する個人の事業所であって、適用業種（製造業、土木建築業等）を行うものは強制適用事業所となるが、当該員数の算定にあたっては、適用除外の規定により被保険者とならない者も含まれる。", "answer": true, "explanation": "法3条3項1号、昭和18.4.5保発905号。事業所の員数算定においては、短時間労働者などの適用除外者であっても、常時使用関係にある者であれば人数にカウントされる。[Source 3, p.27-問27]", "year": "H23", "category": "適用事業所"}, {"id": 692, "question": "適用事業所に使用される被保険者が、産前産後休業期間中である場合、事業主が保険者等に申し出ることにより、当該被保険者及び事業主の保険料が免除されるが、この免除期間は、産前産後休業を開始した日の属する月から、休業が終了する日の翌日の属する月の前月までである。", "answer": true, "explanation": "法159条の3。産前産後休業期間中の保険料免除の期間規定に関する正しい記述である。[Source 3, p.111-問100]", "year": "H26", "category": "保険料の負担等"}, {"id": 693, "question": "健康保険組合の解散時に、その財産をもって債務を完済することができないときは、当該組合は、設立事業所の事業主に対し、当該債務を完済するために要する費用の負担を求めることができるが、被保険者に対してその負担を求めることはできない。", "answer": true, "explanation": "法26条3項。解散時の債務完済のための費用負担義務は事業主にのみ課され、被保険者は負わない。[Source 3, p.15-問23]", "year": "H25", "category": "健康保険組合"}, {"id": 694, "question": "被保険者の資格を取得した日に、当該被保険者が同時に後期高齢者医療制度の被保険者資格を取得したときは、健康保険の被保険者資格は取得せず、後期高齢者医療の被保険者となる。", "answer": true, "explanation": "法3条1項7号。後期高齢者医療制度の被保険者は健康保険の適用除外とされるため、同時に発生した場合は後期高齢者医療が優先される。[Source 3, p.34-問39]", "year": "H21", "category": "被保険者"}, {"id": 695, "question": "指定訪問看護事業者が、その指定に係る訪問看護事業所の名称又は所在地に変更があったときは、10日以内に、その旨を厚生労働大臣に届け出なければならない。", "answer": true, "explanation": "法93条。名称・所在地の変更等の届出期限（10日以内）に関する正しい規定である。[Source 3, p.135-問4]", "year": "R元", "category": "指定訪問看護事業者"}, {"id": 696, "question": "健康保険組合は、支払上現金に不足が生じた場合、準備金に属する現金を繰替使用することができるが、当該繰替使用した金額は、当該会計年度内に返還しなければならない。", "answer": true, "explanation": "法30条、令21条。準備金の繰替使用における返還期限（当該会計年度内）に関する規定通りである。[Source 3, p.16-問25]", "year": "H20", "category": "健康保険組合"}, {"id": 697, "question": "被保険者が、自己の故意の犯罪行為により、又は故意に給付事由を生じさせたときは、当該給付事由に係る保険給付は行われない。ただし、被保険者が自殺により死亡した場合には、埋葬料は支給される。", "answer": true, "explanation": "法116条、通知。故意による絶対的給付制限の原則と、死亡（埋葬料）に関する例外的な取り扱いの通りである。[Source 3, p.195-問4]", "year": "H23", "category": "給付制限"}, {"id": 698, "question": "健康保険の適用事業所の事業主は、被保険者が育児休業等を開始したときは、速やかに、所定の事項を記載した届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "則24条の2。育児休業等取得の届出義務に関する正しい記述である。[Source 3, p.81-問57]", "year": "H27", "category": "届出等"}, {"id": 699, "question": "日雇特例被保険者手帳の交付を受けた者が、初めて当該手帳の交付を受けた日の属する月の初日から起算して3か月（1日交付の場合は2か月）の間に受けた療養については、特別療養費が支給される。", "answer": true, "explanation": "法145条1項。初めて手帳の交付を受けた者に対する特別療養費の支給期間に関する規定通りである。[Source 3, p.223-問221]", "year": "H26", "category": "日雇特例被保険者"}, {"id": 700, "question": "被保険者であった者が、資格喪失後の継続給付として出産手当金を受けていた期間内に死亡したときは、その者により生計を維持していた者等に対し、最後の保険者から埋葬料が支給される。", "answer": true, "explanation": "法105条1項1号。継続給付（傷病手当金・出産手当金）受給中の死亡に伴う埋葬料支給に関する規定通りである。[Source 3, p.187-問14]", "year": "H29", "category": "資格喪失後の給付"}, {"id": 701, "question": "保険料の延滞金の計算において、その金額に100円未満の端数があるときは、その端数を切り捨てる。", "answer": true, "explanation": "法181条5項。延滞金の端数処理（100円未満切り捨て）に関する規定通りである。[Source 3, p.124-問112]", "year": "H24", "category": "滞納に対する措置等"}, {"id": 702, "question": "健康保険組合の役員若しくは職員又はこれらの職にあった者は、健康保険事業に関して職務上知り得た秘密を正当な理由がなく漏らしてはならない。", "answer": true, "explanation": "法22条の2。組合関係者の守秘義務に関する正しい記述である。[Source 3, p.143-問43]", "year": "R3", "category": "健康保険組合"}, {"id": 703, "question": "被保険者が、病床数200床以上の病院において、他の病院等からの紹介状なしに初診を受けた場合、原則として保険外併用療養費に係る選定療養として、特別の料金の支払いを求められる。", "answer": true, "explanation": "法63条2項5号、令122号。大病院における紹介状なしの受診に関する選定療養の取り扱いの通りである。[Source 3, p.146-問127]", "year": "H23", "category": "保険外併用療養費"}, {"id": 704, "question": "任意継続被保険者が、初めて納付すべき保険料を除き、保険料をその納付期日（その月の10日）までに納付しなかった場合は、その納付期日の翌日に任意継続被保険者の資格を喪失する。", "answer": true, "explanation": "法38条3号。任意継続被保険者の未納による当然喪失規定に関する正しい記述である。[Source 3, p.115-問106]", "year": "R3", "category": "任意継続被保険者"}, {"id": 705, "question": "被保険者が、労働基準法第91条に規定する「減給の制裁」によって報酬が2等級以上減少した場合であっても、標準報酬月額の随時改定の対象とはならない。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。制裁による報酬減少は一時的なものであり、「固定的賃金の変動」には該当しない。[Source 3, p.201-問8]", "year": "R4", "category": "標準報酬月額"}, {"id": 706, "question": "全国健康保険協会は、毎事業年度の決算を翌事業年度の5月31日までに完結しなければならない。", "answer": true, "explanation": "法7条の28第1項。協会の決算完結期限に関する規定通りである。[Source 3, p.10-問13]", "year": "H24", "category": "全国健康保険協会"}, {"id": 707, "question": "被保険者が月の末日に退職した場合、その月の保険料は徴収されるが、事業主は前月分と当月分の2か月分の保険料を、その者に支払う報酬から同時に控除することができる。", "answer": true, "explanation": "法167条1項。末日退職（翌日1日喪失）の場合、当月分まで徴収対象となるため、特例として2か月分の控除が認められる。[Source 3, p.119-問104]", "year": "H29", "category": "保険料の負担等"}, {"id": 708, "question": "保険者は、被保険者が震災、風水害、火災等により、住宅、家財等が著しい損害を受け、その生活が困難となった場合、当該被保険者の申請により、6か月以内の期間を限って、一部負担金の徴収を猶予することができる。", "answer": true, "explanation": "法75条の2第1項、則56条の2。災害時の一部負担金徴収猶予（6か月以内）に関する規定通りである。[Source 3, p.135-問117]", "year": "H20", "category": "療養の給付"}, {"id": 709, "question": "健康保険法第193条第1項の規定により、保険料を徴収する権利及び保険給付を受ける権利は、2年を経過したときは時効によって消滅する。", "answer": true, "explanation": "法193条1項。徴収金および給付受給権の消滅時効（2年）に関する規定通りである。[Source 3, p.211-問529]", "year": "R3", "category": "時効"}, {"id": 710, "question": "日雇特例被保険者に係る健康保険事業に要する費用に充てるため、一般の被保険者を雇用する事業主が設立する健康保険組合から「日雇拠出金」が徴収される。", "answer": true, "explanation": "法173条1項。日雇特例被保険者制度を支えるための日雇拠出金に関する規定通りの内容である。[Source 3, p.204-問52]", "year": "R6", "category": "日雇特例被保険者"}, {"id": 711, "question": "報酬支払基礎日数が17日（短時間労働者は11日）未満である月がある場合、その月を除いて継続した3か月間の報酬の平均を算定し、従前の標準報酬月額と2等級以上の差が生じれば、随時改定の対象となる。", "answer": false, "explanation": "法43条1項。随時改定（月変）においては、継続した3か月間のすべてにおいて報酬支払基礎日数が17日（短時間労働者は11日）以上でなければならず、1か月でも満たない月があればその改定は行われない。[Source 3, p.83-問83]", "year": "H28", "category": "標準報酬月額"}, {"id": 712, "question": "特定適用事業所に使用される短時間労働者の被保険者資格の取得要件の1つである「報酬月額8.8万円以上」の算定において、家族手当は報酬に含めないが、通勤手当は報酬に含めて算定する。", "answer": false, "explanation": "法3条1項9号ハ、通知。短時間労働者の8.8万円基準の算定においては、家族手当、残業代、および「通勤手当」も報酬から除外して判定する。[Source 3, p.38-問12]", "year": "H30", "category": "被保険者"}, {"id": 713, "question": "特定適用事業所とは、事業主が同一である1又は2以上の適用事業所であって、当該事業所に使用される特定労働者の総数が常時50人を超えるものの各適用事業所をいう。", "answer": true, "explanation": "法附則46条12項。特定適用事業所の定義（常時50人超）に関する正しい記述である。[Source 3, p.39-問13]", "year": "H29改", "category": "適用事業所"}, {"id": 714, "question": "短時間労働者の1週間の所定労働時間が20時間未満であっても、実労働時間が直近2か月において週20時間以上である場合で、今後も同様の状態が続くと見込まれるときは、当該所定労働時間は週20時間以上であるものとして取り扱われる。", "answer": true, "explanation": "法3条1項9号、通知。所定労働時間と実労働時間が著しく乖離している場合の実態判断に関する正しい記述である。[Source 3, p.38-問14]", "year": "H29改", "category": "被保険者"}, {"id": 715, "question": "適用事業所以外の事業所の事業主が、当該事業所に使用される者の2分の1以上の同意を得て、厚生労働大臣の認可を受けて適用事業所となった場合、当該事業所に使用される者はその同意の有無にかかわらず、すべて被保険者となる。", "answer": true, "explanation": "法31条、法35条。任意適用事業所となった場合、加入に同意しなかった者も含めて、適用除外者を除き全員が被保険者となる。[Source 3, p.25-問29]", "year": "H28", "category": "被保険者"}, {"id": 716, "question": "被保険者の総数が常時100人以下の企業であっても、健康保険に加入することについての労使の合意（被用者の2分の1以上と事業主の合意）がなされた場合は、企業単位で健康保険の適用を受けることができる。", "answer": true, "explanation": "法附則46条5項。特定適用事業所以外の事業所であっても、労使合意により任意特定適用事業所となることができる。[Source 3, p.33-問397]", "year": "H28", "category": "適用事業所"}, {"id": 717, "question": "厚生労働大臣は、指定訪問看護事業者が、訪問看護事業所の看護師等の従業者について、厚生労働省令で定める員数を満たすことができなくなったときは、その指定を取り消すことができる。", "answer": true, "explanation": "法95条1号。従業者の員数基準を満たさなくなった場合は、指定取消事由に該当する。[Source 3, p.134-問5]", "year": "H28", "category": "指定訪問看護事業者"}, {"id": 718, "question": "標準報酬月額が1,330,000円（最高等級）である被保険者が、固定的賃金の変動により算定月額が1,415,000円以上となった場合には、2等級以上の差が生じたものとして取り扱われ、随時改定の対象となる。", "answer": true, "explanation": "法43条1項、通知。最高等級付近における随時改定の特例（算定月額が一定額を超えた場合を2等級差とみなす）に関する正しい記述である。[Source 3, p.86-問11]", "year": "H30", "category": "標準報酬月額"}, {"id": 719, "question": "養子縁組をして養父母を被扶養者としている被保険者が、生家において実父が死亡したため日本国内に住所を有する実母を扶養することとなった。この場合、実母について被扶養者認定の申請があっても、養父母とあわせて被扶養者として認定されることはない。", "answer": false, "explanation": "法3条7項、通知。実父母と養父母をあわせて被扶養者とすることは、生計維持関係が認められる限り可能である。[Source 3, p.56-問9]", "year": "H28改", "category": "被扶養者"}, {"id": 720, "question": "被保険者が賞与を受けた月において、その月に受けた賞与額に基づき標準賞与額を決定するが、その額に1,000円未満の端数があるときは、これを切り捨てる。", "answer": true, "explanation": "法45条1項。標準賞与額の決定における端数処理（1,000円未満切り捨て）に関する正しい記述である。[Source 3, p.94-問2]", "year": "H28", "category": "標準賞与額"}, {"id": 721, "question": "健康保険組合を単独で設立しようとする事業主は、その適用事業所に使用される被保険者の数が常時700人以上でなければならない。", "answer": true, "explanation": "法11条1項、令1条の3。健康保険組合の単独設立における被保険者数要件（700人以上）に関する正しい記述である。[Source 3, p.19-問541]", "year": "H28", "category": "健康保険組合"}, {"id": 722, "question": "任意適用事業所に使用される被保険者の4分の3以上が、当該事業所を適用事業所ではなくするための認可の申請を求めた場合であっても、事業主にはその申請をすべき義務は生じない。", "answer": false, "explanation": "法33条1項。任意適用事業所の取消において、被保険者の4分の3以上の同意がある場合、事業主は取消申請を「しなければならない」とされている。[Source 3, p.29-問7]", "year": "H28", "category": "適用事業所"}, {"id": 723, "question": "健康保険組合は、健全化計画の策定を命じられた場合、当該指定があった日の属する年度の翌年度を初年度とする3か年間の健全化計画を定め、厚生労働大臣の承認を受けなければならない。", "answer": true, "explanation": "法28条1項、2項。健全化計画の策定期間（3か年間）および大臣承認に関する正しい記述である。[Source 3, p.17-問26]", "year": "H28", "category": "健康保険組合"}, {"id": 724, "question": "調整保険料とは、各健康保険組合の財政力の不均衡を調整するため、健康保険組合連合会が行う交付金交付事業の財源として、健康保険組合が徴収する保険料である。", "answer": true, "explanation": "法附則2条、令4条の3。調整保険料の目的および仕組みに関する正しい記述である。[Source 3, p.115-問102]", "year": "H28", "category": "保険料"}, {"id": 725, "question": "本社と支社がともに適用事業所であり、人事管理等を別に行っている会社において、本社の被保険者が支社に転勤した場合であっても、引き続きその者の人事管理等を本社で行っている場合には、本社の被保険者として取り扱うことができる。", "answer": true, "explanation": "法3条3項、通知。いわゆる「本社管理」の取り扱いに関する正しい記述である。[Source 3, p.29-問9]", "year": "H27", "category": "適用事業所"}, {"id": 726, "question": "被扶養者の認定において、被保険者と同一の世帯に属している場合、認定対象者の年間収入が130万円未満（60歳以上等は180万円未満）であって、かつ、被保険者の年間収入の2分の1未満である必要がある。", "answer": true, "explanation": "法3条7項、通知。同一世帯における被扶養者の収入基準に関する正しい記述である。[Source 3, p.59-問13]", "year": "H27改", "category": "被扶養者"}, {"id": 727, "question": "月、週その他一定期間によって報酬が定められている被保険者に係る資格取得時の標準報酬月額は、被保険者の資格を取得した日現在の報酬の額をその期間における所定労働日数で除して得た額の30倍に相当する額を報酬月額として決定される。", "answer": true, "explanation": "法42条1項1号。月給・週給制の場合の資格取得時決定の算定ルールに関する正しい記述である。[Source 3, p.83-問555]", "year": "H27", "category": "標準報酬月額"}, {"id": 728, "question": "標準報酬月額の保険者算定において、保険者が健康保険組合であるときは、その算定方法を規約で定めなければならない。", "answer": true, "explanation": "法44条2項。健康保険組合における保険者算定の規約への規定義務に関する正しい記述である。[Source 3, p.79-問13]", "year": "H27", "category": "標準報酬月額"}, {"id": 729, "question": "指定健康保険組合（収支が均衡しない組合）は、健全化計画に違反し、事業の継続が困難であると認められるときは、厚生労働大臣により解散を命ぜられることがある。", "answer": true, "explanation": "法29条2項。健全化計画違反等に伴う厚生労働大臣の解散命令権に関する正しい記述である。[Source 3, p.25-問20]", "year": "H27", "category": "健康保険組合"}, {"id": 731, "question": "標準報酬月額の定時決定（算定基礎届）の対象となるのは、毎年7月1日現在において使用される被保険者である。", "answer": true, "explanation": "法41条1項。定時決定の基準日に関する規定通りである。[Source 3, p.34, 73]", "year": "H26-3A", "category": "標準報酬月額"}, {"id": 732, "question": "標準賞与額を決定する際、被保険者が賞与を受けた月に1,000円未満の端数が生じたときは、その端数を切り捨てる。", "answer": true, "explanation": "法45条1項。標準賞与額の算定における端数処理（1,000円未満切り捨て）に関する規定通りである。[Source 3, p.38, 94]", "year": "H26-3B", "category": "標準賞与額"}, {"id": 733, "question": "事業主は、被保険者に賞与を支払ったときは、支払った日から5日以内に、被保険者賞与支払届を日本年金機構又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "則27条1項。賞与支払届の提出期限（5日以内）に関する正しい記述である。[Source 3, p.95]", "year": "H26-3D", "category": "標準賞与額"}, {"id": 734, "question": "傷病手当金は、療養のため労務に服することができなくなった日から起算して3日を経過した日から、労務不能な期間について支給される。", "answer": true, "explanation": "法99条1項。待期3日間が完成した後の4日目から支給されるという規定通りである。[Source 3, p.64, 166]", "year": "H26-4A", "category": "傷病手当金"}, {"id": 735, "question": "健康保険の被保険者が通勤途上の負傷により労災保険の給付を受けることができるときは、原則として健康保険からの保険給付は行われない。", "answer": true, "explanation": "法55条1項。労災保険（業務災害・通勤災害）が優先されるため、健康保険の給付は行われない。[Source 3, p.80, 204]", "year": "H26-4B", "category": "給付制限・併給調整"}, {"id": 736, "question": "保険者は、被保険者が少年院その他これらに準ずる施設に収容されたときは、その期間、疾病、負傷又は出産に関する保険給付を行わない。", "answer": true, "explanation": "法118条1項1号。公費で医療が賄われる施設に収容されている期間の給付制限に関する規定通りである。[Source 3, p.79, 193]", "year": "H26-8C", "category": "給付制限"}, {"id": 737, "question": "全国健康保険協会の理事長、理事及び監事の任期は、いずれも3年とされている。", "answer": true, "explanation": "法7条の11、法7条の16。全国健康保険協会の役員の任期に関する規定通りの内容である。[Source 3, p.9, 142]", "year": "H25-1A", "category": "全国健康保険協会"}, {"id": 738, "question": "厚生労働大臣は、全国健康保険協会の事業年度ごとの業績について評価を行い、その評価の結果を公表しなければならない。", "answer": true, "explanation": "法7条の30。協会の業績評価および公表が厚生労働大臣の義務であることを示す正しい記述である。[Source 3, p.139, 140]", "year": "H25-1C", "category": "全国健康保険協会"}, {"id": 739, "question": "健康保険組合の合併は、組合会において組合会議員の定数の4分の3以上の多数による議決を要し、厚生労働大臣の認可を受けなければならない。", "answer": true, "explanation": "法23条1項。組合合併の特別議決要件（4分の3以上）に関する規定通りである。[Source 3, p.11, 17]", "year": "H25-3A", "category": "健康保険組合"}, {"id": 740, "question": "被保険者が保険医療機関から療養の給付を受けたときは、その給付を受ける際に、所定の割合による一部負担金を支払わなければならない。", "answer": true, "explanation": "法74条1項。療養の給付を受ける際の一部負担金支払義務に関する原則的な規定である。[Source 3, p.132]", "year": "H25-4A", "category": "療養の給付"}, {"id": 741, "question": "入院時生活療養費の支給対象となる「特定長期入院被保険者」とは、療養病床に入院する65歳以上の被保険者をいう。", "answer": true, "explanation": "法85条の2第1項。特定長期入院被保険者の定義（療養病床・65歳以上）に関する正しい記述である。[Source 3, p.49, 142]", "year": "H25-5B", "category": "入院時生活療養費"}, {"id": 742, "question": "埋葬料の支給要件である「埋葬を行う者」とは、社会通念上埋葬を行うべき者をいい、社葬が行われた場合でも生計維持関係があれば配偶者に埋葬料が支給されうる。", "answer": true, "explanation": "法100条1項、昭和2.7.14保理2788号。実務上の「埋葬を行う者」の解釈に関する正しい記述である。[Source 3, p.72, 173]", "year": "H25-7A", "category": "埋葬料"}, {"id": 743, "question": "高額介護合算療養費は、健康保険の被保険者及びその被扶養者について、それぞれ個別にではなく、世帯単位で算定し支給される。", "answer": true, "explanation": "法115条の2第1項。合算療養費の算定単位（世帯単位）に関する規定通りの内容である。[Source 3, p.61, 160]", "year": "H25-10オ", "category": "高額介護合算療養費"}, {"id": 744, "question": "月間の高額療養費は、原則として暦月1月（月の初日から末日まで）ごとに算定される。", "answer": true, "explanation": "法115条、令41条1項1号。高額療養費の算定期間の単位に関する正しい記述である。[Source 3, p.58, 156]", "year": "H24-3E改", "category": "高額療養費"}, {"id": 745, "question": "同時に2以上の事業所に使用される被保険者の報酬月額は、それぞれの事業所について算定した額の合算額をもってその者の報酬月額とする。", "answer": true, "explanation": "法44条3項。二以上事業所勤務者の報酬合算ルールに関する規定通りの内容である。[Source 3, p.37, 81]", "year": "H24-5A", "category": "標準報酬月額"}, {"id": 746, "question": "保険料を過納した場合の繰上充当は、納付の日の翌日から6月以内の期日に納付されるべき保険料について認められる。", "answer": true, "explanation": "法164条2項。過納金の繰上充当ができる期間制限（6月以内）に関する正しい記述である。[Source 3, p.45, 112]", "year": "H24-5C", "category": "保険料"}, {"id": 747, "question": "事業主は、被保険者に通貨をもって賞与を支払う場合、被保険者の負担すべき標準賞与額に係る保険料を当該賞与から控除することができる。", "answer": true, "explanation": "法167条2項。賞与からの保険料控除権に関する規定通りの内容である。[Source 3, p.41, 119]", "year": "H24-5D", "category": "保険料の負担"}, {"id": 748, "question": "傷病手当金の支給要件を満たす者が、同時に出産手当金の支給を受けることができるときは、出産手当金の支給が優先され、その期間は傷病手当金は支給されない。", "answer": true, "explanation": "法103条1項。両手当金が競合する場合の調整ルール（出産手当金優先）に関する正しい記述である。[Source 3, p.69, 169]", "year": "H24-7A改", "category": "併給調整"}, {"id": 749, "question": "通勤手当は、被保険者の通常の生計費の一部に充てられるものであるから、健康保険法上の報酬に該当する。", "answer": true, "explanation": "法3条5項、昭和27.12.4保文発7241号。実務上の報酬の範囲に関する正しい解釈である。[Source 3, p.32, 69]", "year": "H24-10A", "category": "報酬等の定義"}, {"id": 750, "question": "事業の廃止等により適用事業所に該当しなくなったときの届出は、当該事実があった日から5日以内に提出しなければならない。", "answer": true, "explanation": "則20条1項。適用事業所に関する変更・廃止届の提出期限（5日以内）に関する規定通りである。[Source 3, p.28, 62]", "year": "H24-10C", "category": "適用事業所"}];
let qs=[], cur=0, ok=0, ng=0, done=false;

document.getElementById('total-lbl').textContent = D.length + '問収録';

function start(){
  const cat = document.getElementById('cat-sel').value;
  const ord = document.getElementById('ord-sel').value;
  qs = cat==='all' ? [...D] : D.filter(q=>q.category===cat);
  if(!qs.length){ show('msg'); return; }
  if(ord==='random') qs.sort(()=>Math.random()-0.5);
  cur=0; ok=0; ng=0; done=false;
  hide('msg'); hide('finish');
  upd(); showQ();
}

function showQ(){
  if(cur>=qs.length){ showFinish(); return; }
  const q=qs[cur];
  document.getElementById('qcard').style.display='block';
  document.getElementById('qcat').textContent=q.category||'';
  document.getElementById('qyr').textContent=q.year||'';
  document.getElementById('qtext').textContent=q.question;
  document.getElementById('result').style.display='none';
  document.getElementById('btn-next').style.display='none';
  done=false;
  document.getElementById('bar').style.width=(cur/qs.length*100)+'%';
}

function ans(u){
  if(done) return; done=true;
  const q=qs[cur];
  const ok2=(u===q.answer);
  if(ok2) ok++; else ng++;
  const r=document.getElementById('result');
  r.style.display='block';
  r.className='result '+(ok2?'res-ok':'res-ng');
  document.getElementById('rlabel').textContent=ok2?'✓ 正解':'✗ 不正解　正解は'+(q.answer?'○':'×');
  document.getElementById('rexp').textContent=q.explanation||'';
  document.getElementById('btn-next').style.display='block';
  upd();
}

function next(){ cur++; showQ(); }

function upd(){
  const t=ok+ng;
  document.getElementById('s-done').textContent=cur;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-ng').textContent=ng;
  document.getElementById('s-rate').textContent=t?Math.round(ok/t*100)+'%':'—';
}

function showFinish(){
  hide('qcard');
  document.getElementById('finish').style.display='block';
  document.getElementById('bar').style.width='100%';
  const t=ok+ng;
  document.getElementById('fscore').textContent=t?Math.round(ok/t*100)+'%':'—';
  document.getElementById('fdetail').textContent=t+'問中 '+ok+'問正解';
}

function reset(){
  cur=0; ok=0; ng=0;
  hide('qcard'); hide('finish'); hide('msg');
  document.getElementById('bar').style.width='0%';
  upd();
}

function hide(id){ document.getElementById(id).style.display='none'; }
function show(id){ document.getElementById(id).style.display='block'; }
</script>
</body>
</html>
