: "義手義足は、療養の過程において、その傷病の治療のため必要と認められる場合に療養費として支給されているが、症状固定後に装着した義肢の単なる修理に要する費用も療養費として支給することは認められる。", "answer": false, "explanation": "法87条1項、昭和26.5.6保文発1443号。症状固定後の義肢の修理等は「療養」には当たらないため、健康保険の療養費の支給対象外である。[R6-8E]", "year": "R6", "category": "療養費"}, {"id": 279, "question": "保険者は、訪問看護療養費の支給を行うことが困難であると認めるときは、療養費を支給することができる。", "answer": false, "explanation": "法87条1項。療養費の対象となるのは、療養の給付、入院時食事療養費、入院時生活療養費又は保険外併用療養費であり、訪問看護療養費は含まれない。[R元-2C]", "year": "R元", "category": "療養費"}, {"id": 280, "question": "臓器移植を必要とする被保険者がレシピエント適応基準に該当し、海外渡航時に日本臓器移植ネットワークに登録している状態であり、かつ、当該被保険者が移植を必要とする臓器に係る、国内における待機状況を考慮すると、海外で移植を受けない限りは生命の維持が不可能となる恐れが高い場合には、海外において療養等を受けた場合に支給される療養費の支給要件である健康保険法第87条第1項に規定する「保険者がやむを得ないものと認めるとき」に該当する場合と判断できる。", "answer": true, "explanation": "法87条1項、平成29.12.22保保発1222第2号。国内での臓器移植が困難で生命の危険があるなど、特別な事情による海外受診については「やむを得ないもの」として療養費の支給が認められる。[H30-6A]", "year": "H30", "category": "療養費"}, {"id": 281, "question": "単に保険医の診療が不評だからとの理由によって、保険診療を回避して保険医以外の医師の診療を受けた場合には、療養費の支給は認められない。", "answer": true, "explanation": "法87条1項、昭和24.6.6保文発1017号。単なる個人の嗜好や不評を理由とする保険医以外の受診は「やむを得ない理由」には該当せず、療養費は支給されない。", "year": null, "category": "療養費"}, {"id": 282, "question": "療養費の額は、当該療養（食事療養及び生活療養を除く。）について算定した費用の額から、その額に一部負担金の割合を乗じて得た額を控除した額及び当該食事療養又は生活療養について算定した費用の額から食事療養標準負担額又は生活療養標準負担額を控除した額を基準として、保険者が定める。", "answer": true, "explanation": "法87条2項。療養費の支給額算定に関する規定通りの内容である。[R3-10E]", "year": "R3", "category": "療養費"}, {"id": 283, "question": "被保険者が海外にいるときに発生した保険事故に係る療養費等に関する申請手続等に添付する証拠書類が外国語で記載されている場合は、日本語の翻訳文を添付することとされており、添付する翻訳文には翻訳者の氏名及び住所を記載させることとされている。", "answer": true, "explanation": "法87条1項、則66条、平成11.3.30保険発39号。海外受診による療養費申請時の添付書類（日本語訳）に関する正しい記述である。[R2-8E]", "year": "R2", "category": "療養費"}, {"id": 284, "question": "67歳の被扶養者が保険医療機関である病院の療養病床に入院し、療養の給付と併せて生活療養を受けた場合、被保険者に対して入院時生活療養費が支給される。", "answer": false, "explanation": "法85条の2第1項、法110条1項。被扶養者の生活療養については、入院時生活療養費そのものではなく、それに相当する給付として「家族療養費」が支給される。[R元-2B]", "year": "R元", "category": "家族療養費"}, {"id": 285, "question": "被扶養者が疾病により家族療養費を受けている間に被保険者が死亡した場合、被保険者は死亡によって被保険者の資格を喪失するが、当該資格喪失後も被扶養者に対して家族療養費が支給される。", "answer": false, "explanation": "法36条1号、法110条。被保険者の死亡により、その翌日から被保険者資格及び被扶養者の資格も失われるため、それ以後の家族療養費の支給は行われない。[H30-7E]", "year": "H30", "category": "家族療養費"}, {"id": 286, "question": "疾病により療養の給付を受けていた被保険者が疾病のため退職し被保険者資格を喪失した。その後この者は、健康保険の被保険者である父親の被扶養者になった。この場合、被扶養者になる前に発病した当該疾病に関しては、父親に対し家族療養費の支給は行われない。", "answer": false, "explanation": "法3条7項1号、法110条1項、昭和23.11.17保文発781号。被扶養者認定前に発病した疾病であっても、認定後に受けた療養については家族療養費の支給対象となる。[H28]", "year": "H28", "category": "家族療養費"}, {"id": 287, "question": "指定訪問看護は、末期の悪性腫瘍などの厚生労働大臣が定める疾病等の利用者を除き、原則として利用者1人につき週5日を限度として受けられるとされている。", "answer": false, "explanation": "法88条、則67条。指定訪問看護には、原則として「週5日」という一律の回数制限は設けられていない。[R2-3イ]", "year": "R2", "category": "訪問看護療養費"}, {"id": 288, "question": "訪問看護療養費に係る指定訪問看護を受けようとする者は、主治の医師が指定した指定訪問看護事業者から受けなければならない。", "answer": false, "explanation": "法88条。利用者は、自ら選定した指定訪問看護事業者からサービスを受けることができ、医師が事業者を指定するものではない。[H27-4I]", "year": "H27", "category": "訪問看護療養費"}, {"id": 289, "question": "被保険者が指定訪問看護事業者から指定訪問看護を受けたときは、保険者は、その被保険者が当該指定訪問看護事業者に支払うべき当該指定訪問看護に要した費用について、訪問看護療養費として被保険者に対し支給すべき額の限度において、被保険者に代わり、当該指定訪問看護事業者に支払うことができる。この支払いがあったときは、被保険者に対し訪問看護療養費の支給があったものとみなす。", "answer": true, "explanation": "法88条7項。訪問看護療養費の代理受領（現物給付化）に関する規定通りである。[R元-7イ]", "year": "R元", "category": "訪問看護療養費"}, {"id": 290, "question": "指定訪問看護事業者は、指定訪問看護に要した費用につき、その支払を受ける際、当該支払をした被保険者に対し、基本利用料とその他の利用料を、その費用ごとに区分して記載した領収書を交付しなければならない。", "answer": true, "explanation": "法88条。費用の透明性を確保するため、項目を区分した領収書の交付が義務付けられている。[R4-3オ]", "year": "R4", "category": "訪問看護療養費"}, {"id": 291, "question": "被保険者の被扶養者が指定訪問看護事業者から指定訪問看護を受けたときは、被扶養者に対し、その指定訪問看護に要した費用について、訪問看護療養費を支給する。", "answer": false, "explanation": "法111条1項。被扶養者が受けた場合は「家族訪問看護療養費」が支給され、支給対象は被保険者である。[p.154-問1]", "year": "H29", "category": "家族訪問看護療養費"}, {"id": 292, "question": "被保険者が3月15日から4月10日まで同一の医療機関で入院療養を受けた場合は、月間の高額療養費は3月15日から3月31日までの療養に係るものと、4月1日から4月10日までの療養に係るものに区分される。", "answer": true, "explanation": "法115条、令41条1項1号。高額療養費は暦月（1日から末日まで）を単位として算定されるため、月をまたぐ入院の場合は区分して計算される。[p.156-問1]", "year": "H24", "category": "高額療養費"}, {"id": 293, "question": "同一の月に同一の保険医療機関において内科及び歯科をそれぞれ通院で受診したとき、高額療養費の算定上、1つの病院で受けた療養とみなされる。", "answer": false, "explanation": "法115条、令43条9項。同一の月であっても、同一医療機関の医科と歯科は高額療養費の算定上、別個の病院として合算の対象とならない。[p.157-問2]", "year": "H27", "category": "高額療養費"}, {"id": 294, "question": "70歳未満の被保険者が同一の月に同一の病院において、外来で内科を受診し、その後同じ病院に入院した場合、外来分と入院分の一部負担金等の額は、その額のいかんにかかわらず世帯合算の対象となる。", "answer": true, "explanation": "法115条、令41条1項。同一の月、同一の病院等での外来と入院の一部負担金は、21,000円の基準に関わらず合算して計算される。[p.157-問3]", "year": "H27", "category": "高額療養費"}, {"id": 295, "question": "高額療養費の対象となる一部負担金等の額には、入院時食事療養費に係る食事療養標準負担額及び入院時生活療養費に係る生活療養標準負担額は含まれる。", "answer": false, "explanation": "法115条、令41条。食事療養及び生活療養の標準負担額は、高額療養費の対象となる一部負担金等には含まれない。[p.157-問4]", "year": null, "category": "高額療養費"}, {"id": 296, "question": "70歳未満の被保険者が保険医療機関において、治療用補装具の装着を指示され、補装具業者から治療用補装具を購入し、療養費の支給を受けた場合には、高額療養費の算定上、同一の月の当該保険医療機関の通院に係る一部負担金と治療用補装具の自己負担分（21,000円未満）とを合算することができる。", "answer": false, "explanation": "法115条。治療用補装具に係る療養費の自己負担分は、それ単独で高額療養費の対象となるか判断し、医療機関の窓口負担分と合算して算定することはない。[p.157-問5]", "year": "H27", "category": "高額療養費"}, {"id": 297, "question": "70歳未満で標準報酬月額が53万円以上83万円未満の被保険者が、1つの病院等で同一月内の療養の給付について支払った一部負担金の額が、167,400円＋(療養に要した費用-558,000円)×1%を超えた場合、その超えた額が高額療養費として支給される（高額療養費多数回該当の場合を除く。）。", "answer": true, "explanation": "法115条、令41条1項1号、令42条1項3号。所得区分に応じた算定式通りの内容である。[p.157-問6]", "year": "H27", "category": "高額療養費"}, {"id": 298, "question": "高額療養費の算定における世帯合算は、被保険者及びその被扶養者を単位として行われるものであり、夫婦がともに被保険者である場合は、原則としてその夫婦間では行われないが、夫婦がともに70歳以上の被保険者であれば、世帯合算が行われる。", "answer": false, "explanation": "法115条、令41条。世帯合算は1人の被保険者とその被扶養者の範囲内で行われる。共働き夫婦（共に被保険者）間では、年齢に関わらず合算は行われない。[p.158-問7]", "year": "H30", "category": "高額療養費"}, {"id": 299, "question": "71歳で市町村民税非課税者である被保険者甲が、同一の月にA病院で受けた外来療養による一部負担金の額が8,000円を超える場合、その超える額が高額療養費として支給される。", "answer": true, "explanation": "法115条、令42条5項1号。70歳以上で所得区分が低所得者（区分I・II）の場合、外来の一部負担限度額は8,000円となる。[p.158-問8]", "year": "R5", "category": "高額療養費"}, {"id": 300, "question": "被保険者の標準報酬月額が260,000円で被保険者及びその被扶養者がともに72歳の場合、同一の月に、被保険者がA病院で受けた外来療養による一部負担金が20,000円、被扶養者がB病院で受けた外来療養による一部負担金が10,000円であるとき、被保険者及び被扶養者の外来療養に係る月間の高額療養費は12,000円となる。", "answer": true, "explanation": "法115条、令42条5項。70歳以上の一般区分の外来限度額は18,000円である。世帯での外来分合計30,000円から18,000円を引いた12,000円が支給される。[p.158-問9]", "year": "H29", "category": "高額療養費"}, {"id": 301, "question": "標準報酬月額が56万円である60歳の被保険者が、慢性腎不全で1つの病院から人工腎臓を実施する療養を受けている場合において、当該療養に係る高額療養費算定基準額は10,000円とされている。", "answer": false, "explanation": "法115条、令42条9項。70歳未満で標準報酬月額53万円以上の特定疾病患者に係る限度額は20,000円である。[p.158-問10]", "year": "R2", "category": "高額療養費"}, {"id": 302, "question": "70歳以上の被保険者が人工腎臓を実施する慢性腎不全に係る療養を受けている場合、高額療養費算定基準額は、当該被保険者の所得にかかわらず、20,000円である。", "answer": false, "explanation": "法115条、令42条9項。70歳以上の特定疾病患者に係る限度額は、所得に関わらず一律10,000円である。[p.158-問11]", "year": "H28", "category": "高額療養費"}, {"id": 303, "question": "標準報酬月額が28万円以上53万円未満である74歳の被保険者で高額療養費多数回該当に当たる者であって、健康保険の高額療養費算定基準額が44,400円である者が、月の初日以外の日に75歳に達し、後期高齢者医療制度の被保険者の資格を取得したことにより、健康保険の被保険者資格を喪失したとき、当該月における外来診療に係る個人単位の健康保険の高額療養費算定基準額は22,200円とされている。", "answer": true, "explanation": "法115条、令41条4項。75歳到達月（誕生日が2日以降）は、移行前後の制度それぞれの限度額が通常の半額となる特例が適用される。[p.158-問12]", "year": "R元", "category": "高額療養費"}, {"id": 304, "question": "傷病手当金は、労務不能でなければ支給要件を満たすものではないが、被保険者がその本来の職場における労務に就くことが不可能な場合であっても、現に職場転換その他の措置により就労可能な程度の他の比較的軽微な労務に服し、これによって相当額の報酬を得ているような場合は、労務不能には該当しない。", "answer": true, "explanation": "法99条1項。本来の仕事ができなくても、他の軽微な仕事をして報酬を得ていれば、社会通念上「労務不能」とは認められない。[p.166-問7]", "year": "R元", "category": "傷病手当金"}, {"id": 305, "question": "傷病手当金の支給期間中に被保険者が死亡した場合、当該傷病手当金は当該被保険者の死亡日の前日分まで支給される。", "answer": false, "explanation": "法36条1号、法99条1項。被保険者が死亡した当日はなお被保険者資格を有するため、死亡日当日分まで支給される。[p.166-問8]", "year": "R5", "category": "傷病手当金"}, {"id": 306, "question": "傷病手当金の支給要件として継続した3日間の待期期間を要するが、土曜日及び日曜日を所定の休日とする会社に勤務する従業員が、金曜日から労務不能となり、初めて傷病手当金を請求する場合、その金曜日と翌週の月曜日及び火曜日の3日間で待期期間が完成するのではなく、金曜日とその翌日の土曜日、翌々日の日曜日の連続した3日間で待期期間が完成する。", "answer": true, "explanation": "法99条1項。待期期間の3日間には、有給休暇、土日、祝日などの公休日も含まれる。[p.166-問9]", "year": "H28", "category": "傷病手当金"}, {"id": 307, "question": "被保険者が就業中の午後4時頃になって虫垂炎を発症し、そのまま入院した場合、その翌日が傷病手当金の待期期間の起算日となり、当該起算日以後の3日間連続して労務不能であれば待期期間を満たすことになる。", "answer": false, "explanation": "法99条1項。就業時間中に発症して労務不能となった場合は、その当日から待期期間を起算する。[p.166-問10]", "year": "H28", "category": "傷病手当金"}, {"id": 308, "question": "傷病手当金の待期期間について、疾病又は負傷につき最初に療養のため労務不能となった場合のみ待期が適用され、その後労務に服し同じ疾病又は負傷につき再度労務不能になった場合は、待期の適用がない。", "answer": true, "explanation": "法99条1項。同一の疾病または負傷により再度労務不能となった場合、既に待期を終えていれば、新たな待期期間を置く必要はない。[p.166-問11]", "year": "R5", "category": "傷病手当金"}, {"id": 309, "question": "出産手当金の支給要件を満たす者が、その支給を受ける期間において、同時に傷病手当金の支給要件を満たした場合は、出産手当金の支給が優先され、支給を受けることのできる出産手当金の額が傷病手当金の額を上回っている場合は、当該期間中の傷病手当金は支給されない。", "answer": true, "explanation": "法103条1項。出産手当金と傷病手当金が併給される場合は、出産手当金が優先して支給される。傷病手当金の方が多い場合は差額が支給される。[p.170-問16]", "year": "R4", "category": "傷病手当金"}, {"id": 310, "question": "傷病手当金は、その支給期間の一部でも報酬が支払われていれば支給額が調整されるが、当該支給期間以前に支給された通勤定期券の購入費であっても、傷病手当金の支給期間に係るものは調整の対象になる。", "answer": true, "explanation": "法108条1項。あらかじめ支給された定期代等であっても、それが傷病手当金の支給期間に対応するものであれば報酬とみなされ、調整の対象となる。[p.170-問17]", "year": "H28", "category": "傷病手当金"}, {"id": 311, "question": "傷病手当金の支給を受けるべき者が、同一の疾病につき厚生年金保険法による障害厚生年金の支給を受けることができるときは、傷病手当金の支給が調整されるが、障害手当金の支給を受けることができるときは、障害手当金が一時金としての支給であるため傷病手当金の支給は調整されない。", "answer": false, "explanation": "法108条3項、4項。障害厚生年金だけでなく、一時金である障害手当金の支給を受けることができる場合であっても、傷病手当金の支給調整が行われる。[1]", "year": "H29", "category": "傷病手当金"}, {"id": 312, "question": "傷病手当金の継続給付を受けている者(傷病手当金を受けることができる日雇特例被保険者又は日雇特例被保険者であった者を含む。)に、老齢基礎年金や老齢厚生年金等が支給されるようになったときは、傷病手当金は打ち切られる。", "answer": false, "explanation": "法108条5項、令37条。老齢等年金給付が支給される場合であっても、必ずしも傷病手当金が打ち切られるわけではなく、年金額が傷病手当金額より少ないときはその差額が支給される。[1]", "year": "R5", "category": "傷病手当金"}, {"id": 313, "question": "適用事業所に使用される被保険者が傷病手当金を受けるときには、老齢基礎年金及び老齢厚生年金との調整は行われない。", "answer": true, "explanation": "法108条5項。傷病手当金と老齢等年金給付との調整が行われるのは、被保険者資格を喪失した者が「継続給付」として傷病手当金を受ける場合に限られる。[1]", "year": "H27", "category": "傷病手当金"}, {"id": 314, "question": "労災保険法に基づく休業補償給付を受給している健康保険の被保険者が、さらに業務外の事由による傷病によって労務不能の状態になった場合、休業補償給付が支給され、傷病手当金が支給されることはない。", "answer": false, "explanation": "法99条1項、2項、昭和33.7.8保険発95号。労災の休業補償給付を受けている場合でも、その額が健康保険の傷病手当金の額を下回るときは、その差額が支給される。[1]", "year": "R2", "category": "傷病手当金"}, {"id": 315, "question": "健康保険法第100条では、「被保険者が死亡したときは、その者により生計を維持していた者であって、埋葬を行うものに対し、埋葬料として、政令で定める金額を支給する。」と規定している。", "answer": true, "explanation": "法100条1項。埋葬料の支給要件（生計維持関係と埋葬の実施）に関する規定通りの内容である。[1]", "year": "R4", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 316, "question": "被保険者が死亡したときは、埋葬を行う者に対して、埋葬料として5万円を支給するが、その対象者は当該被保険者と同一世帯であった者に限られる。", "answer": false, "explanation": "法100条1項、令35条、昭和7.4.25保規129号。埋葬料の支給対象となる「生計を維持していた者」とは、必ずしも同一世帯であることを要しない。[1]", "year": "R元", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 317, "question": "被保険者が死亡し、その被保険者には埋葬料の支給を受けるべき者がいないが、別に生計をたてている別居の実の弟が埋葬を行った場合、その弟には、埋葬料の金額の範囲内においてその埋葬に要した費用に相当する金額が支給される。", "answer": true, "explanation": "法100条2項、昭和26.6.28保文発162号。埋葬料の支給を受けるべき者がない場合、実際に埋葬を行った者に対し、5万円を上限として実費相当額が「埋葬費」として支給される。[1]", "year": "H28", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 318, "question": "被保険者が妊娠4か月以上で出産をし、それが死産であった場合、家族埋葬料は支給されないが、出産育児一時金は支給の対象となる。", "answer": true, "explanation": "法101条、法113条、昭和23.12.2保文発898号。死産児は被扶養者になれないため家族埋葬料は出ないが、出産育児一時金は妊娠4か月（85日）以上であれば死産でも支給される。[1]", "year": "H28", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 319, "question": "別居している兄弟が共に被保険者であり、その父は弟と同居しているが、兄弟が共に父を等分の扶養により生計を維持している場合、父が死亡したときの家族埋葬料は、兄弟の両方に支給される。", "answer": false, "explanation": "法113条、昭和23.4.28保発623号。同一の被扶養者の死亡について、複数の被保険者から家族埋葬料が重複して支給されることはない。[1]", "year": "R5", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 320, "question": "被保険者が、妊娠6か月の身体をもって業務中に転倒強打して早産したときは、健康保険法に規定される保険事故として、出産育児一時金が支給される。", "answer": true, "explanation": "法101条、昭和24.3.26保文発523号。妊娠4か月以上の出産であれば、業務上の事故による早産等であっても、健康保険から出産育児一時金が支給される。[1]", "year": "R6", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 321, "question": "出産育児一時金の額は、公益財団法人日本医療機能評価機構が運営する産科医療補償制度に加入する医療機関等における医学的管理下における在胎週数22週に達した日以後の出産(死産を含む。)であると保険者が認めたときには50万円、それ以外のときには48万8千円である。", "answer": true, "explanation": "法101条、令36条、令和5.3.30保保発0330第13号。現在の出産育児一時金の支給額規定に関する正しい記述である。[1]", "year": "H27", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 322, "question": "令和5年4月1日以降、被保険者の被扶養者が産科医療補償制度に加入する医療機関等で医学的管理の下、妊娠週数22週以降に双子を出産した場合、家族出産育児一時金として、被保険者に対し100万円が支給される。", "answer": true, "explanation": "法114条、令36条、令和5.3.30保保発0330第8号。多胎出産の場合は児数に応じて支給されるため、50万円×2＝100万円となる。[1]", "year": "R5", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 323, "question": "家族出産育児一時金は、被保険者の被扶養者である配偶者が出産した場合にのみ支給され、被保険者の被扶養者である子が出産した場合には支給されない。", "answer": false, "explanation": "法114条。家族出産育児一時金は、配偶者に限らず、被保険者の「被扶養者」が出産したときに支給される。[1]", "year": "R3", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 324, "question": "被保険者が分娩開始と同時に死亡したが、胎児は娩出された場合、被保険者が死亡したので出産育児一時金は支給されない。", "answer": false, "explanation": "法101条、昭和8.3.14保規61号。分娩開始時に生存しており、死亡当日は被保険者資格を有するため、出産に関する給付は行われる。[1]", "year": "R3", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 325, "question": "出産育児一時金の受取代理制度は、被保険者が医療機関等を受取代理人として出産育児一時金を事前に申請し、医療機関等が被保険者に代わって出産育児一時金を受け取るものである。", "answer": true, "explanation": "法101条、令和3.8.18保発0818第4号。受取代理制度の仕組みに関する正しい記述である。[1]", "year": "R3", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 326, "question": "被保険者甲(令和5年1月1日資格取得)は、出産予定日が令和6年1月10日であったが、実際の出産日は令和5年12月25日であったことから、出産日の前日まで引き続き1年以上の被保険者期間がなかった。これにより、被保険者の資格を取得してから1年を経過した日から出産の日後56日までの間において労務に服さなかった期間、出産手当金が支給される。", "answer": true, "explanation": "法102条。被保険者期間が1年未満の場合の支給額算定ルールが適用されるが、労務に服さない等の要件を満たせば出産手当金は支給される。[1]", "year": "R6", "category": "出産手当金"}, {"id": 327, "question": "被保険者（任意継続被保険者を除く。）が出産の日以前42日から出産の日後56日までの間において、通常の労務に服している期間があった場合は、その間に支給される賃金額が出産手当金の額に満たない場合に限り、その差額が出産手当金として支給される。", "answer": true, "explanation": "法108条2項。出産手当金の支給期間中に報酬の支払いがある場合、手当金額との差額が支給される。[1]", "year": "R2", "category": "出産手当金"}, {"id": 328, "question": "被保険者が介護休業期間中に出産手当金の支給を受ける場合、その期間内に事業主から介護休業手当で報酬と認められるものが支給されているときは、その額が本来の報酬と出産手当金との差額より少なくとも、出産手当金の支給額について介護休業手当との調整が行われる。", "answer": true, "explanation": "法108条2項、平成11.3.31保険発46号。名称が手当であっても実態が「報酬」であれば、出産手当金との支給調整の対象となる。[1]", "year": "H27", "category": "出産手当金"}, {"id": 329, "question": "被保険者が出産手当金の支給要件に該当すると認められれば、その者が介護休業期間中であっても当該被保険者に出産手当金が支給される。", "answer": true, "explanation": "法102条、平成11.3.31保険発46号。介護休業中であっても、労務不能（労務に服さない）等の要件を満たせば出産手当金は支給される。[1]", "year": "R4", "category": "出産手当金"}, {"id": 330, "question": "出産手当金の額は、1日につき、出産手当金の支給を始める日の属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額とする。ただし、その期間が12か月に満たない場合は、出産手当金の支給を始める日の属する月の標準報酬月額の30分の1に相当する額の3分の2に相当する金額とする。", "answer": false, "explanation": "法102条2項。被保険者期間が12か月に満たない場合、当該被保険者の平均額と「全被保険者の平均額から算出した額」のいずれか少ない額の3分の2とされる。[1]", "year": "H28", "category": "出産手当金"}, {"id": 331, "question": "被保険者(任意継続被保険者を除く。)の資格を喪失した日以後に傷病手当金の継続給付の規定により傷病手当金の支給を始める場合においては、その資格を喪失した日の前日において当該被保険者であった者が属していた保険者等により定められた直近の継続した12か月間の各月の標準報酬月額を傷病手当金の額の算定の基礎に用いる。", "answer": true, "explanation": "法99条2項、則84条の2第1項。支給開始日が資格喪失後の場合、喪失日の前日における標準報酬月額等に基づき算定する規定の通りである。[p.180-最新問1]", "year": "R6", "category": "資格喪失後の給付"}, {"id": 332, "question": "被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者(任意継続被保険者、特定退職被保険者又は共済組合の組合員である被保険者ではないものとする。)であった者が、被保険者の資格を喪失した日より6か月後に出産したときに、被保険者が当該出産に伴う出産手当金の支給の申請をした場合は、被保険者として受けることができるはずであった出産手当金の支給を最後の保険者から受けることができる。", "answer": false, "explanation": "法104条、法106条。資格喪失後の出産手当金は、喪失時に現に支給を受けているか、又は受けうる状態（出産予定日前42日以内等）にある必要があり、6か月後の出産では要件を満たさない。[p.180-問1]", "year": "R4", "category": "資格喪失後の給付"}, {"id": 333, "question": "健康保険法第104条の規定による資格喪失後の傷病手当金の支給を受けるには、資格喪失日の前日まで引き続き1年以上被保険者(任意継続被保険者、特例退職被保険者又は共済組合の組合員である被保険者を除く。)である必要があり、この被保険者期間は、同一の保険者でなければならない。", "answer": false, "explanation": "法104条。1年以上の被保険者期間は、必ずしも同一の保険者である必要はなく、連続していればよい。[p.180-問2]", "year": "H28", "category": "資格喪失後の給付"}, {"id": 334, "question": "資格喪失後の継続給付として傷病手当金の支給を受けていた者が、被保険者資格の喪失から3か月を経過した後に死亡したときは、死亡日が当該傷病手当金を受けなくなった日後3か月以内であっても、被保険者であった者により生計を維持していた者であって、埋葬を行うものが埋葬料の支給を受けることはできない。", "answer": false, "explanation": "法105条1項。継続給付を受けていた者が、その給付を受けなくなった日後3か月以内に死亡したときは、最後の保険者から埋葬料が支給される。[p.186-問14]", "year": "H29", "category": "資格喪失後の給付"}, {"id": 335, "question": "資格喪失後、継続給付としての傷病手当金の支給を受けている者について、一旦稼働して当該傷病手当金が不支給となったとしても、完全治癒していなければ、その後更に労務不能となった場合、当該傷病手当金の支給が復活する。", "answer": false, "explanation": "法104条。資格喪失後の継続給付は「継続して」受ける必要があるため、一旦稼働して中断した後は、たとえ治癒していなくても再支給されることはない。[p.182-問11]", "year": "R元", "category": "資格喪失後の給付"}, {"id": 336, "question": "保険給付を受ける権利は、健康保険法上、必要と認める場合には、譲渡や担保に供したり又は差し押さえることができる。", "answer": false, "explanation": "法61条。保険給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない。例外規定はない。[p.188-問1]", "year": "H24", "category": "受給権の保護 ・ 併給調整等"}, {"id": 337, "question": "傷病手当金及び出産手当金は、課税対象となる収入には含まれない。", "answer": true, "explanation": "法62条。租税その他の公課は、保険給付として受けた金品を標準として課することができない。[p.188-問2]", "year": "H27", "category": "受給権の保護 ・ 併給調整等"}, {"id": 338, "question": "給付事由が第三者の行為によって生じた場合において、保険給付を受ける権利を有する者が第三者から同一の事由について損害賠償を受けたときは、保険者は、その価額の限度において、保険給付を行う責めを免れる。", "answer": true, "explanation": "法57条2項。第三者から既に損害賠償を受けている場合は、その額の範囲内で保険者は給付義務を免れる。[p.188-問3]", "year": "H21", "category": "受給権の保護 ・ 併給調整等"}, {"id": 339, "question": "自動車事故にあった被保険者に対して傷病手当金の支給をする前に、加害者が当該被保険者に対して負傷による休業に対する賠償をした場合、保険者はその損害賠償の価額の限度内で、傷病手当金の支給を行う責めを免れる。", "answer": true, "explanation": "法57条2項。休業補償（損害賠償）を先に受けた場合、保険者はその限度で給付を免れる。[p.190-問4]", "year": "H21", "category": "受給権の保護 ・ 併給調整等"}, {"id": 340, "question": "保険者は、偽りその他不正の行為によって保険給付を受けた者があるときは、その者からその給付の価額の全部又は一部を徴収することができる。", "answer": true, "explanation": "法58条1項。不正受給があった場合、保険者はその者から給付相当額を徴収することができる。[p.190-問5]", "year": "H23", "category": "受給権の保護 ・ 併給調整等"}, {"id": 341, "question": "非常災害の場合に、災害救助法が発動され、負傷した被保険者に対して同法の規定に基づき都道府県から応急的な医療が行われた場合には、その限度において健康保険の保険給付は行われない。", "answer": true, "explanation": "法55条4項。公費負担医療が行われる場合、健康保険はその限度で給付を行わない。[p.190-問6]", "year": "H21", "category": "受給権の保護 ・ 併給調整等"}, {"id": 342, "question": "被保険者に係る所定の保険給付は、同一の傷病について、災害救助法の規定により、都道府県の負担で応急的な医療を受けたときは、その限度において行われない。", "answer": true, "explanation": "法55条4項。公費負担医療との調整に関する正しい記述である。[p.192-問7]", "year": "H30", "category": "受給権の保護 ・ 併給調整等"}, {"id": 343, "question": "公害健康被害の補償等に関する法律による療養の給付等がされた場合において、同一の事由について当該補償給付に相当する給付を支給すべき健康保険の保険者は、当該補償給付の価額の限度で、当該補償給付に相当する健康保険による保険給付は行わないとされている。", "answer": true, "explanation": "法55条。公害補償法による給付がある場合、健康保険はその限度で給付義務を免れる。[p.192-問8]", "year": "R3", "category": "受給権の保護 ・ 併給調整等"}, {"id": 344, "question": "保険者は、被保険者又は被保険者であった者が、刑事施設、労役場その他これらに準ずる施設に拘禁された場合には、被扶養者に対する保険給付を行うことができない。", "answer": false, "explanation": "法118条2項。被保険者が拘禁等されている場合でも、被扶養者に対する保険給付は制限されない。[p.192-問9]", "year": "H29", "category": "受給権の保護 ・ 併給調整等"}, {"id": 345, "question": "被保険者又は被保険者であった者が、少年院その他これに準ずる施設に収容されたとき又は刑事施設、労役場その他これらに準ずる施設に拘禁されたときのいずれかに該当する場合には、疾病、負傷又は出産につき、その期間に係る保険給付は行わないが、その被扶養者に係る保険給付も同様に行わない。", "answer": false, "explanation": "法118条2項。本人に対する給付は制限されるが、被扶養者に対する保険給付は行われる。[p.192-問10]", "year": "R5", "category": "受給権の保護 ・ 併給調整等"}, {"id": 346, "question": "保険者は、偽りその他不正の行為により保険給付を受け、又は受けようとした者に対して、6か月以内の期間を定め、その者に支給すべき傷病手当金又は出産手当金の全部又は一部を支給しない旨の決定をすることができる。ただし、偽りその他不正の行為があった日から1年を経過したときは、この限りでない。", "answer": true, "explanation": "法120条。不正行為による手当金の給付制限期間（6か月以内）及び除斥期間（1年）に関する正しい規定である。[p.192-最新問1]", "year": "R6", "category": "給付制限 ・ 損害賠償との調整"}, {"id": 347, "question": "保険者は、偽りその他不正の行為によって保険給付を受けた者があるときは、その者からその給付の価額の全部又は一部を徴収することができる。全部又は一部という意味は、情状によって詐欺その他の不正行為により受けた分の一部であるという趣旨である。", "answer": false, "explanation": "法58条1項。ここでの徴収は不当利得の返還であり、給付を受けた額の全額を徴収するのが原則である（「全部又は一部」は裁量ではなく返還額を指す）。[p.194-最新問2]", "year": "R6", "category": "給付制限 ・ 損害賠償との調整"}, {"id": 348, "question": "健康保険法第116条では、被保険者又は被保険者であった者が、自己の故意の犯罪行為により又は故意に給付事由を生じさせたときは、当該給付事由に係る保険給付は行われないと規定されているが、被扶養者に係る保険給付についてはこの規定が準用されない。", "answer": false, "explanation": "法122条。被保険者の給付制限に関する規定（故意の犯罪行為等）は、被扶養者の給付についても準用される。[p.194-問1]", "year": "H28", "category": "給付制限 ・ 損害賠償との調整"}, {"id": 349, "question": "被保険者が自殺により死亡した場合は、その者により生計を維持していた者であって、埋葬を行う者がいたとしても、自殺については健康保険法第116条に規定する故意に給付事由を生じさせたときに該当するため、当該給付事由に係る保険給付は行われず、埋葬料は不支給となる。", "answer": false, "explanation": "法116条、通知。自殺は故意の事故ではあるが、死亡は絶対的なものであり、かつ埋葬料は遺族への給付という性質上、制限の対象外とされ支給される。[p.194-問2]", "year": "R4", "category": "給付制限 ・ 損害賠償との調整"}, {"id": 350, "question": "被保険者が道路交通法違反である無免許運転により起こした事故のため死亡した場合には、所定の要件を満たす者に埋葬料が支給される。", "answer": true, "explanation": "法116条、通知。犯罪行為等による死亡であっても、埋葬料は支給されるとする運用の通りである。[p.194-問3]", "year": "R2", "category": "給付制限 ・ 損害賠償との調整"}, {"id": 351, "question": "日雇特例被保険者の保険の保険者は、全国健康保険協会及び健康保険組合である。", "answer": false, "explanation": "法123条1項。日雇特例被保険者の保険の保険者は、全国健康保険協会のみとされている。[1]", "year": null, "category": "日雇特例被保険者"}, {"id": 352, "question": "日雇特例被保険者の保険の保険者の業務のうち、日雇特例被保険者手帳の交付、日雇特例被保険者に係る保険料の徴収及び日雇拠出金の徴収並びにこれらに附帯する業務は、厚生労働大臣が行う。", "answer": true, "explanation": "法123条2項。日雇特例被保険者手帳の交付や保険料の徴収等の業務は、厚生労働大臣が行うものとされている。[1]", "year": "R元-6C", "category": "日雇特例被保険者"}, {"id": 353, "question": "日雇特例被保険者の療養の給付期間は、同一の疾病又は負傷に対し、原則として、療養の給付等開始日から1年間（ただし、結核性疾病の場合は3年間）である。", "answer": false, "explanation": "法129条2項2号。日雇特例被保険者の結核性疾病の場合の給付期間は、「3年間」ではなく「5年間」である。[1]", "year": null, "category": "日雇特例被保険者"}, {"id": 354, "question": "日雇特例被保険者に係る傷病手当金の支給に当たっては、労務不能となった際にその原因となった傷病について療養の給付を受けていれば、労務不能期間において当該傷病につき療養の給付を受けていることを要しない。", "answer": true, "explanation": "法135条3項。労務不能となった際に療養の給付を受けていれば、労務不能期間中の療養の給付の継続は要件とされない。[1]", "year": null, "category": "日雇特例被保険者"}, {"id": 355, "question": "日雇特例被保険者の被扶養者に係る家族出産育児一時金の支給要件は、日雇特例被保険者自身の出産に係る出産育児一時金のように、出産の日の属する月の前4月間に通算して26日分以上の保険料が納付されていることへと緩和されている。", "answer": false, "explanation": "法144条1項、2項。家族出産育児一時金の支給要件は、本人分のような緩和規定（前4月間に26日分）は適用されず、通常の要件が適用される。[1]", "year": null, "category": "日雇特例被保険者"}, {"id": 356, "question": "全国健康保険協会管掌健康保険の被保険者で、家族出産育児一時金の支給を受けることが見込まれる者が、医療機関に一時的な支払いが必要になったときは、協会の福祉事業として実施されている出産費貸付制度を利用できる。", "answer": true, "explanation": "法150条5項。出産費貸付制度は、法150条5項の規定による福祉事業の一環として実施されている。[1]", "year": "R6-3エ改", "category": "保健福祉事業"}, {"id": 357, "question": "厚生労働大臣は、匿名診療等関連情報を大学その他の研究機関に提供しようとする場合には、あらかじめ、社会保障審議会の承認を得なければならない。", "answer": false, "explanation": "法150条の2第1項、3項。厚生労働大臣は、あらかじめ社会保障審議会の「意見を聴かなければならない」とされており、「承認」までは求められていない。[1]", "year": null, "category": "保健福祉事業"}, {"id": 358, "question": "匿名診療等関連情報の提供を受けた者は、実費を勘案して政令で定める額の手数料を納めなければならないが、その額は提供に要する時間1時間までごとに4,350円と定められている。", "answer": true, "explanation": "法150条の10、令44条の2。匿名診療等関連情報の提供に係る手数料額に関する規定通りである。[1]", "year": null, "category": "保健福祉事業"}, {"id": 359, "question": "健康保険法第150条第1項では、保険者は、高齢者医療確保法の規定による特定健康診査及び特定保健指導を行うように努めなければならないと規定されている。", "answer": false, "explanation": "法150条1項。保険者は特定健康診査等を「行うものとする」と規定されており、努力義務（努めなければならない）ではない。[1]", "year": "H28-4E", "category": "保健福祉事業"}, {"id": 360, "question": "保険者は、被保険者等の健康の保持増進のために必要な事業を行うに当たって必要があると認めるときは、労働安全衛生法に基づき保存されている特定健康診査に相当する健康診断の記録の写しの提供を事業者に求めることができ、事業者はこれを提供しなければならない。", "answer": true, "explanation": "法150条1項〜3項。保険者による健診記録の写しの提供要請、及び事業者の提供義務に関する規定通りの内容である。[1]", "year": "R4-6C", "category": "保健福祉事業"}, {"id": 361, "question": "全国健康保険協会管掌健康保険に係る高額医療費貸付事業の貸付額は、高額療養費支給見込額の90%に相当する額である。", "answer": false, "explanation": "法150条5項、昭和60.4.6庁保発7号。高額医療費貸付事業における貸付額は、支給見込額の「80%」に相当する額である。[1]", "year": "R元-7I", "category": "保健福祉事業"}, {"id": 362, "question": "保険者は、保健事業及び福祉事業に支障がない場合に限り、被保険者等でない者にこれらの事業を利用させることができ、その利用者に対し利用料を請求することができる。", "answer": true, "explanation": "法150条6項、則154条。被保険者等以外の者への事業利用の開放、及び利用料の徴収に関する正しい記述である。[1]", "year": "R2-7C", "category": "保健福祉事業"}, {"id": 363, "question": "被保険者の資格、標準報酬又は保険給付に関する処分に不服がある者が提起する当該処分の取消しの訴えは、社会保険審査官の決定前であっても提起することができる。", "answer": false, "explanation": "法192条。これらの処分に関する取消しの訴えは、審査請求に対する社会保険審査官の決定を経た後でなければ提起できない（不服申立て前置主義）。[1]", "year": "R4-7C", "category": "不服申立て"}, {"id": 364, "question": "保険料その他の徴収金の賦課・徴収又は滞納に関する処分に不服がある者は、社会保険審査官に対して審査請求をしなければならない。", "answer": false, "explanation": "法190条。徴収金の賦課等に関する処分への不服は、審査官ではなく「社会保険審査会」に対して審査請求を行う。[1]", "year": "H18-10B", "category": "不服申立て"}, {"id": 365, "question": "保険料等の賦課又は徴収の処分に不服がある場合の社会保険審査会に対する審査請求は、その処分があったことを知った日の翌日から起算して2月を経過したときは、することができない。", "answer": false, "explanation": "法190条、社審法32条2項。審査請求の期間は「2月」ではなく「3月」以内である。[1]", "year": null, "category": "不服申立て"}, {"id": 366, "question": "事業主は、健康保険に関する書類（被保険者の資格の取得及び喪失、報酬月額等に関するもの）をその完結の日から3年間保存しなければならない。", "answer": false, "explanation": "則34条。健康保険に関する書類の保存期間は「2年間」である。[1]", "year": null, "category": "雑則等"}, {"id": 367, "question": "療養費を受ける権利は、療養に要した費用を支払った日の翌日から2年を経過したときは、時効によって消滅する。", "answer": true, "explanation": "法193条1項。療養費の支給を受ける権利の消滅時効（2年）及びその起算日に関する正しい規定である。[1]", "year": "H24-1B", "category": "雑則等"}, {"id": 368, "question": "傷病手当金を受ける権利の消滅時効は2年であるが、その起算日は労務不能であった日ごとにその翌日である。", "answer": true, "explanation": "法193条1項、昭和30.9.7保険発199号の2。傷病手当金の時効起算日に関する正しい記述である。[1]", "year": "H27-9D", "category": "雑則等"}, {"id": 369, "question": "全国健康保険協会は、被保険者の保険料に関して必要があると認めるときは、事業主に対し、文書の提出を命じ、又は職員を事業所に立ち入らせて帳簿書類を検査させることができる。", "answer": false, "explanation": "法198条1項。事業所への立入検査等の権限を有するのは「厚生労働大臣」であり、全国健康保険協会にはその権限はない。[1]", "year": "R2-1A", "category": "雑則等"}, {"id": 370, "question": "産前産後休業を開始した日が3月7日、産後休業が終了する日が8月10日となる被保険者の場合、事業主の申出により、出産した年の3月から8月までの期間、健康保険料の免除を受けることができる。", "answer": false, "explanation": "法159条の3。保険料が免除されるのは、休業開始日の属する月から「休業終了日の翌日の属する月の前月」までである。終了日が8月10日の場合、その翌日は8月11日（8月）であるため、その前月である「7月分」までが免除期間となり、8月分は免除されない。[1]", "year": "H27-10ア改", "category": "総合問題"}, {"id": 371, "question": "産前産後休業を開始した日が3月7日、産後休業が終了する日が8月10日となる被保険者の場合、事業主が保険者等に申出をしたときは、当該被保険者に係る健康保険料は3月分から7月分まで免除される。", "answer": true, "explanation": "法159条の3。保険料の免除期間は「休業開始日の属する月から休業終了日の翌日の属する月の前月まで」である。終了日が8月10日の場合、その翌日は8月11日（8月）であるため、その前月の7月分までが免除となる。[Source 3, p.217]", "year": "H27-10ア改", "category": "保険料の負担等"}, {"id": 372, "question": "平成26年4月1日以降に70歳に達した被保険者のうち、標準報酬月額が28万円以上であって、かつ被扶養者がいない者の年収が383万円以上である場合、療養の給付に係る一部負担金の割合は3割となる。", "answer": true, "explanation": "法74条1項、令34条。70歳以上の被保険者で現役並み所得者（標準報酬月額28万円以上）に該当する場合、年収による再判定（単身世帯で383万円未満等）で該当しない限り、3割負担となる。[Source 3, p.219]", "year": "H27-選改", "category": "療養の給付"}, {"id": 373, "question": "全国健康保険協会管掌健康保険における高額医療費貸付事業の貸付額は、高額療養費支給見込額の80%に相当する額である。", "answer": true, "explanation": "法150条5項、昭和60.4.6庁保発7号。協会の福祉事業として行われる高額医療費の貸付割合に関する正しい記述である。[Source 3, p.207]", "year": "R元-7I", "category": "保健福祉事業"}, {"id": 374, "question": "被保険者が就業時間中に労務不能となった場合、その日の賃金の全部又は一部を受けていたか否かにかかわらず、その当日から傷病手当金の待期期間を起算する。", "answer": true, "explanation": "法99条1項、昭和28.1.9保文発69号。就業時間中の発症による労務不能は、その日を待期期間の初日としてカウントする。[Source 3, p.166]", "year": "H28-3C", "category": "傷病手当金"}, {"id": 375, "question": "出産育児一時金の額は、産科医療補償制度に加入する医療機関等での在胎週数22週以降の出産の場合、50万円（本体48万8千円＋加算1万2千円）とされている。", "answer": true, "explanation": "法101条、令36条。現在の支給額および産科医療補償制度加算に関する正しい記述である。[Source 3, p.175]", "year": "H27-6A改", "category": "出産育児一時金"}, {"id": 376, "question": "特例退職被保険者の標準報酬月額は、特定健康保険組合が管掌する前年9月30日における特例退職被保険者「以外」の全被保険者の平均額の範囲内で規約が定めた額を報酬月額とみなして決定する。", "answer": true, "explanation": "法附則3条4項。算定の基礎となる平均額の算出対象から「特例退職被保険者」は除外される点に注意。[Source 3, p.207]", "year": "R6-3I", "category": "任意継続被保険者等の標準報酬月額"}, {"id": 377, "question": "標準賞与額の年度累計（上限573万円）の計算は、被保険者が転職等により保険者が変わった場合には、それぞれの保険者ごとに累計を行う。", "answer": true, "explanation": "法45条1項。標準賞与額の累計は保険者単位で行われるため、保険者が変わればそれまでの累計額は引き継がれない。[Source 3, p.208]", "year": "H27-9B", "category": "標準賞与額"}, {"id": 378, "question": "厚生労働大臣が健康保険料、厚生年金保険料及び子ども・子育て拠出金を徴収する場合において、事業主から一部の納付があったときは、それぞれの額に基づき按分した額がそれぞれの保険料等に充当される。", "answer": true, "explanation": "法159条の2。一部納付があった場合の充当ルール（按分充当）に関する正しい記述である。[Source 3, p.212]", "year": "R2-4A", "category": "保険料"}, {"id": 379, "question": "厚生労働大臣は、協会管掌健康保険の都道府県単位保険料率が健全な運営に支障があると認めるときは、全国健康保険協会に対し、期間を定めて当該保険料率の変更認可を申請すべきことを命ずることができる。", "answer": true, "explanation": "法160条10項。保険料率が不適当と認められる場合の厚生労働大臣の是正命令権に関する規定である。[Source 3, p.215]", "year": "H29-4ア改", "category": "保険料率"}, {"id": 380, "question": "育児休業等を開始した日の属する月と終了する日の翌日が属する月が同一である場合でも、その月における育児休業等の日数が14日以上であるときは、その月の保険料は免除される。", "answer": true, "explanation": "法159条1項2号。同月内の短期間の育休でも、日数が14日以上（特例計算含む）であれば免除の対象となる。[Source 3, p.219]", "year": "R5-9ウ改", "category": "保険料の負担等"}, {"id": 381, "question": "ガソリン単価の変動に基づいて毎月通勤手当の額を変更している事業所において、その変更は固定的賃金の変動として標準報酬月額の随時改定の対象となりうる。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。価格変動に基づく変更であっても、継続的な賃金体系に基づくものであれば固定的賃金の変動に含まれる。[Source 3, p.199]", "year": "R4-7D", "category": "随時改定"}, {"id": 382, "question": "労働基準法第91条の規定に基づく「減給の制裁」によって報酬が2等級以上減少した場合、標準報酬月額の随時改定の対象とはならない。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。制裁による一時的な報酬減少は「固定的賃金の変動」には該当しないため、随時改定は行われない。[Source 3, p.201]", "year": "R4-8A", "category": "随時改定"}, {"id": 383, "question": "労災保険の休業補償給付を受けている被保険者が業務外の傷病により労務不能となった場合、休業補償給付の額が健康保険の傷病手当金の額を下回るときは、その差額が傷病手当金として支給される。", "answer": true, "explanation": "法99条1項、昭和33.7.8保険発95号。労災保険との支給調整における正しいルールである。[Source 3, p.171]", "year": "R2-10A", "category": "傷病手当金"}, {"id": 384, "question": "被保険者が妊娠4か月（85日）以上で死産した場合、出産育児一時金は支給されるが、家族埋葬料は支給されない。", "answer": true, "explanation": "法101条、法113条、昭和23.12.2保文発898号。死産児は被扶養者の要件を満たさないため埋葬料の対象外だが、一時金は妊娠月数により支給される。[Source 3, p.73]", "year": "H21-5D", "category": "資格喪失後の給付"}, {"id": 385, "question": "被保険者の死亡により支給される埋葬料の額は、5万円の定額である。", "answer": true, "explanation": "法100条1項、令35条。埋葬料は標準報酬月額にかかわらず一律5万円である。[Source 3, p.73]", "year": "H19-9B", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 386, "question": "被保険者の資格を喪失した日後6か月以内に出産したときは、被保険者期間の要件（喪失前1年以上）を満たしていれば、出産育児一時金の支給を受けることができる。", "answer": true, "explanation": "法106条。資格喪失後の出産育児一時金に関する正しい支給要件である。[Source 3, p.76]", "year": "H21-5D改", "category": "資格喪失後の給付"}, {"id": 387, "question": "保険者は、偽りその他不正の行為により保険給付を受けた者があるときは、その者から、給付額の全部又は一部を徴収することができる。", "answer": true, "explanation": "法58条1項。不正受給に対する徴収金（不当利得返還）の規定通りである。[Source 3, p.191]", "year": "H23-3D", "category": "受給権の保護 ・ 併給調整等"}, {"id": 388, "question": "療養の給付の範囲には、診察、薬剤の支給、処置、手術などは含まれるが、「移送」は含まれない。", "answer": true, "explanation": "法63条1項。移送は「療養の給付」とは別個の給付（移送費）として規定されている。[Source 3, p.47]", "year": "H21-7C改", "category": "療養の給付"}, {"id": 389, "question": "厚生労働大臣により健全化計画の策定を命じられた健康保険組合は、翌年度を初年度とする3か年間の健全化計画を定め、厚生労働大臣の承認を受けなければならない。", "answer": true, "explanation": "法28条1項、2項。収支が均衡しない組合に対する健全化計画（3か年計画）に関する規定である。[Source 3, p.152]", "year": "R6-4C", "category": "健康保険組合"}, {"id": 390, "question": "健康保険組合の理事のうち、1人は理事長とし、事業主である理事のうちから、理事が選挙する。", "answer": true, "explanation": "法21条3項。健康保険組合の理事長の選任方法に関する規定通りの内容である。[Source 3, p.153]", "year": "R3-2B", "category": "健康保険組合"}, {"id": 391, "question": "健康保険組合の設立、合併又は分割を伴う、健康保険組合が管掌する一般保険料率の変更においては、厚生労働大臣の権限を地方厚生局長に委任することができる。", "answer": false, "explanation": "法160条13項、則159条1項8号。一般保険料率の変更の認可権限は原則として地方厚生局長に委任されているが、設立・合併・分割を伴う場合は委任の対象外であり、厚生労働大臣が行う。[Source 3, p.7]", "year": "R6-6A", "category": "健康保険組合"}, {"id": 392, "question": "健康保険組合である保険者の開設する病院若しくは診療所又は薬局は、保険医療機関としての指定を受けなくとも当該健康保険組合以外の保険者の被保険者の診療を行うことができる。", "answer": false, "explanation": "法63条3項3号。自組合の被保険者以外を診療するためには、原則として保険医療機関等の指定を受ける必要がある。[Source 3, p.125]", "year": "R6-7B", "category": "保険医療機関及び保険薬局等"}, {"id": 393, "question": "全国健康保険協会は、事業年度ごとの業績について評価を受け、その評価の結果を公表しなければならない。", "answer": false, "explanation": "法7条の30。協会の業績評価を行い、その結果を公表するのは協会自身ではなく、厚生労働大臣である。[Source 3, p.139]", "year": "R6-1A", "category": "全国健康保険協会"}, {"id": 394, "question": "健康保険組合は、毎年度終了後6か月以内に、厚生労働省令で定めるところにより、事業及び決算に関する報告書を作成し、厚生労働大臣に提出しなければならない。", "answer": true, "explanation": "令24条1項。健康保険組合の事業・決算報告書の提出期限に関する規定通りである。[Source 3, p.17]", "year": "R6-4D", "category": "健康保険組合"}, {"id": 395, "question": "健康保険組合が解散したとき、全国健康保険協会が健康保険組合の権利義務を承継する。", "answer": true, "explanation": "法26条4項。健康保険組合が解散した場合の権利義務の承継先は全国健康保険協会である。[Source 3, p.17]", "year": "R6-3ア改", "category": "健康保険組合"}, {"id": 396, "question": "週3日勤務のパートタイム労働者が、雇用契約の見直しにより週4日勤務となり、いわゆる「4分の3基準」を満たすこととなった場合、その勤務形態が変更となった日から被保険者の資格を取得する。", "answer": true, "explanation": "法3条1項9号。労働条件の変更により適用除外の要件に該当しなくなったときは、その事実があった日から被保険者となる。[Source 3, p.33]", "year": "R6-10D", "category": "一般の被保険者等"}, {"id": 397, "question": "被保険者の総数が常時100人以下の企業であっても、健康保険に加入することについての労使の合意がなされた場合は、一定の要件を満たす短時間労働者は、企業単位で健康保険の被保険者となる。", "answer": true, "explanation": "法附則46条5項、7項。特定適用事業所以外の事業所であっても、労使合意により任意特定適用事業所となることができる。[Source 3, p.33]", "year": "R6-2A", "category": "一般の被保険者等"}, {"id": 398, "question": "任意継続被保険者は、任意継続被保険者でなくなることを希望する旨を保険者に申し出た場合、その申出をした日の属する月の末日が到来したときは、その翌日から資格を喪失する。", "answer": false, "explanation": "法38条7号。資格を喪失するのは「申出が受理された日」の属する月の末日の翌日である。申出日ではない。[Source 3, p.49]", "year": "R6-1B", "category": "任意継続被保険者等"}, {"id": 399, "question": "健康保険組合において、任意継続被保険者の標準報酬月額を決定する際、規約で定めることにより、当該被保険者の資格喪失時の標準報酬月額をそのまま用いることができる場合がある。", "answer": true, "explanation": "法47条1項。健康保険組合では、規約により、喪失時の標準報酬月額が全被保険者平均を超える場合などに特例を設けることができる。[Source 3, p.197]", "year": "R6-1E", "category": "標準報酬月額"}, {"id": 400, "question": "全国健康保険協会管掌健康保険において、適用事業所以外の事業所の任意適用の申請に対する厚生労働大臣の認可の権限に係る事務は、日本年金機構に委任されている。", "answer": true, "explanation": "法205条、則159条1項3号。任意適用の認可に係る事務は、協会けんぽについては日本年金機構が行う。[Source 3, p.7]", "year": "H30-4E", "category": "権限の委任等"}, {"id": 401, "question": "被保険者の資格の取得及び喪失は、保険者等の確認によって、その効力を生ずる。ただし、任意適用事業所の取消しの認可があったことによる被保険者の資格の喪失並びに任意継続被保険者の資格の得喪は、この限りでない。", "answer": true, "explanation": "法39条1項。資格得喪の効力発生における「確認」の要否に関する規定通りである。[Source 3, p.11]", "year": "H29-1C", "category": "適用事業所・被保険者"}, {"id": 402, "question": "被保険者又はその被扶養者が40歳に達することにより介護保険第2号被保険者に該当するに至ったときは、遅滞なく届書を提出しなければならない。", "answer": false, "explanation": "則41条1項。40歳に達したことによる該当については、年齢により判別可能なため届出は不要である。[Source 3, p.65]", "year": "H29-2A", "category": "資格の得喪の確認及び届出等"}, {"id": 403, "question": "健康保険法における標準報酬月額の等級区分は、現在、第1級（58,000円）から第50級（1,390,000円）までとなっている。", "answer": true, "explanation": "法40条1項。現在の標準報酬月額の等級区分に関する正しい記述である。[Source 3, p.71]", "year": "H29-2B", "category": "標準報酬月額"}, {"id": 404, "question": "被扶養者の認定において、同一世帯かつ収入基準を満たしている場合であっても、最終的には当該被保険者がその世帯の中心的役割を果たしているか等により判断される。", "answer": true, "explanation": "法3条7項、通知。形式的な基準だけでなく、生計維持関係の実態が重視される。[Source 3, p.57]", "year": "R元-5C改", "category": "被扶養者"}, {"id": 405, "question": "任意継続被保険者が保険料を納付期日（その月の10日）までに納めなかった場合、督促状により指定する期限の翌日にその資格を喪失する。", "answer": false, "explanation": "法38条3号。任意継続被保険者の場合は督促は行われず、納付期限の「翌日」に当然に資格を喪失する。[Source 3, p.115]", "year": "H29-2E", "category": "保険料の納付"}, {"id": 406, "question": "2以上の適用事業所の事業主が同一である場合には、当該事業主は、厚生労働大臣の「認可」を受けて、当該2以上の事業所を1つの適用事業所とすることができる。", "answer": false, "explanation": "法34条1項。1つの事業所とみなす一括適用の手続きは、大臣の認可ではなく「承認」である。[Source 3, p.11]", "year": "H29-4A", "category": "適用事業所"}, {"id": 407, "question": "法人の代表者であっても、法人から労働の対償として報酬を受けている場合には、その法人に使用される者として被保険者となる。", "answer": true, "explanation": "法3条1項、通知。法人との間に使用関係が認められる代表者等は被保険者に該当する。[Source 3, p.149]", "year": "R元-4ア", "category": "適用事業所・被保険者"}, {"id": 408, "question": "保険医療機関として指定を受けた病院であっても、健康保険組合が開設した病院は、診療の対象者をその組合員である被保険者及び被扶養者のみに限定することができる。", "answer": false, "explanation": "法63条3項3号。保険医療機関の指定を受けている以上、自組合の組合員等に限定した診療を行うことはできない。[Source 3, p.127]", "year": "H30-2A", "category": "保険医療機関及び保険薬局等"}, {"id": 409, "question": "任意適用事業所の適用の取消しの認可があったことによる被保険者資格の喪失は、保険者等の「確認」を要さず、その効力を生ずる。", "answer": true, "explanation": "法39条1項。任意適用取消による喪失は、認可という行政処分があった時点で確定するため、別途「確認」は不要である。[Source 3, p.63]", "year": "H30-2C", "category": "資格の得喪の確認及び届出等"}, {"id": 410, "question": "事業所の廃止により事業主が変更になった場合、保険料の納期前であっても、そのすべてを徴収することができる（繰上徴収）。", "answer": true, "explanation": "法172条3号。事業所の廃止（事業譲渡等含む）は、保険料の繰上徴収ができる事由に該当する。[Source 3, p.123]", "year": "H30-6B", "category": "滞納に対する措置等"}, {"id": 411, "question": "被保険者が多胎妊娠し、出産予定日より3日遅れて出産した場合、出産日以前の出産手当金の支給日数は45日となる。", "answer": false, "explanation": "多胎妊娠の場合、出産の日（予定日より遅れた場合はその日）以前「98日」から出産の日後56日までの間において、出産手当金が支給される。本問の場合、予定日以前98日と遅延した3日分を合わせた期間が対象となる。[Source 3, p.217, 280]", "year": "H27-10イ改", "category": "出産手当金"}, {"id": 412, "question": "事業主は、産前産後休業期間中における健康保険料の免除期間の終了月の翌月から、子が1歳に達した日の翌日が属する月の前月までの期間について、育児休業等期間中における健康保険料の免除を申し出ることができる。", "answer": true, "explanation": "育児休業等を開始した日の属する月から、終了日の翌日が属する月の前月まで免除される規定通りの内容である。[Source 3, p.217, 280]", "year": "H27-10ウ", "category": "保険料の負担等"}, {"id": 413, "question": "育児休業等終了日の翌日において使用される事業所で継続して使用された期間の報酬支払基礎日数が、3か月のうち特定の月で17日未満であっても、その他の月が17日以上あり、従前の標準報酬月額と比べて1等級以上の差がある場合には育児休業等終了時改定を申し出ることができる。", "answer": true, "explanation": "育児休業等終了時改定は、3か月のうち支払基礎日数が17日（短時間労働者は11日）以上の月を対象に算定し、1等級以上の差があれば改定の対象となる。[Source 3, p.217, 280]", "year": "H27-10エ", "category": "育児休業等終了時改定"}, {"id": 414, "question": "職場復帰後に育児休業等終了時改定に該当した場合は、改定後の標準報酬月額がその翌年の8月までの各月の標準報酬月額となる（7月から12月に改定された場合を除く）。", "answer": true, "explanation": "育児休業等終了時改定によって決定された標準報酬月額の有効期間に関する正しい記述である。[Source 3, p.217, 280]", "year": "H27-10オ", "category": "育児休業等終了時改定"}, {"id": 491, "question": "全国健康保険協会の運営委員会の委員は、事業主、被保険者及び全国健康保険協会の業務の適正な運営に必要な学識経験を有する者のうちから、全国健康保険協会の理事長が各同数を任命する。", "answer": false, "explanation": "法7条の19第1項。運営委員会の委員を任命するのは「理事長」ではなく「厚生労働大臣」である。[R6-1C]", "year": "R6", "category": "全国健康保険協会"}, {"id": 492, "question": "任意継続被保険者が初めて納付すべき保険料を除き、保険料をその納付期日までに納付しなかった場合（納付の遅延について正当な理由があると保険者が認めたときを除く。）、その納付期日の翌日に任意継続被保険者の資格を喪失する。", "answer": true, "explanation": "法38条3号。任意継続被保険者の未納による資格喪失規定通りである。[R6-1D]", "year": "R6", "category": "任意継続被保険者"}, {"id": 493, "question": "特定適用事業所に使用される短時間労働者が被保険者となるための要件の1つとして、報酬（最低賃金法に掲げる賃金に相当するものとして厚生労働省令で定めるものを除く。）が、月額88,000円以上であることが必要である。", "answer": true, "explanation": "法3条1項9号ハ。短時間労働者の被保険者資格の取得要件（月額賃金8.8万円以上）に関する規定通りである。[R6-2B]", "year": "R6", "category": "被保険者"}, {"id": 494, "question": "健康保険組合に対して交付する事務費に係る国庫負担金は、各健康保険組合における被保険者数を基準として、厚生労働大臣が算定する。また、その国庫負担金は概算払いをすることができる。", "answer": true, "explanation": "法151条、法152条。事務費の国庫負担および概算払いに関する規定通りである。[R6-2C]", "year": "R6", "category": "国庫負担等"}, {"id": 495, "question": "被保険者が40歳に達したことにより、介護保険第2号被保険者に該当するに至ったときは、当該被保険者が使用される事業所の事業主は、遅滞なくその旨を記載した届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": false, "explanation": "則41条1項。40歳到達による該当については年齢により判別可能なため、原則として届出は不要である。[R6-2D]", "year": "R6", "category": "届出等"}, {"id": 496, "question": "厚生労働大臣は、日雇特例被保険者に係る健康保険事業に要する費用に充てるため、保険料のほかに、一般の被保険者を雇用する事業主が設立する健康保険組合から拠出金を徴収する。", "answer": true, "explanation": "法173条1項。日雇特例被保険者に係る事業費のための日雇拠出金に関する規定通りである。[R6-2E]", "year": "R6", "category": "日雇特例被保険者"}, {"id": 497, "question": "事業主は、産前産後休業をしている被保険者が厚生労働省令で定めるところにより保険者等に申出をしたときは、その産前産後休業を開始した日の属する月からその産前産後休業が終了する日の翌日が属する月の前月までの期間、当該被保険者に係る保険料の免除を受けることができる。", "answer": true, "explanation": "法159条の3第1項。産前産後休業期間中の保険料免除規定通りである。[R6-3A]", "year": "R6", "category": "保険料の負担等"}, {"id": 498, "question": "標準賞与額の決定において、その月に当該被保険者が受けた賞与によりその年度における標準賞与額の累計額が573万円を超えることとなる場合には、当該累計額が573万円となるようその月の標準賞与額を決定する。", "answer": true, "explanation": "法45条1項。標準賞与額の年度累計額の上限（573万円）に関する規定通りである。[R6-3B]", "year": "R6", "category": "標準賞与額"}, {"id": 499, "question": "任意継続被保険者は、初めて納付すべき保険料を除き、保険料をその納付期日までに納付しなかったとき（納付の遅延について正当な理由があると保険者が認めたときを除く。）は、その翌日から資格を喪失する。ただし、その日にさらに一般の被保険者の資格を取得したときは、この限りでない。", "answer": true, "explanation": "法38条3号。任意継続被保険者の資格喪失事由（未納）および同日得喪の特例に関する正しい記述である。[R6-3C]", "year": "R6", "category": "任意継続被保険者"}, {"id": 500, "question": "健康保険法第63条第2項の規定により、入院時の食事の提供である療養であって入院療養と併せて行うもの（特定長期入院被保険者に係るものを除く。）は、療養の給付の範囲には含まれない。", "answer": true, "explanation": "法63条2項1号。入院時の食事療養は「療養の給付」から除外され、別個の「入院時食事療養費」として給付される。[R6-4A]", "year": "R6", "category": "療養の給付"}, {"id": 501, "question": "健康保険組合は、特定の保険医療機関と合意した場合には、自ら審査及び支払いに関する事務を行うことができ、公費負担医療に係る診療報酬請求書の審査及び支払いに関する事務についても自ら行うことができる。", "answer": false, "explanation": "法76条5項。公費負担医療に係る審査支払事務は、社会保険診療報酬支払基金が行うこととされており、健康保険組合が自ら行うことはできない。[R6-4B]", "year": "R6", "category": "療養の給付"}, {"id": 502, "question": "被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者（任意継続被保険者等を除く。）であった者が、資格喪失後の継続給付として傷病手当金の支給を受ける場合、その額の算定には、喪失日の前日が属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額を用いる。", "answer": true, "explanation": "法99条2項、則84条の2第1項。資格喪失後の傷病手当金の額の算定基礎に関する規定通りである。[R6-4E]", "year": "R6", "category": "資格喪失後の給付"}, {"id": 503, "question": "保険者は、給付事由が第三者の行為によって生じた場合において、保険給付を行ったときは、その給付の価額の限度において、保険給付を受ける権利を有する者が第三者に対して有する損害賠償の請求権を取得する。", "answer": true, "explanation": "法57条1項。第三者行為による損害賠償請求権の代位取得に関する規定通りである。[R6-5B]", "year": "R6", "category": "給付制限・損害賠償との調整"}, {"id": 504, "question": "保険料その他健康保険法の規定による徴収金を滞納する者があるときは、保険者は期限を指定してこれを督促しなければならないが、その督促状により指定する期限は、督促状を発する日から起算して10日以上を経過した日でなければならない。", "answer": true, "explanation": "法180条3項。督促状による指定期限のルール（10日以上）に関する正しい記述である。[R6-5C]", "year": "R6", "category": "滞納に対する措置等"}, {"id": 505, "question": "保険料の延滞金の計算において、その計算期間の起算日は、保険料の納期限の翌日である。", "answer": true, "explanation": "法181条1項。延滞金の計算期間の起算点に関する正しい規定である。[R6-5D]", "year": "R6", "category": "滞納に対する措置等"}, {"id": 506, "question": "任意継続被保険者が保険料を前納する場合の額は、前納に係る期間の各月の保険料の合計額から、年4%の利率による複利現価法によって割り引いた額を控除した額とする。", "answer": true, "explanation": "令49条。任意継続被保険者の保険料前納額の算出方法（複利現価法による割引）に関する規定通りである。[R6-6B]", "year": "R6", "category": "保険料の納付"}, {"id": 507, "question": "健康保険組合は、規約の変更、合併又は分割、解散のほか、毎年度の予算、決算、事業報告についても公告しなければならない。", "answer": true, "explanation": "則15条、則21条、則22条等。健康保険組合における広範な公告義務に関する正しい内容である。[R6-6C]", "year": "R6", "category": "健康保険組合"}, {"id": 508, "question": "適用事業所の事業主は、被保険者が報酬を受けなくなったとき（標準報酬月額の随時改定の要件に該当したとき）は、5日以内に被保険者報酬月額変更届を提出しなければならない。", "answer": false, "explanation": "則26条1項。随時改定の届出（月変届）の提出期限は「5日以内」ではなく「速やかに」である。[R6-6D]", "year": "R6", "category": "届出等"}, {"id": 509, "question": "被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者（任意継続被保険者等を除く。）であった者が、資格喪失の日後6か月以内に出産したときは、被保険者として受けることができるはずであった出産育児一時金の支給を最後の保険者から受けることができる。", "answer": true, "explanation": "法106条。資格喪失後の出産育児一時金の支給要件（喪失後6か月以内、喪失前1年以上の被保険者期間）に関する規定通りである。[R6-6E]", "year": "R6", "category": "資格喪失後の給付"}, {"id": 510, "question": "健康保険の適用事業所に所属する法人の代表者は、5人未満の適用事業所である場合に限り、当該法人における一般の従業員が従事する業務と同一の業務に従事して生じた傷病に関しても、健康保険の保険給付の対象となる場合がある。", "answer": true, "explanation": "法53条の2、則52条の2。5人未満の適用事業所の役員等に対する保険給付の特例に関する正しい記述である。[R6-10A]", "year": "R6", "category": "療養の給付"}, {"id": 511, "question": "健康保険法において「報酬」とは、賃金、給料、俸給、手当、賞与その他いかなる名称であるかを問わず、労働者が、労働の対償として受けるすべてのものをいう。ただし、臨時に受けるもの及び3か月を超える期間ごとに受けるものは、これに含まれない。", "answer": true, "explanation": "法3条5項。報酬の定義に関する規定通りである。なお、3か月を超える期間ごとに受けるものは「賞与」に該当する。[Source 3, p.69]", "year": "R5", "category": "報酬等の定義"}, {"id": 512, "question": "被保険者が、労働協約又は就業規則により雇用関係は存続するが会社より賃金の支給を停止された場合、例えば病気休職であって実務に服する見込みがあるときは、賃金の支払停止は一時的なものであり使用関係は存続するものとみられるため、被保険者資格は喪失しない。", "answer": true, "explanation": "法36条、昭和26.3.9保文発619号。病気休職中であっても、使用関係が存続していれば被保険者資格は継続する。[Source 3, p.45]", "year": "R5", "category": "一般の被保険者等"}, {"id": 513, "question": "事業所の休業にかかわらず、事業主が休業手当を健康保険の被保険者に支給する場合、当該被保険者の健康保険の被保険者資格は喪失する。", "answer": false, "explanation": "法36条、昭和25.4.14保発20号。事業主から休業手当が支払われている間は使用関係が存続しているとみなされるため、資格は継続する。[Source 3, p.45]", "year": "R5", "category": "一般の被保険者等"}, {"id": 514, "question": "適用事業所に臨時に使用される者で、当初の雇用期間が2か月以内の期間を定めて使用される者であっても、雇用契約が更新されることが見込まれる場合には、最初の雇用契約期間の開始時から被保険者となる。", "answer": true, "explanation": "法3条1項2号ロ。当初から2か月を超えて使用される見込みがある場合は、適用除外に該当せず、初めから被保険者となる。[Source 3, p.37]", "year": "R5", "category": "一般の被保険者等"}, {"id": 515, "question": "任意継続被保険者が、任意継続被保険者でなくなることを希望する旨を保険者に申し出た場合において、その申出が受理された日の属する月の末日が到来したときは、その翌日にその資格を喪失する。", "answer": true, "explanation": "法38条7号。令和4年1月施行の改正により、申出による資格喪失が認められるようになった。[Source 3, p.49]", "year": "R5", "category": "任意継続被保険者"}, {"id": 516, "question": "健康保険組合は、毎年度終了後6か月以内に、厚生労働省令で定めるところにより、事業及び決算に関する報告書を作成し、厚生労働大臣に提出しなければならない。", "answer": true, "explanation": "令24条1項。健康保険組合の事業報告書等の提出期限に関する規定通りである。[Source 3, p.17]", "year": "R5", "category": "健康保険組合"}, {"id": 517, "question": "標準報酬月額の定時決定（算定基礎届）において、4月、5月、6月の各月とも報酬支払基礎日数が17日未満（短時間労働者は11日未満）であるときは、従前の標準報酬月額をそのまま用いる。", "answer": true, "explanation": "法41条1項、法44条1項。算定対象となる月が1か月もない場合は、保険者算定により従前の標準報酬月額で決定される。[Source 3, p.79]", "year": "R5", "category": "標準報酬月額"}, {"id": 518, "question": "産前産後休業終了時改定によって決定された標準報酬月額は、その年の8月（改定月が7月から12月の場合は翌年8月）まで有効である。", "answer": true, "explanation": "法43条の3第2項。改定後の標準報酬月額の有効期間に関する規定通りである。[Source 3, p.91]", "year": "R5", "category": "標準報酬月額"}, {"id": 519, "question": "事業主は、被保険者に支払う報酬がないため保険料を控除できない場合でも、被保険者の負担する保険料について納付する義務を負う。", "answer": true, "explanation": "法161条2項。保険料の納付義務は第一義的に事業主が負っており、報酬からの控除の可否に関わらず全額を納付しなければならない。[Source 3, p.113]", "year": "R5", "category": "保険料の納付"}, {"id": 520, "question": "任意継続被保険者が将来の一定期間の保険料を前納した場合、前納された保険料については、前納に係る期間の各月の初日が到来したときに、それぞれその月の保険料が納付されたものとみなす。", "answer": true, "explanation": "法165条3項。前納保険料の納付擬制時期に関する規定通りである。[Source 3, p.117]", "year": "R5", "category": "保険料の納付"}, {"id": 521, "question": "療養の給付の範囲には、診察、薬剤の支給、処置、手術のほか、病院への入院及びその療養に伴う世話その他の看護も含まれる。", "answer": true, "explanation": "法63条1項。療養の給付の範囲に関する正しい記述である。[Source 3, p.137]", "year": "R5", "category": "療養の給付"}, {"id": 522, "question": "70歳以上の被保険者のうち、標準報酬月額が28万円以上であっても、単身世帯で年収が383万円未満である場合には、申請により一部負担金の割合が2割（誕生日が平成26年4月1日以前の者は1割）となる。", "answer": true, "explanation": "法74条1項、令34条。現役並み所得者の判定における収入による再判定に関する正しい記述である。[Source 3, p.133]", "year": "R5", "category": "療養の給付"}, {"id": 523, "question": "入院時食事療養費の額は、厚生労働大臣が定める基準により算定した費用の額から、食事療養標準負担額を控除した額とする。", "answer": true, "explanation": "法85条2項。入院時食事療養費の算出式に関する規定通りである。[Source 3, p.141]", "year": "R5", "category": "入院時食事療養費"}, {"id": 524, "question": "傷病手当金の支給を受けている者が、さらに業務外の事由による別の傷病により労務不能となった場合、後の傷病に係る待期期間を経過した日を後の傷病に係る支給開始日として、いずれか多い額の傷病手当金が支給される。", "answer": true, "explanation": "法99条、平成27.12.18事務連絡。複数の傷病が重なった場合の支給調整ルールの通りである。[Source 3, p.169]", "year": "R5", "category": "傷病手当金"}, {"id": 525, "question": "別居している兄弟が共に被保険者であり、その父を等分の扶養により生計維持している場合、父が死亡したときの家族埋葬料は、兄弟の一方の被保険者にのみ支給される。", "answer": true, "explanation": "法113条、昭和23.4.28保発623号。同一の被扶養者の死亡について、家族埋葬料が重複して支給されることはない。[Source 3, p.175]", "year": "R5", "category": "埋葬料等"}, {"id": 526, "question": "被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者（任意継続被保険者等を除く。）であった者が、資格喪失の日において傷病手当金の支給を受けている場合は、その支給を始めた日から通算して1年6か月間、継続給付として受けることができる。", "answer": true, "explanation": "法104条。資格喪失後の傷病手当金の継続給付に関する規定通りである。[Source 3, p.181]", "year": "R4", "category": "資格喪失後の給付"}, {"id": 527, "question": "保険者は、被保険者が少年院その他これらに準ずる施設に収容されたときは、その期間、疾病、負傷又は出産に関する保険給付を行わない。ただし、被扶養者に係る保険給付についてはこの限りではない。", "answer": true, "explanation": "法118条1項1号、2項。被保険者本人への給付は制限されるが、被扶養者への給付は制限されない。[Source 3, p.193]", "year": "R5", "category": "給付制限"}, {"id": 528, "question": "高額療養費の世帯合算において、70歳未満の者の場合は、同一月内に同一の病院等で支払った一部負担金のうち、21,000円以上のものが合算の対象となる。", "answer": true, "explanation": "法115条、令41条1項。70歳未満の世帯合算における21,000円基準に関する規定通りである。[Source 3, p.157]", "year": "R4", "category": "高額療養費"}, {"id": 529, "question": "健康保険の時効に関して、保険料を徴収し、又はその還付を受ける権利及び保険給付を受ける権利は、2年を経過したときは時効によって消滅する。", "answer": true, "explanation": "法193条1項。徴収金および保険給付の消滅時効（2年）に関する規定通りである。[Source 3, p.211]", "year": "R3", "category": "時効"}, {"id": 530, "question": "事業主が、正当な理由がなくて被保険者の資格の取得に関する事項を届け出なかったときは、6か月以下の懲役又は50万円以下の罰金に処せられる。", "answer": true, "explanation": "法208条1号。届出義務違反に対する罰則規定通りの内容である。[Source 3, p.86]", "year": "R4", "category": "雑則・罰則"}, {"id": 531, "question": "法人の代表者であっても、法人から労働の対償として報酬を受けている場合には、その法人に使用される者として被保険者となる。", "answer": true, "explanation": "法3条1項、通知。法人との間に使用関係が認められる代表者などは被保険者に該当する。[Source 3, p.149]", "year": "H27", "category": "被保険者"}, {"id": 532, "question": "被保険者が同時に2以上の事業所に使用される場合において、それぞれの事業所の保険者が異なる場合は被保険者が保険者を選択するが、いずれも協会けんぽであれば、管轄の年金事務所が異なっても届出は不要である。", "answer": false, "explanation": "法7条、則1条の3等。2以上の事業所の保険者がいずれも協会であっても、年金事務所の業務が分掌されている場合は届出が必要である。[Source 3, p.39]", "year": "H27", "category": "被保険者"}, {"id": 533, "question": "共済組合の組合員である被保険者については、当該共済組合の給付の種類及び程度が健康保険法の規定以上である場合に限り、健康保険からの保険給付は行われない。", "answer": true, "explanation": "法200条1項。共済組合の給付水準が健康保険と同等以上であれば、健康保険の給付は行われず保険料も徴収されない。[Source 3, p.39]", "year": "H27", "category": "被保険者"}, {"id": 534, "question": "70歳以上の被保険者が療養病床に入院し、生活療養を受けた場合、入院時生活療養費が支給されるが、入院医療の必要性が特に高い者については対象外となる。", "answer": false, "explanation": "法85条の2。特定長期入院被保険者（65歳以上）であれば、入院医療の必要性にかかわらず、生活療養を受けた場合は入院時生活療養費の支給対象となる。[Source 3, p.137]", "year": "H27", "category": "入院時生活療養費"}, {"id": 535, "question": "資格取得時の標準報酬月額の決定において、遡って資格取得の届出が行われた場合、当該決定の効力は資格取得の日にさかのぼって生じる。", "answer": true, "explanation": "法42条1項。資格取得時決定の効力は、被保険者の資格を取得した日に遡って生じる。[Source 3, p.81]", "year": "H27", "category": "標準報酬月額"}, {"id": 536, "question": "傷病手当金を受けている被保険者が資格を喪失し、その後に老齢基礎年金等の支給を受けるようになったとき、年金額が傷病手当金の額より少ない場合は、その差額が支給される。", "answer": true, "explanation": "法108条5項。継続給付の傷病手当金と老齢等年金給付との調整規定通り、差額支給が行われる。[Source 3, p.171]", "year": "H27", "category": "傷病手当金"}, {"id": 537, "question": "被保険者が療養のため労務不能となった場合、事業主から報酬の支払があったとしても、その額が傷病手当金の額を下回るときは、その差額が支給される。", "answer": true, "explanation": "法108条1項。労務不能期間中に報酬の支払いがあっても、手当金額との差額があればその分は支給される。[Source 3, p.171]", "year": "H27", "category": "傷病手当金"}, {"id": 538, "question": "高額療養費の対象となる一部負担金等の額には、入院時食事療養費に係る食事療養標準負担額は含まれない。", "answer": true, "explanation": "法115条、令41条。食事療養および生活療養の標準負担額は、高額療養費の算定基礎から除外される。[Source 3, p.157]", "year": "H27", "category": "高額療養費"}, {"id": 539, "question": "70歳未満の所得区分「標準報酬月額53万円以上83万円未満」の者の高額療養費算定基準額は、167,400円＋(医療費−558,000円)×1％である。", "answer": true, "explanation": "令42条1項。当該所得区分における高額療養費の算定式として正しい。[Source 3, p.157]", "year": "H27", "category": "高額療養費"}, {"id": 540, "question": "同時に2以上の事業所に使用される被保険者について高額療養費を算定する場合、それぞれの事業所の報酬合算額に基づく標準報酬月額に応じた所得区分が適用される。", "answer": true, "explanation": "法115条、法44条3項。二以上事業所勤務者の所得区分は、合算された標準報酬月額に基づき判定される。[Source 3, p.161]", "year": "H27", "category": "高額療養費"}, {"id": 541, "question": "健康保険組合を単独で設立しようとする場合、その適用事業所に使用される被保険者の数は、常時700人以上でなければならない。", "answer": true, "explanation": "法11条1項、令1条の3。単独設立の場合の被保険者数基準（700人以上）に関する規定通りである。[Source 3, p.19]", "year": "H28", "category": "健康保険組合"}, {"id": 542, "question": "2以上の適用事業所について健康保険組合を共同で設立しようとする場合、それぞれの事業所ごとに被保険者の2分の1以上の同意を得なければならない。", "answer": true, "explanation": "法12条2項。共同設立における各事業所単位での同意要件に関する規定通りである。[Source 3, p.19]", "year": "H28", "category": "健康保険組合"}, {"id": 543, "question": "健康保険組合の合併は、組合会において組合会議員の定数の3分の2以上の多数による議決を要する。", "answer": false, "explanation": "法23条1項。合併の議決要件は「4分の3以上」の多数である。[Source 3, p.17]", "year": "H28", "category": "健康保険組合"}, {"id": 544, "question": "任意継続被保険者が、任意継続被保険者となった日から起算して2年を経過したときは、その翌日に資格を喪失する。", "answer": true, "explanation": "法38条1号。任意継続被保険者の期間満了（2年）による資格喪失規定通りである。[Source 3, p.49]", "year": "H28", "category": "任意継続被保険者"}, {"id": 545, "question": "健康保険組合の任意継続被保険者の標準報酬月額は、規約で定めることにより、当該組合の全被保険者の平均額を超える額とすることができる場合がある。", "answer": true, "explanation": "法47条1項。健康保険組合では、規約により特例を設けることで、平均額を超えて喪失時の標準報酬月額を用いることが可能である。[Source 3, p.97]", "year": "H28", "category": "標準報酬月額"}, {"id": 546, "question": "標準報酬月額の定時決定（算定基礎）において、4月、5月、6月の3か月間に支払われた報酬をベースとするが、支払基礎日数が17日未満の月がある場合はその月を除外して計算する。", "answer": true, "explanation": "法41条1項。定時決定における支払基礎日数（17日）のルールに関する正しい記述である。[Source 3, p.79]", "year": "H28", "category": "標準報酬月額"}, {"id": 547, "question": "固定的賃金の変動により、標準報酬月額の随時改定を行う場合、従前の標準報酬月額と2等級以上の差が生じなければ改定の対象とならない。", "answer": true, "explanation": "法43条1項。随時改定（月変）における2等級以上の差という要件に関する規定通りである。[Source 3, p.85]", "year": "H28", "category": "標準報酬月額"}, {"id": 548, "question": "標準報酬月額の等級区分において、現在の最高等級は第50級（1,390,000円）である。", "answer": true, "explanation": "法40条1項。現在の等級区分の上限に関する正しい記述である。[Source 3, p.71]", "year": "H28", "category": "標準報酬月額"}, {"id": 549, "question": "70歳以上の被保険者が同一の月に同一の病院で、外来診療により支払った一部負担金が18,000円（一般区分）を超えた場合、その超えた分が高額療養費として支給される。", "answer": true, "explanation": "令42条5項。70歳以上の一般区分における外来限度額（18,000円）に関する規定通りである。[Source 3, p.159]", "year": "H28", "category": "高額療養費"}, {"id": 550, "question": "高額療養費の多数回該当の判定において、直近12か月間に高額療養費（世帯合算分を含む）が支給された月が3か月以上ある場合、4か月目から限度額が引き下げられる。", "answer": true, "explanation": "令42条1項等。多数回該当による自己負担限度額の引き下げルールに関する正しい記述である。[Source 3, p.161]", "year": "H28", "category": "高額療養費"}, {"id": 551, "question": "適用事業所に臨時に使用され、日々雇い入れられている者が、連続して1か月間労務に服し、なお引き続き労務に服したときは一般の被保険者の資格を取得する。この場合、当該事業所の公休日は、労務に服したものとみなして、連続して1か月間の期間の計算に加えるものとされている。", "answer": true, "explanation": "法3条1項2号イ。日々雇い入れられる者が1月を超えて引き続き使用されるに至った場合は被保険者となる。その際、公休日は労務に服したものとみなして期間を計算する。[Source 3, p.37]", "year": "H27", "category": "被保険者"}, {"id": 552, "question": "労働者派遣事業の事業所に雇用される登録型派遣労働者が、派遣就業に係る1つの雇用契約の終了後、1か月以内に次回の雇用契約が見込まれるため被保険者資格を喪失しなかった場合において、前回の雇用契約終了後10日目に1か月以内に次回の雇用契約が締結されないことが確実となったときは、その確実となった日をもって使用関係が終了したものとして取り扱う。", "answer": false, "explanation": "法36条、通知。この場合、契約が締結されないことが確実となった日ではなく、前回の雇用契約終了後1か月を経過した日の翌日に資格を喪失する。[Source 3, p.47]", "year": "H27", "category": "被保険者"}, {"id": 553, "question": "被保険者が同時に2以上の事業所に使用される場合において、それぞれの適用事業所における保険者が異なる場合は、当該被保険者が、当該被保険者の保険を管掌する保険者を選択する。", "answer": true, "explanation": "法7条。二以上の事業所で保険者が異なる場合、被保険者がいずれかの保険者を選択し、選択した保険者が全事業所の事務を管掌する。[Source 3, p.9]", "year": "H27", "category": "保険者"}, {"id": 554, "question": "被扶養者の認定において、年間収入とは、過去の収入、現時点の収入、将来の収入等から今後1年間の収入を見込んだものとされている。", "answer": true, "explanation": "法3条7項、通知。被扶養者の収入基準における「年間収入」の考え方に関する正しい記述である。[Source 3, p.59]", "year": "H27", "category": "被扶養者"}, {"id": 555, "question": "月、週その他一定期間によって報酬が定められている被保険者に係る資格取得時の標準報酬月額は、被保険者の資格を取得した日現在の報酬の額をその期間における所定労働日数で除して得た額の30倍に相当する額を報酬月額として決定される。", "answer": true, "explanation": "法42条1項1号。月給や週給制の場合の資格取得時決定の算定ルールに関する正しい記述である。[Source 3, p.83]", "year": "H27", "category": "標準報酬月額"}, {"id": 556, "question": "保険者は、被保険者に被保険者証を交付しようとするときは、これを事業主に送付しなければならないが、保険者が支障がないと認めるときは、これを被保険者に送付することができる。", "answer": true, "explanation": "則47条1項、3項。被保険者証の交付経路（原則事業主経由、例外直接送付）に関する正しい記述である。[Source 3, p.67]", "year": "H27", "category": "被保険者証"}, {"id": 557, "question": "事業主は、被保険者が育児休業等を開始したときは、速やかに、所定の事項を記載した届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "則24条の2。育児休業等の取得に伴う届出義務に関する規定通りの内容である。[Source 3, p.81]", "year": "H27", "category": "届出等"}, {"id": 558, "question": "本社と支社がともに適用事業所であり、人事、労務及び給与の管理を別に行っている会社において、本社における被保険者が転勤により支社に異動しても、引き続きその者の人事管理等を本社で行っている場合には、本社の被保険者として取り扱うことができる。", "answer": true, "explanation": "法3条3項、通知。人事管理等の実態に基づき、便宜上異動後も元の事業所の被保険者として扱うことが認められる場合がある。[Source 3, p.29]", "year": "H27", "category": "適用事業所"}, {"id": 559, "question": "被保険者の資格喪失後継続して傷病手当金の支給を受けていた者が、その後、別の健康保険組合の被保険者になったときは、その継続給付は行われなくなる。", "answer": true, "explanation": "法107条。資格喪失後の継続給付を受けている者が、再び被保険者資格（任意継続被保険者を除く）を取得したときは、それまでの継続給付は終了する。[Source 3, p.183]", "year": "H27", "category": "資格喪失後の給付"}, {"id": 560, "question": "日雇特例被保険者に係る傷病手当金の支給期間は、同一の疾病又は負傷及びこれにより発した疾病に関しては、その支給を始めた日から起算して6か月（厚生労働大臣が指定する疾病に関しては1年6か月）を超えないものとする。", "answer": true, "explanation": "法135条3項。日雇特例被保険者における傷病手当金の支給期間制限に関する規定通りである。[Source 3, p.205]", "year": "H27", "category": "日雇特例被保険者"}, {"id": 561, "question": "任意適用事業所において被保険者の4分の3以上の申出があった場合、事業主は当該事業所を適用事業所ではなくするための認可の申請をしなければならない。", "answer": true, "explanation": "法33条1項。任意適用事業所の取消申請（4分の3以上の同意）に関する正しい記述である。[Source 3, p.29]", "year": "H28", "category": "適用事業所"}, {"id": 562, "question": "法人の事業所であっても、船舶を使用する事業の事業所については、健康保険法上の適用事業所とはならない。", "answer": false, "explanation": "法3条3項。船舶を使用する事業も適用業種に含まれており、法人の事業所であれば強制適用事業所となる。[Source 3, p.27]", "year": "H28", "category": "適用事業所"}, {"id": 563, "question": "高額療養費の世帯合算において、70歳未満の者の場合は、同一月内に同一の病院等で支払った一部負担金等の額のうち、21,000円以上のものが合算の対象となる。", "answer": true, "explanation": "法115条、令41条1項。70歳未満の世帯合算における金額基準（21,000円）に関する規定通りである。[Source 3, p.57]", "year": "H28", "category": "高額療養費"}, {"id": 564, "question": "合併により設立された健康保険組合又は合併後存続する健康保険組合のうち所定の要件に該当するものは、当該合併が行われた日の属する年度及びこれに続く5か年度に限り、厚生労働大臣の認可を受けて、不均一の一般保険料率を決定することができる。", "answer": true, "explanation": "法附則3条の2第1項。地域型健康保険組合における不均一保険料率の特例に関する正しい記述である。[Source 3, p.103]", "year": "H28", "category": "保険料率"}, {"id": 565, "question": "移送費として支給される額は、最も経済的な通常の経路及び方法により移送された場合の費用により算定した額を限度として、実際に移送に要した費用の額とされる。", "answer": true, "explanation": "法97条1項、則80条。移送費の支給額算定ルールに関する正しい記述である。[Source 3, p.163]", "year": "H28", "category": "移送費"}, {"id": 566, "question": "被保険者の被扶養者が第三者の行為により死亡し、被保険者が家族埋葬料の給付を受けるときは、保険者は、当該家族埋葬料の価額の限度において当該被保険者が当該第三者に対して有する損害賠償請求権を代位取得する。", "answer": true, "explanation": "法57条1項。第三者行為による損害賠償請求権の代位取得は、被扶養者に係る給付（家族埋葬料等）についても適用される。[Source 3, p.201]", "year": "H28", "category": "給付制限・損害賠償との調整"}, {"id": 567, "question": "適用事業所の事業主に変更があったときは、変更後の事業主は、5日以内に、その旨を記載した届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "則31条。事業主変更の届出期限（5日以内）に関する規定通りの内容である。[Source 3, p.31]", "year": "H28", "category": "届出等"}, {"id": 568, "question": "被保険者が妊娠4か月（85日）以上で出産し、それが死産であった場合、家族埋葬料は支給されないが、出産育児一時金は支給の対象となる。", "answer": true, "explanation": "法101条、法113条。死産児は被扶養者になれないため埋葬料は出ないが、一時金は妊娠月数（4か月以上）の要件を満たせば支給される。[Source 3, p.175]", "year": "H28", "category": "保険給付"}, {"id": 569, "question": "出産手当金の額は、1日につき、直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額とされる。", "answer": true, "explanation": "法102条2項。出産手当金の1日当たりの支給額算出式に関する正しい記述である。[Source 3, p.179]", "year": "H28", "category": "出産手当金"}, {"id": 570, "question": "被扶養者の認定において、被保険者と届出をしていないが事実上婚姻関係と同様の事情にある配偶者の父母及び子は、日本国内に住所を有し、かつ、被保険者と同一の世帯に属して主として生計を維持されている場合に限り、被扶養者となることができる。", "answer": true, "explanation": "法3条7項3号。内縁の配偶者の父母・子については、同一世帯要件が必須である。[Source 3, p.55]", "year": "H28", "category": "被扶養者"}, {"id": 571, "question": "常時5人以上の従業員を使用している個人経営の飲食業の事業所は、その従業員数にかかわらず強制適用事業所とはならない。", "answer": true, "explanation": "法3条3項。飲食業は健康保険の非適用業種であるため、個人経営の場合は常時5人以上であっても強制適用事業所にはならない。[Source 3, p.27]", "year": "H30-1A", "category": "適用事業所"}, {"id": 572, "question": "法人の代表者であっても、法人から労働の対償として報酬を受けている場合には、その法人に使用される者として被保険者となる。", "answer": true, "explanation": "法3条1項、通知。法人との間に使用関係（労務の提供と報酬の支払い）が認められる役員等は、被保険者となる。[Source 3, p.33]", "year": "H30-1B", "category": "被保険者"}, {"id": 573, "question": "2か月以内の期間を定めて使用される者であっても、当該定めた期間を超えて引き続き使用されることが見込まれる場合には、最初の雇用契約期間の開始時から被保険者となる。", "answer": true, "explanation": "法3条1項2号ロ。当初から2か月を超えて使用される見込みがある場合は適用除外に該当せず、初めから被保険者となる。[Source 3, p.37]", "year": "H30-1C", "category": "被保険者"}, {"id": 574, "question": "特定適用事業所に使用される短時間労働者が被保険者となる要件の1つとして、週の所定労働時間が20時間以上であることが必要である。", "answer": true, "explanation": "法3条1項9号イ。短時間労働者の被保険者適用要件（週20時間以上等）に関する正しい記述である。[Source 3, p.39]", "year": "H30-1D", "category": "被保険者"}, {"id": 575, "question": "船員法第1条に規定する船員として船舶所有者に使用される者は、健康保険の被保険者から除外される。", "answer": true, "explanation": "法3条1項10号。船員法上の船員は船員保険の対象となるため、健康保険の適用除外とされる。[Source 3, p.33]", "year": "H30-1E", "category": "被保険者"}, {"id": 576, "question": "被保険者が同時に2以上の事業所に使用される場合において、それぞれの事業所の保険者が異なる場合は、当該被保険者がその管掌する保険者を選択しなければならない。", "answer": true, "explanation": "法7条1項。二以上事業所勤務者で保険者が異なる場合の保険者選択ルールに関する規定通りである。[Source 3, p.9]", "year": "H30-2B", "category": "保険者"}, {"id": 577, "question": "被扶養者として認定されるためには、日本国内に住所を有することが原則として必要であるが、外国に留学する学生など、日本国内に生活の基礎があると認められる特別な事情がある場合は例外として認められる。", "answer": true, "explanation": "法3条7項、則37条の2。国内居住要件の例外（留学生、海外赴任同行者等）に関する正しい記述である。[Source 3, p.55]", "year": "H30-2D", "category": "被扶養者"}, {"id": 578, "question": "標準報酬月額の定時決定（算定基礎）は、毎年7月1日現在使用される被保険者を対象に行われる。", "answer": true, "explanation": "法41条1項。定時決定の基準日（7月1日）に関する正しい記述である。[Source 3, p.73]", "year": "H30-3A", "category": "標準報酬月額"}, {"id": 579, "question": "随時改定（月変）は、固定的賃金の変動により、継続した3か月間の報酬支払基礎日数が各月とも17日（短時間労働者は11日）以上ある場合に検討される。", "answer": true, "explanation": "法43条1項。随時改定における支払基礎日数の要件に関する正しい記述である。[Source 3, p.83]", "year": "H30-3B", "category": "標準報酬月額"}, {"id": 580, "question": "4月、5月、6月のいずれかの月に休職し、事業所から低額の休職給を受けた場合、その月を除いて報酬月額を算定して定時決定を行う。", "answer": true, "explanation": "法41条1項、通知。一時的な休職による低額な報酬の月は、定時決定の計算基礎から除外される。[Source 3, p.79]", "year": "H30-3D", "category": "標準報酬月額"}, {"id": 581, "question": "短時間労働者に係る定時決定において、4月の支払基礎日数が10日、5月が11日、6月が13日であった場合は、5月と6月の報酬平均により標準報酬月額を決定する。", "answer": true, "explanation": "法41条、法44条。短時間労働者の場合、11日以上の月を対象に算定するため、この場合は5月と6月が対象となる。[Source 3, p.73]", "year": "H30-3E", "category": "標準報酬月額"}, {"id": 582, "question": "国庫は、毎年度、予算の範囲内において健康保険事業の事務（前期高齢者納付金等の納付事務等を含む）の執行に要する費用を負担する。", "answer": true, "explanation": "法151条。事務費の国庫負担に関する規定通りの内容である。[Source 3, p.99]", "year": "H30-4A", "category": "国庫負担等"}, {"id": 583, "question": "全国健康保険協会（協会けんぽ）の給付費に対する国庫補助の割合は、1000分の164の範囲内において、毎年度、予算をもって定めることとされている。", "answer": true, "explanation": "法153条1項。協会けんぽへの国庫補助率（上限16.4%）に関する規定通りの内容である。[Source 3, p.99]", "year": "H30-4B", "category": "国庫負担等"}, {"id": 584, "question": "全国健康保険協会の理事長は、厚生労働大臣が任命し、理事及び監事は、理事長が任命する。", "answer": false, "explanation": "法7条の11第1項、3項。理事長と「監事」は厚生労働大臣が任命する。理事は理事長が任命する。[Source 3, p.9]", "year": "H30-4C", "category": "全国健康保険協会"}, {"id": 585, "question": "被保険者の負担すべき毎月の保険料額に1円未満の端数があるときは、その端数を切り捨てる。ただし、被保険者が事業主に保険料を支払う場合は、50銭以下の端数を切り捨て、50銭を超える端数を切り上げる。", "answer": true, "explanation": "通貨の単位及び貨幣の強制通用力に関する法律2条等。保険料の端数処理に関する一般的なルールについての記述である。[Source 3, p.105]", "year": "H30-5A", "category": "保険料"}, {"id": 586, "question": "育児休業等期間中の保険料免除の申出は、育児休業等を開始した日の属する月から、その終了する日の翌日が属する月の前月まで適用される。", "answer": true, "explanation": "法159条1項。育児休業免除の期間規定に関する正しい記述である。[Source 3, p.105]", "year": "H30-5B", "category": "保険料"}, {"id": 587, "question": "事業主は、被保険者に賞与を支払ったときは、標準賞与額に係る保険料を控除することができるが、当該賞与の支払日から5日以内に賞与支払届を提出しなければならない。", "answer": true, "explanation": "則27条1項、法167条2項。賞与からの保険料控除権および支払届の提出期限（5日以内）に関する正しい記述である。[Source 3, p.95]", "year": "H30-5C", "category": "保険料"}, {"id": 588, "question": "介護保険第2号被保険者である被保険者が、40歳に達した月（1日生まれ以外は翌月）から介護保険料の徴収が開始される。", "answer": true, "explanation": "法156条1項1号、介保法9条2号。40歳に達した日の属する月から介護保険第2号被保険者となり、保険料徴収の対象となる。[Source 3, p.107]", "year": "H30-5D", "category": "保険料"}, {"id": 589, "question": "健康保険組合は、合併により設立された場合など所定の要件を満たすときは、5か年度に限り、厚生労働大臣の認可を受けて、不均一の一般保険料率を決定することができる。", "answer": true, "explanation": "法附則3条の2第1項。地域型健康保険組合における不均一保険料率の特例に関する規定通りの内容である。[Source 3, p.103]", "year": "H30-5E", "category": "保険料率"}, {"id": 590, "question": "2以上の適用事業所について健康保険組合を共同で設立しようとするときは、それぞれの事業所ごとに被保険者の2分の1以上の同意を得なければならない。", "answer": true, "explanation": "法12条2項。共同設立における各事業所単位での同意要件（2分の1以上）に関する正しい記述である。[Source 3, p.19]", "year": "H29-1A", "category": "健康保険組合"}, {"id": 591, "question": "健康保険組合の組合会議員の定数は、規約で定めるところにより、偶数とする。その定数の半数は事業主において選定した議員をもって充て、他の半数は被保険者である組合員において互選した議員をもって充てる。", "answer": true, "explanation": "法14条。健康保険組合の組合会議員の構成（選定議員と互選議員）に関する規定通りの内容である。[Source 3, p.17]", "year": "H29-1B", "category": "健康保険組合"}, {"id": 592, "question": "被保険者の資格の取得及び喪失は、保険者等の確認によって、その効力を生ずる。ただし、任意適用事業所の取消しの認可があったことによる被保険者の資格の喪失並びに任意継続被保険者の資格の取得及び喪失は、この限りでない。", "answer": true, "explanation": "法39条1項。資格得喪の効力発生における「確認」の要否に関する例外規定を含めた正しい記述である。[Source 3, p.11]", "year": "H29-1C", "category": "適用事業所・被保険者"}, {"id": 593, "question": "健康保険組合が解散により消滅した場合、全国健康保険協会が消滅した健康保険組合の権利義務を承継する。", "answer": true, "explanation": "法26条4項。健康保険組合解散時の権利義務承継先（協会）に関する規定通りの内容である。[Source 3, p.22]", "year": "H29-1D", "category": "健康保険組合"}, {"id": 594, "question": "全国健康保険協会は、市町村（特別区を含む。）に対し、政令で定めるところにより、日雇特例被保険者の保険に係る保険者の事務のうち全国健康保険協会が行うものの一部を委託することができる。", "answer": true, "explanation": "法203条2項。日雇特例被保険者に関する協会事務の一部委託（市町村への委託）についての規定通りである。[Source 3, p.202]", "year": "H29-1E", "category": "日雇特例被保険者"}, {"id": 595, "question": "被保険者は、被保険者又はその被扶養者が40歳に達することにより介護保険第2号被保険者に該当するに至ったときは、遅滞なく、所定の事項を記載した届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": false, "explanation": "則41条1項。40歳に達したことによる介護保険第2号被保険者への該当については、年齢により判別可能なため、原則として届出は不要である。[Source 3, p.65]", "year": "H29-2A", "category": "資格の得喪の確認及び届出等"}, {"id": 596, "question": "健康保険法における標準報酬月額の等級区分は、現在、第1級（58,000円）から第50級（1,390,000円）までとなっている。", "answer": true, "explanation": "法40条1項。現行の標準報酬月額等級区分に関する正しい記述である。[Source 3, p.71]", "year": "H29-2B", "category": "標準報酬月額"}, {"id": 597, "question": "被保険者の配偶者で届出をしていないが事実上婚姻関係と同様の事情にあるもの（以下「事実上の配偶者」という。）の兄で、被保険者と同一の世帯に属し、主としてその被保険者により生計を維持している者は、日本国内に住所を有していても、当該被保険者の被扶養者となることはできない。", "answer": true, "explanation": "法3条7項3号。事実上の配偶者の「父母及び子」は被扶養者の範囲に含まれるが、「兄（兄弟姉妹）」は含まれない。[Source 3, p.56]", "year": "H29-2C改", "category": "被扶養者"}, {"id": 598, "question": "被保険者は、被扶養者を有するに至ったときは、5日以内に、所定の事項を記載した被扶養者届を事業主を経由して厚生労働大臣又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "則38条1項。被扶養者届の提出期限（5日以内）に関する規定通りの内容である。[Source 3, p.101]", "year": "H29-2D", "category": "被扶養者"}, {"id": 599, "question": "任意継続被保険者が初めて納付すべき保険料を除き、保険料をその納付期日（その月の10日）までに納付しなかった場合（納付の遅延について正当な理由があると保険者が認めたときを除く。）は、その翌日に任意継続被保険者の資格を喪失する。", "answer": true, "explanation": "法38条3号。任意継続被保険者の保険料未納による資格喪失（納付期限の翌日喪失）についての規定通りである。[Source 3, p.115]", "year": "H29-2E", "category": "保険料の納付"}, {"id": 600, "question": "厚生労働省令で定める要件に該当するものとして厚生労働大臣の認可を受けた健康保険組合（特定健康保険組合）は、規約で定めるところにより、特例退職被保険者を組織に加えることができる。", "answer": true, "explanation": "法附則3条1項。特定健康保険組合の認可および特例退職被保険者の制度に関する正しい記述である。[Source 3, p.102]", "year": "H29-3A", "category": "任意継続被保険者等"}, {"id": 601, "question": "健康保険組合は、規約で定めるところにより、被保険者が保険医療機関又は保険薬局に支払った一部負担金の一部を付加給付として被保険者に払い戻すことができる。", "answer": true, "explanation": "法53条。一部負担金の払戻し（一部負担還元金等）を付加給付として規約で定めることができる。[Source 3, p.232]", "year": "H29-3C", "category": "保険給付の分類・種類"}, {"id": 602, "question": "特例退職被保険者の資格取得の申出は、原則として、特例退職被保険者になろうとする者に係る年金証書等が到達した日の翌日から起算して3月以内にしなければならない。", "answer": true, "explanation": "則168条4項。特例退職被保険者の資格取得申出期限（3か月以内）に関する正しい規定である。[Source 3, p.169]", "year": "H29-3D", "category": "任意継続被保険者等"}, {"id": 603, "question": "保険料その他健康保険法の規定による徴収金の賦課又は徴収の処分に不服がある者は、社会保険審査会に対して審査請求をすることができる。当該審査請求は、処分があったことを知った日の翌日から起算して3月を経過したときは、することができない。", "answer": true, "explanation": "法190条、社会保険審査官及び社会保険審査会法32条2項。徴収金の処分等への審査請求先（審査会）および請求期間（3か月）に関する正しい記述である。[Source 3, p.312]", "year": "H29-3E", "category": "不服申立て"}, {"id": 604, "question": "2以上の適用事業所の事業主が同一である場合には、当該事業主は、厚生労働大臣の承認を受けて、当該2以上の事業所を1つの適用事業所とすることができる。", "answer": true, "explanation": "法34条1項。一括適用の承認（1つの事業所とみなす特例）に関する規定通りの内容である。[Source 3, p.11]", "year": "H29-4A", "category": "適用事業所"}, {"id": 605, "question": "被保険者の標準報酬月額の随時改定において、継続した3か月間に受けた報酬の月平均額が、従前の標準報酬月額の基礎となった報酬月額に比して著しく高低を生じた場合であっても、当該3か月のうち支払基礎日数が17日（短時間労働者は11日）未満の月があるときは、随時改定の対象とはならない。", "answer": true, "explanation": "法43条1項。随時改定（月変）における支払基礎日数の要件（各月17日以上）に関する正しい記述である。[Source 3, p.200]", "year": "H29-4B", "category": "標準報酬月額"}, {"id": 606, "question": "事業主は、産前産後休業をしている被保険者が保険者等に申出をしたときは、休業を開始した日の属する月から休業が終了する日の翌日が属する月の前月までの期間、当該被保険者に係る保険料の免除を受けることができる。", "answer": true, "explanation": "法159条の3第1項。産前産後休業期間中の保険料免除の期間規定に関する正しい記述である。[Source 3, p.110]", "year": "H29-4C", "category": "保険料の負担等"}, {"id": 607, "question": "健康保険組合の一般保険料率の変更の決定は厚生労働大臣の認可を受けなければならないが、一般保険料率と調整保険料率とを合算した率の変更が生じない決定については、認可を要せず届け出ることで足りる。", "answer": true, "explanation": "法160条13項、法附則2条8項。保険料率変更の認可不要（届出のみで可）となるケースに関する正しい記述である。[Source 3, p.215]", "year": "H29-4D", "category": "保険料率"}, {"id": 608, "question": "被保険者であった者が、資格喪失後の傷病手当金を受けていた期間内に死亡したとき、又はその給付を受けなくなった日後3か月以内に死亡したときは、その者により生計を維持していた者等に対し、最後の保険者から埋葬料が支給される。", "answer": true, "explanation": "法105条1項。資格喪失後の継続給付を受けていた者の死亡に伴う埋葬料支給規定に関する正しい記述である。[Source 3, p.126]", "year": "H29-4E", "category": "資格喪失後の給付"}, {"id": 609, "question": "被保険者が闘争、泥酔又は著しい不行跡によって給付事由を生じさせたときは、保険者は、当該給付事由に係る保険給付の全部又は一部を行わないことができる。", "answer": true, "explanation": "法117条。不行跡等による相対的給付制限に関する規定通りの内容である。[Source 3, p.276]", "year": "H29-5A", "category": "給付制限"}, {"id": 610, "question": "被保険者が、雇用されている事業所の法人格を有しない労働組合の専従者となった場合、当該組合が適用事業所であれば、労働組合に雇用される者として、当該組合における被保険者となることができる。", "answer": true, "explanation": "法3条1項、昭和24.7.7職発921号。労働組合専従者の被保険者資格に関する通達通りの内容である。[Source 3, p.154]", "year": "H29-5B", "category": "一般の被保険者等"}, {"id": 611, "question": "事業主は、当該事業主が被保険者に対して支払うべき報酬額が保険料額に満たないため、被保険者の負担すべき保険料額の一部のみを控除できた場合においては、当該控除できた額についてのみ保険者等に納付する義務を負う。", "answer": false, "explanation": "法161条2項、昭和2.2.14保理218号。事業主は、報酬から控除できたか否かにかかわらず、被保険者が負担する保険料を含めた全額の納付義務を負う。[Source 3, p.113]", "year": "H29-5C", "category": "保険料の納付"}, {"id": 612, "question": "被保険者の子で、外国において留学をする学生であるものは、日本国内に住所を有していなくても、原則として被扶養者として認められる。", "answer": true, "explanation": "法3条7項、則37条の2第1号。外国に留学する学生などは、日本国内に生活の基礎があると認められる「国内居住要件の例外」として被扶養者に認定されうる。[Source 3, p.55]", "year": "H29-5D", "category": "被扶養者"}, {"id": 613, "question": "任意継続被保険者が、市町村の国民健康保険の被保険者の資格を取得したときは、その翌日に任意継続被保険者の資格を喪失する。", "answer": false, "explanation": "法38条。国民健康保険の資格取得は、健康保険の任意継続被保険者資格の喪失事由には含まれていない。[Source 3, p.49]", "year": "H29-5E", "category": "任意継続被保険者"}, {"id": 614, "question": "初めて適用事業所となった事業主は、当該事実のあった日から5日以内に、新規の適用に関する届書を日本年金機構又は健康保険組合に提出しなければならない。", "answer": false, "explanation": "則19条。新規適用の届出期限は、事実のあった日から「10日以内」である。[Source 3, p.52]", "year": "H29-6A", "category": "適用事業所に関する届出"}, {"id": 615, "question": "任意継続被保険者が、初めて納付すべき保険料を除き、保険料をその納付期日（その月の10日）までに納付しなかった場合は、その翌日に任意継続被保険者の資格を喪失する（納付の遅延について正当な理由があると保険者が認めたときを除く）。", "answer": true, "explanation": "法38条3号。任意継続被保険者が納付期限までに保険料を納めない場合、期限の翌日に当然に資格を喪失する。[Source 3, p.115]", "year": "H29-6B", "category": "保険料の納付"}, {"id": 616, "question": "保険医療機関である病院又は診療所は、選定療養に要した費用につき、被保険者から支払を受けた際、選定療養に係る一部負担金相当額とその他の費用の額とを区分して記載した領収書を交付しなければならない。", "answer": true, "explanation": "法86条4項、則64条1号。保険外併用療養費（選定療養等）の支払いを受けた際は、費用の区分を明記した領収書の交付が義務付けられている。[Source 3, p.147]", "year": "H29-6C", "category": "保険外併用療養費"}, {"id": 617, "question": "被保険者が死亡したときは、その者により生計を維持していた者であって、埋葬を行うものに対し、埋葬料として5万円を支給する。", "answer": true, "explanation": "法100条1項、令35条。埋葬料の支給要件（生計維持関係と埋葬の実施）および支給額（5万円）に関する規定通りである。[Source 3, p.173]", "year": "H29-6D", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 618, "question": "保険料その他健康保険法の規定による徴収金の賦課又は徴収の処分に不服がある場合の社会保険審査会に対する審査請求は、処分があったことを知った日の翌日から起算して3月を経過したときは、することができない。", "answer": true, "explanation": "法190条、社会保険審査官及び社会保険審査会法32条2項。徴収金の処分等に対する審査請求の期間は「3か月以内」である。[Source 3, p.312]", "year": "H29-6E", "category": "不服申立て"}, {"id": 619, "question": "傷病手当金の支給期間は、同一の疾病又は負傷及びこれにより発した疾病に関しては、その支給を始めた日から通算して1年6か月間とされている。", "answer": true, "explanation": "法99条4項。令和4年1月の法改正により、傷病手当金の支給期間は「支給開始日から通算して1年6か月」に変更された（以前は暦の上で1年6か月であった）。[Source 3, p.186]", "year": "H29-7A改", "category": "傷病手当金"}, {"id": 620, "question": "保険医又は保険薬剤師は、1か月以上の予告期間を設けて、その登録の抹消を求めることができる。", "answer": true, "explanation": "法79条2項。保険医等の登録抹消の申し出に必要な予告期間は「1か月以上」である。[Source 3, p.68]", "year": "H29-7B", "category": "保険医及び保険薬剤師"}, {"id": 621, "question": "傷病手当金の支給を受けるべき者が、同一の疾病又は負傷に関し、厚生年金保険法による障害厚生年金の支給を受けることができるときは、その額が傷病手当金の額より少ない場合に限り、その差額が傷病手当金として支給される。", "answer": true, "explanation": "法108条3項。障害厚生年金との併給調整において、年金の日割額が傷病手当金額を下回る場合は差額が支給される。[Source 3, p.171]", "year": "H29-7C", "category": "傷病手当金"}, {"id": 622, "question": "傷病手当金の支給要件である労務不能の判定は、必ずしも医学的基準のみによらず、その被保険者の従事する業務の種別等を考慮し、本来の業務に堪え得るか否かを標準として社会通念に基づき行われる。", "answer": true, "explanation": "法99条1項、昭和31.1.19保文発340号。労務不能の判断基準に関する実務上の取り扱いの通りである。[Source 3, p.165]", "year": "H29-7D", "category": "傷病手当金"}, {"id": 623, "question": "傷病手当金の支給期間中に事業主から報酬が支払われた場合であっても、その額が傷病手当金の額を下回るときは、その差額が傷病手当金として支給される。", "answer": true, "explanation": "法108条1項。報酬との調整において、報酬額が傷病手当金額に満たない場合は差額が支給される。[Source 3, p.171]", "year": "H29-7E", "category": "傷病手当金"}, {"id": 624, "question": "全国健康保険協会は、健康保険法第7条の2の規定により、健康保険事業（政府が管掌する健康保険の事業）を経営するために設立された。", "answer": true, "explanation": "法7条の2。全国健康保険協会は、協会管掌健康保険の保険者として設立された公地法人である。[Source 3, p.8]", "year": "H29-8A", "category": "全国健康保険協会"}, {"id": 625, "question": "標準賞与額は、被保険者が賞与を受けた月において、その月に受けた賞与額に基づき決定されるが、その累計額が年度（4月1日から翌年3月31日まで）を通じて573万円を超えるときは、573万円を上限とする。", "answer": true, "explanation": "法45条1項。標準賞与額の決定方法および年度累計上限（573万円）に関する規定通りである。[Source 3, p.95]", "year": "H29-8B", "category": "標準賞与額"}, {"id": 626, "question": "70歳以上の被扶養者が保険医療機関で療養を受けた場合、当該被扶養者が一般所得者であれば、被保険者に支給される家族療養費の額は、当該療養につき算定した費用の額の100分の80に相当する額である。", "answer": false, "explanation": "法110条2項1号ハ。70歳以上の一般所得者の給付割合（自己負担を除く分）は「100分の80」（2割負担）となる。※改正により現在は原則2割（誕生日により1割の場合あり）[Source 3, p.151]", "year": "H29-8C改", "category": "家族療養費"}, {"id": 627, "question": "70歳以上の一般所得者（現役並み所得者以外）である被保険者が同一月内に受けた外来療養に係る高額療養費算定基準額は、18,000円（年間上限14.4万円）である。", "answer": true, "explanation": "令42条5項。70歳以上の一般区分における外来の一部負担限度額に関する規定通りである。[Source 3, p.159]", "year": "H29-8D", "category": "高額療養費"}, {"id": 628, "question": "被保険者が資格を喪失した日後3か月以内に死亡したときは、その者により生計を維持していた者等に対し、最後の保険者から埋葬料が支給される。", "answer": true, "explanation": "法105条1項3号。資格喪失後の死亡に伴う埋葬料の支給要件（喪失後3か月以内）に関する正しい記述である。[Source 3, p.126]", "year": "H29-8E", "category": "資格喪失後の給付"}, {"id": 629, "question": "70歳未満の被保険者又はその被扶養者が同一月内に同一の病院等で支払った一部負担金のうち、21,000円以上のものは世帯合算の対象となる。", "answer": true, "explanation": "法115条、令41条1項。70歳未満の世帯合算における金額基準（21,000円）に関する規定通りである。[Source 3, p.157]", "year": "H29-9A", "category": "高額療養費"}, {"id": 630, "question": "同一の月に同一の保険医療機関において内科（通院）及び歯科（通院）を受診した場合、高額療養費の算定上、これらは別個の病院で受けた療養とみなされ、合算されない。", "answer": true, "explanation": "法115条、令43条9項。高額療養費の算定において、同一医療機関であっても「医科」と「歯科」は別個に扱われる。[Source 3, p.157]", "year": "H29-9B", "category": "高額療養費"}, {"id": 631, "question": "同一の月に同一の保険医療機関において、入院により受けた療養の給付（医科）及び外来により受けた療養の給付（医科）は、高額療養費の算定上、合算して計算される。", "answer": true, "explanation": "法115条、令43条。同一月、同一医療機関内であれば、入院と外来の自己負担額は合算して高額療養費を算定する。[H29-9C]", "year": "H29", "category": "高額療養費"}, {"id": 632, "question": "70歳以上の一般所得者（現役並み所得者以外）である被保険者が同一月内に受けた外来療養に係る高額療養費算定基準額は、18,000円（年間上限14.4万円）である。", "answer": true, "explanation": "令42条5項。70歳以上の一般区分における外来の一部負担限度額に関する規定通りの内容である。[H29-9D]", "year": "H29", "category": "高額療養費"}, {"id": 633, "question": "高額療養費の多数回該当（直近12か月間に3回以上該当した場合の4回目以降の限度額引き下げ）の判定において、世帯合算により支給された回数も含まれる。", "answer": true, "explanation": "令42条1項等。多数回該当の判定回数には、個人単位だけでなく世帯合算による支給分もカウントされる。[H29-9E]", "year": "H29", "category": "高額療養費"}, {"id": 634, "question": "健康保険組合において、任意継続被保険者の標準報酬月額を決定する際、規約で定めることにより、当該組合の全被保険者の平均額の範囲内で定めた額を報酬月額とみなして決定することができる。", "answer": true, "explanation": "法47条1項。健康保険組合では、規約により平均額を超える特例（喪失時報酬の適用等）を設けることが可能である。[H29-10B]", "year": "H29", "category": "標準報酬月額"}, {"id": 635, "question": "被保険者が月の末日に退職した場合、事業主は前月分及び当月分の標準報酬月額に係る保険料を、その者に支払う報酬から同時に控除することができる。", "answer": true, "explanation": "法167条1項。月の末日に退職した場合はその月分も徴収対象となるため、前月分と併せて2か月分の控除が可能となる。[H29-10C]", "year": "H29", "category": "保険料の負担等"}, {"id": 636, "question": "被保険者が第三者の行為により負傷し、保険者が傷病手当金の支給を行ったときは、その給付の価額の限度において、被保険者が第三者に対して有する損害賠償の請求権を取得する。", "answer": true, "explanation": "法57条1項。第三者行為による損害賠償請求権の代位取得は、療養の給付だけでなく傷病手当金等の現金給付にも適用される。[H29-10D]", "year": "H29", "category": "給付制限・損害賠償との調整"}, {"id": 637, "question": "高額療養費の世帯合算において、70歳未満の者の場合は一部負担金が21,000円以上のものが対象となるが、70歳以上の者の場合は金額にかかわらずすべて合算の対象となる。", "answer": true, "explanation": "令41条1項、5項。70歳以上の者の世帯合算には、70歳未満に適用される21,000円基準は適用されない。[H29-10E]", "year": "H29", "category": "高額療養費"}, {"id": 638, "question": "保険医療機関として指定を受けた病院であっても、健康保険組合が開設した病院は、診療の対象者を当該組合の組合員等に限定することができる。", "answer": false, "explanation": "法63条3項3号。保険医療機関である以上、特定の組合員等に限定せず広く診療を行う義務がある。[H30-2A]", "year": "H30", "category": "保険医療機関及び保険薬局等"}, {"id": 639, "question": "任意適用事業所の適用の取消しの認可があったことによる被保険者資格の喪失は、保険者等の「確認」を要せず、その効力を生ずる。", "answer": true, "explanation": "法39条1項。認可という行政処分に基づき資格喪失が確定するため、別途保険者等による「確認」は不要である。[H30-2C]", "year": "H30", "category": "資格の得喪の確認及び届出等"}, {"id": 640, "question": "海外において臓器移植を受けた場合、国内での待機状況から海外受診が生命維持に不可欠と判断される等の特別な事情があれば、療養費の支給対象となり得る。", "answer": true, "explanation": "法87条1項、通知。やむを得ない理由による海外受診として療養費の支給が認められるケースについての正しい記述である。[H30-6A]", "year": "H30", "category": "療養費"}, {"id": 641, "question": "被保険者が少年院その他これに準ずる施設に収容された場合、本人への保険給付は行われないが、その被扶養者に係る保険給付を行うことは妨げられない。", "answer": true, "explanation": "法118条1項1号、2項。拘禁等による給付制限は本人分に限り、被扶養者への給付は継続される。[H30-7A]", "year": "H30", "category": "給付制限"}, {"id": 642, "question": "被扶養者が家族療養費を受けている間に被保険者が死亡した場合、被保険者は死亡により資格を喪失するが、死亡した日の翌日以後も当該被扶養者に対し家族療養費が支給される。", "answer": false, "explanation": "法36条1号、法110条。被保険者の死亡日の翌日に資格を喪失し、被扶養者資格も同時に失われるため、翌日以降の給付は行われない。[H30-7E]", "year": "H30", "category": "家族療養費"}, {"id": 643, "question": "全国健康保険協会管掌健康保険における、被保険者資格の取得・喪失の確認や標準報酬月額の決定等の事務は、日本年金機構に行わせるものとされている。", "answer": true, "explanation": "法204条1項。協会けんぽの適用・徴収関係事務は、日本年金機構が実施する。[R元-1A]", "year": "R元", "category": "権限の委任等"}, {"id": 644, "question": "被保険者の資格の取得及び喪失は、任意適用事業所の取消し等一部の例外を除き、保険者等の「確認」によって、その効力を生ずる。", "answer": true, "explanation": "法39条1項。資格得喪の効力発生における確認の原則に関する正しい記述である。[R元-1B]", "year": "R元", "category": "資格の得喪の確認及び届出等"}, {"id": 645, "question": "健康保険組合が解散した場合において、全国健康保険協会が、当該健康保険組合の権利義務を承継する。", "answer": true, "explanation": "法26条4項。組合解散時の承継先に関する規定通りである。[R元-1D]", "year": "R元", "category": "健康保険組合"}, {"id": 646, "question": "被保険者が、少年院その他これに準ずる施設に収容されたとき、又は刑事施設、労役場その他これらに準ずる施設に拘禁されたときは、その期間に係る保険給付は行われない。", "answer": true, "explanation": "法118条1項。拘禁中等の保険給付の停止に関する規定通りである。[R元-1E]", "year": "R元", "category": "給付制限"}, {"id": 647, "question": "健康保険組合がその設立事業所を増加させ、又は減少させようとするときは、その適用事業所の事業主全員の同意に加え、被保険者の2分の1以上の同意を得なければならない。", "answer": true, "explanation": "法25条1項。設立事業所の増減に伴う規約変更の手続きに関する正しい記述である。[H28-1ア]", "year": "H28", "category": "健康保険組合"}, {"id": 648, "question": "標準報酬月額の等級区分の改定（最高等級の追加）を行うことができるのは、毎年3月31日における最高等級被保険者数の割合が100分の1.5を超える場合等に限られる。", "answer": true, "explanation": "法40条2項。最高等級の改定要件に関する規定通りの内容である。[H28-2C]", "year": "H28", "category": "標準報酬月額"}, {"id": 649, "question": "全国健康保険協会は、都道府県の実情に応じた適正な運営のため、各支部に評議会を設け、支部の業務実施について評議会の意見を聴かなければならない。", "answer": true, "explanation": "法7条の21第1項。協会の支部評議会の設置義務および役割に関する正しい記述である。[H26-1D]", "year": "H26", "category": "全国健康保険協会"}, {"id": 650, "question": "健康保険組合は、規約で定めるところにより、40歳未満の被保険者であっても、介護保険第2号被保険者である被扶養者を持つ者（特定被保険者）に対し、介護保険料額の負担を求めることができる。", "answer": true, "explanation": "法附則7条1項。健康保険組合における特定被保険者への介護保険料賦課に関する特例規定である。[H26-1E]", "year": "H26", "category": "保険料の負担等"}, {"id": 651, "question": "厚生労働大臣は、全国健康保険協会の事業年度ごとの業績について評価を行い、その評価の結果を公表しなければならない。", "answer": true, "explanation": "法7条の30。全国健康保険協会の業績評価を行い公表するのは厚生労働大臣の義務である。[Source 3, p.139]", "year": "R3-1A", "category": "全国健康保険協会"}, {"id": 652, "question": "健康保険組合の理事のうち、1人は理事長とし、設立事業所の事業主である理事のうちから、理事が選挙する。", "answer": true, "explanation": "法21条3項。健康保険組合の理事長の選任方法に関する正しい規定である。[Source 3, p.153]", "year": "R3-1B", "category": "健康保険組合"}, {"id": 653, "question": "全国健康保険協会の運営委員会の委員は、事業主、被保険者及び全国健康保険協会の業務の適正な運営に必要な学識経験を有する者のうちから、全国健康保険協会の理事長が各同数を任命する。", "answer": false, "explanation": "法7条の19第1項。運営委員会の委員を任命するのは「理事長」ではなく「厚生労働大臣」である。[Source 3, p.141]", "year": "R3-1C", "category": "全国健康保険協会"}, {"id": 654, "question": "任意継続被保険者は、将来の一定期間の保険料を前納することができる。この場合において、前納すべき額は、前納に係る期間の各月の保険料の額から、年4%の利率による複利現価法によって割り引いた額を控除した額とする。", "answer": true, "explanation": "法165条1項、令49条。任意継続被保険者の保険料前納における割引計算に関する正しい記述である。[Source 3, p.115]", "year": "R3-1D", "category": "保険料の納付"}, {"id": 655, "question": "任意継続被保険者は、任意継続被保険者でなくなることを希望する旨を保険者に申し出た場合、その申出が受理された日の属する月の末日が到来したときは、その翌日から資格を喪失する。", "answer": true, "explanation": "法38条7号。令和4年1月施行の改正により、本人の申出による資格喪失が認められるようになった。[Source 3, p.49]", "year": "R3-1E", "category": "任意継続被保険者"}, {"id": 656, "question": "健康保険組合は、規約の変更、合併、分割又は解散のほか、毎年度の予算、決算及び事業報告についても公告しなければならない。", "answer": true, "explanation": "則15条、則21条、則22条。健康保険組合における広範な公告義務に関する正しい記述である。[Source 3, p.131]", "year": "R3-2A", "category": "健康保険組合"}, {"id": 657, "question": "全国健康保険協会の事業に関する業務のうち、高齢者医療確保法の規定による前期高齢者納付金等の納付に関する業務は、日本年金機構が、厚生労働大臣に代わって行うものとされている。", "answer": false, "explanation": "法7条の2第3項。前期高齢者納付金等の納付に関する業務を行うのは、日本年金機構ではなく「全国健康保険協会」そのものである。[Source 3, p.135]", "year": "R3-2B", "category": "全国健康保険協会"}, {"id": 658, "question": "国庫は、健康保険組合に対して、療養の給付等に要する費用の額に所定の率を乗じて得た額を、予算の範囲内において、補助することができる。", "answer": false, "explanation": "法151条、法153条。国庫補助（給付費補助）の対象となるのは全国健康保険協会（協会けんぽ）であり、健康保険組合は対象外である（組合には事務費の国庫負担はある）。[Source 3, p.194]", "year": "R3-2C", "category": "国庫負担等"}, {"id": 659, "question": "全国健康保険協会は、業務上の余裕金を運用しようとするときは、国債、地方債、政府保証債の取得、又は厚生労働大臣が指定する金融機関への預金等の方法によらなければならない。", "answer": true, "explanation": "法7条の33、令1条の2。全国健康保険協会の資産運用方法（安全かつ効率的）に関する規定通りである。[Source 3, p.142]", "year": "R3-2D", "category": "全国健康保険協会"}, {"id": 660, "question": "保険者は、社会保険診療報酬支払基金に対し、療養費、出産育児一時金、家族出産育児一時金並びに高額療養費及び高額介護合算療養費の支給に関する事務を委託することができる。", "answer": true, "explanation": "法205条の4。現金給付に係る一部の事務について、支払基金への委託が可能であるとする規定通りである。[Source 3, p.136]", "year": "R3-2E", "category": "権限の委任等"}, {"id": 661, "question": "全国健康保険協会管掌健康保険における、被保険者資格の取得及び喪失の確認並びに標準報酬月額の決定等の事務は、日本年金機構に行わせるものとされている。", "answer": true, "explanation": "法204条1項。協会けんぽの適用・徴収関係事務の主体は日本年金機構である。[Source 3, p.139]", "year": "R3-3A", "category": "権限の委任等"}, {"id": 662, "question": "健康保険法第63条第2項の規定により、入院時の食事の提供である療養であって入院療養と併せて行うものは、療養の給付の範囲には含まれない。", "answer": true, "explanation": "法63条2項1号。入院時食事療養は、療養の給付から除外され、別個の「入院時食事療養費」として扱われる。[Source 3, p.145]", "year": "R3-3B", "category": "療養の給付"}, {"id": 663, "question": "健康保険組合は、適用事業所の事業主、その適用事業所に使用される被保険者及び任意継続被保険者（特定健康保険組合の場合は特例退職被保険者を含む。）をもって組織する。", "answer": true, "explanation": "法8条。健康保険組合の組織構成員に関する規定通りの内容である。[Source 3, p.146]", "year": "R3-3C", "category": "健康保険組合"}, {"id": 664, "question": "全国健康保険協会は、被保険者に対して被保険者証を交付し、又は返付する場合において、それが行われるまでの間、被保険者の申請に基づき、被保険者資格証明書を交付することができる。", "answer": true, "explanation": "則50条の2。被保険者証の交付等に時間を要する場合の暫定的な証明書（資格証明書）に関する規定通りである。[Source 3, p.183]", "year": "R3-3D", "category": "被保険者証"}, {"id": 665, "question": "任意継続被保険者は、初めて納付すべき保険料を除き、毎月の保険料をその月の10日（その日が休日の場合は翌営業日）までに納付しなければならない。", "answer": true, "explanation": "法164条1項。任意継続被保険者の保険料納付期限に関する正しい記述である。[Source 3, p.170]", "year": "R3-3E", "category": "保険料の納付"}, {"id": 666, "question": "健康保険組合の一般保険料率の変更の決定は、厚生労働大臣の認可を受けなければならない。ただし、一般保険料率と調整保険料率とを合算した率の変更が生じない決定については、届出で足りる。", "answer": true, "explanation": "法160条13項、法附則2条8項。一般保険料率変更の認可手続き、及び一定の場合の特例（届出制）に関する規定通りである。[Source 3, p.215]", "year": "R3-4A", "category": "保険料率"}, {"id": 667, "question": "健康保険組合の組合会議員の定数の半数は事業主において選定し、他の半数は被保険者である組合員において互選しなければならない。", "answer": true, "explanation": "法14条。組合会議員の構成（選定議員と互選議員の各半数）に関する規定通りである。[Source 3, p.139]", "year": "R3-4B", "category": "健康保険組合"}, {"id": 668, "question": "健康保険組合の役員若しくは職員又はこれらの職にあった者は、健康保険事業に関して職務上知り得た秘密を正当な理由がなく漏らしてはならない。", "answer": true, "explanation": "法22条の2。健康保険組合関係者の守秘義務に関する規定通りの内容である。[Source 3, p.143]", "year": "R3-4C", "category": "健康保険組合"}, {"id": 669, "question": "健康保険組合は、毎年度終了後6か月以内に、厚生労働省令で定めるところにより、事業及び決算に関する報告書を作成し、厚生労働大臣に提出しなければならない。", "answer": true, "explanation": "令24条1項。健康保険組合の事業報告書等の提出期限（年度終了後6か月以内）に関する規定通りである。[Source 3, p.141]", "y
