<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康保険法 過去問演習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EC;
  --card: #FDFAF5;
  --border: #E0D9CE;
  --text: #2C2825;
  --sub: #6B6560;
  --green: #4A7C59;
  --green-bg: #EAF2EC;
  --red: #8B2E2E;
  --red-bg: #F5EAEA;
  --accent: #5A6E2A;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  padding: 16px;
  max-width: 680px;
  margin: 0 auto;
}
header {
  text-align: center;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.06em; }
.subtitle { font-size: 0.72rem; color: var(--sub); margin-top: 4px; font-family: 'Noto Sans JP', sans-serif; }

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}
label { display: block; font-size: 0.72rem; color: var(--sub); font-family: 'Noto Sans JP', sans-serif; margin-bottom: 4px; }
select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  margin-bottom: 10px;
  -webkit-appearance: none;
  appearance: none;
}
.row { display: flex; gap: 8px; }
button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.12s;
}
button:active { opacity: 0.75; }
.btn-go { background: var(--accent); color: #fff; }
.btn-reset { background: var(--border); color: var(--sub); }

.stats { display: flex; gap: 8px; margin-bottom: 12px; }
.stat {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}
.stat .n { font-family: var(--mono); font-size: 1.35rem; font-weight: 600; }
.stat .l { font-size: 0.62rem; color: var(--sub); font-family: 'Noto Sans JP', sans-serif; margin-top: 2px; }
.correct { color: var(--green); }
.wrong { color: var(--red); }

.bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.bar-inner { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 12px;
  display: none;
}
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cat { font-size: 0.68rem; background: var(--green-bg); color: var(--green); padding: 3px 8px; border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; max-width: 75%; }
.yr { font-size: 0.68rem; font-family: var(--mono); color: var(--sub); }
.q-text { font-size: 0.88rem; line-height: 1.8; margin-bottom: 14px; }
.ans-row { display: flex; gap: 10px; }
.btn-o { flex:1; padding:13px; font-size:1.3rem; background:var(--green-bg); color:var(--green); border:2px solid var(--green); border-radius:8px; }
.btn-x { flex:1; padding:13px; font-size:1.3rem; background:var(--red-bg); color:var(--red); border:2px solid var(--red); border-radius:8px; }

.result {
  display: none;
  margin-top: 14px;
  padding: 12px;
  border-radius: 7px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  line-height: 1.65;
}
.res-ok { background: var(--green-bg); border: 1px solid var(--green); }
.res-ng { background: var(--red-bg); border: 1px solid var(--red); }
.res-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; }
.btn-next {
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  background: var(--text);
  color: var(--bg);
  border-radius: 7px;
  font-size: 0.88rem;
  display: none;
}

.finish {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 32px 20px;
  text-align: center;
  display: none;
}
.finish h2 { font-size: 1.1rem; margin-bottom: 14px; }
.big-score { font-family: var(--mono); font-size: 2.8rem; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.score-detail { font-size: 0.82rem; color: var(--sub); font-family: 'Noto Sans JP', sans-serif; margin-bottom: 22px; }

#msg { text-align:center; color:var(--sub); font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; padding:32px; display:none; }
</style>
</head>

<script>
const D = [{"id": 1, "question": "被保険者又は被扶養者の業務災害（労災保険法第7条第1項第1号に規定する、労働者の業務上の負傷、疾病等をいう。）については健康保険法に基づく保険給付の対象外であり、労災保険法に規定する業務災害に係る請求が行われている場合には、健康保険の保険給付の申請はできない。", "answer": false, "explanation": "労災保険の請求中であっても、審査の結果として業務外（不支給）となった場合には原則として健康保険の給付対象となるため、支給申請を行うこと自体は可能である。", "year": "R4", "category": "目的等"}, {"id": 2, "question": "被保険者が副業として行う請負業務中に負傷した場合等、労働者災害補償保険の給付を受けることのできない業務上の傷病等については、原則として健康保険の給付が行われる。", "answer": true, "explanation": "業務上の傷病等であっても、労災保険の給付対象とならない場合には、原則として健康保険の給付対象とされる。", "year": "H28", "category": "目的等"}, {"id": 3, "question": "被保険者の数が5人以上である適用事業所に使用される法人の役員としての業務（当該法人における従業員が従事する業務と同一であると認められるものに限る。）に起因する疾病、負傷又は死亡に関しては、傷病手当金を含めて健康保険から保険給付が行われる。", "answer": false, "explanation": "法人の役員であっても、被保険者数が「5人未満」である適用事業所に使用される者が、従業員と同一の業務に従事している場合に限り、健康保険の給付対象となる。", "year": "R4", "category": "目的等"}, {"id": 4, "question": "被保険者又はその被扶養者において、業務災害と疑われる事例で健康保険の被保険者証を使用した場合、保険者は、被保険者又はその被扶養者に対して、まずは労災保険法に基づく保険給付の請求を促し、健康保険法に基づく保険給付を留保することができる。", "answer": true, "explanation": "業務災害の疑いがある場合は、まず労災保険への請求を促し、その結果が出るまで健康保険の給付を保留することができる。", "year": "R3", "category": "目的等"}, {"id": 5, "question": "犯罪の被害を受けたことにより生じた傷病は、一般の保険事故と同様に、健康保険の保険給付の対象とされており、犯罪の被害者である被保険者は、加害者が保険者に対し損害賠償責任を負う旨を記した誓約書を提出しなくとも健康保険の保険給付を受けられる。", "answer": true, "explanation": "第三者行為による傷病であっても、誓約書の提出は給付の絶対条件ではないため、提出がなくても給付を受けることができる。", "year": "H27", "category": "目的等"}, {"id": 6, "question": "被保険者が5人未満である適用事業所に所属する法人の代表者は、業務遂行の過程において業務に起因して生じた傷病に関しても健康保険による保険給付の対象となる場合があるが、その対象となる業務は、当該法人における従業員が従事する業務と同一であると認められるものとされている。", "answer": true, "explanation": "5人未満の適用事業所の役員については、従業員と同一の業務に起因する傷病であれば健康保険の給付対象となる。", "year": "H30", "category": "目的等"}, {"id": 7, "question": "健康保険組合の設立、合併又は分割を伴う健康保険組合が管掌する一般保険料率の変更においては、厚生労働大臣の権限を地方厚生局長に委任することができる。", "answer": false, "explanation": "健康保険組合の「設立、合併又は分割」を伴う変更については、地方厚生局長への委任対象から除外されている。", "year": "R6", "category": "権限の委任等"}, {"id": 8, "question": "保険医又は保険薬剤師の登録及び登録取消に係る厚生労働大臣の権限は、地方厚生局長又は地方厚生支局長に委任されている。", "answer": true, "explanation": "保険医等の登録・取消に関する権限は、地方厚生局長等に委任されている。", "year": "H28", "category": "権限の委任等"}, {"id": 9, "question": "保険者は、社会保険診療報酬支払基金に対して、保険給付のうち、療養費、出産育児一時金、家族出産育児一時金並びに高額療養費及び高額介護合算療養費の支給に関する事務を委託することができる。", "answer": true, "explanation": "支払基金に対し、療養費や出産育児一時金等の支給事務を委託できるとする規定の通りである。", "year": "R3", "category": "権限の委任等"}, {"id": 10, "question": "全国健康保険協会管掌健康保険及び健康保険組合管掌健康保険について、適用事業所以外の事業所の任意適用の申請に対する厚生労働大臣の認可の権限は、日本年金機構に委任されている。", "answer": false, "explanation": "任意適用の認可権限は「地方厚生局長又は地方厚生支局長」に委任されており、日本年金機構は事務の一部を担うのみである。", "year": "H30", "category": "権限の委任等"}, {"id": 11, "question": "全国健康保険協会管掌健康保険の特定適用事業所に使用される短時間労働者が被保険者としての要件を満たし、かつ、同時に健康保険組合管掌健康保険の特定適用事業所に使用される短時間労働者の被保険者としての要件を満たした場合は、全国健康保険協会が優先して、当該被保険者の健康保険を管掌する保険者となる。", "answer": false, "explanation": "二以上の事業所で保険者が異なる場合は、被保険者がいずれかの保険者を選択する。", "year": "H30", "category": "保険者の種類等"}, {"id": 12, "question": "被保険者が同時に2事業所に使用される場合において、それぞれの適用事業所における保険者が異なる場合は、選択する保険者に対して保険者を選択する届出を提出しなければならないが、当該2事業所の保険者がいずれも全国健康保険協会であれば、日本年金機構の業務が2つの年金事務所に分掌されていても届出は必要ない。", "answer": false, "explanation": "保険者がいずれも協会であっても、管轄する年金事務所が異なる場合には、どちらか一方を選択する届出が必要である。", "year": "H27", "category": "保険者の種類等"}, {"id": 13, "question": "全国健康保険協会の定款記載事項である事務所の所在地を変更する場合、厚生労働大臣の認可を受けなければその効力を生じない。", "answer": false, "explanation": "事務所の所在地の変更等の事項については、厚生労働大臣の認可を受けなくても効力を生じ、遅滞なく届け出ればよい。", "year": "R6", "category": "全国健康保険協会"}, {"id": 14, "question": "全国健康保険協会は、厚生労働大臣から事業年度ごとの業績について評価を受け、その評価の結果を公表しなければならない。", "answer": false, "explanation": "業績の評価を行い、その結果を公表する主体は「厚生労働大臣」である。", "year": "R6", "category": "全国健康保険協会"}, {"id": 15, "question": "全国健康保険協会は、財務諸表、事業報告書（会計に関する部分に限る。）及び決算報告書について、監事の監査のほか、厚生労働大臣が選任する会計監査人である公認会計士又は監査法人から監査を受けなければならない。", "answer": true, "explanation": "財務諸表等について、監事の監査に加えて大臣が選任する会計監査人の監査を受ける必要がある。", "year": "R6", "category": "全国健康保険協会"}, {"id": 16, "question": "全国健康保険協会の役員に対する報酬及び退職手当は、その役員の業績が考慮されるものでなければならない。全国健康保険協会は、その役員に対する報酬及び退職手当の支給の基準を定め、これを厚生労働大臣に届け出るとともに、公表しなければならないが、厚生労働大臣の承認を受ける旨は規定されていない。", "answer": false, "explanation": "役員の報酬・退職手当の支給基準を定めたときは、大臣に届け出て承認を得た後、公表する必要がある。", "year": "R6", "category": "全国健康保険協会"}, {"id": 17, "question": "任意継続被保険者の保険料の徴収に係る業務は、保険者が全国健康保険協会の場合は厚生労働大臣が行い、保険者が健康保険組合の場合は健康保険組合が行う。", "answer": false, "explanation": "任意継続被保険者の保険料徴収業務は、保険者が協会である場合は「全国健康保険協会」自らが行う。", "year": "H29", "category": "全国健康保険協会"}, {"id": 18, "question": "全国健康保険協会の常勤役員は、厚生労働大臣の承認を受けたときを除き、営利を目的とする団体の役員となり、又は自ら営利事業に従事してはならない。", "answer": true, "explanation": "協会の常勤役員には、原則として営利目的の職務との兼職禁止規定が適用される。", "year": "H29", "category": "全国健康保険協会"}, {"id": 19, "question": "健康保険法第7条の14によると、厚生労働大臣又は全国健康保険協会理事長は、それぞれその任命に係る全国健康保険協会の役員が、心身の故障のため職務の遂行に堪えないと認められるとき、又は職務上の義務違反があるときのいずれかに該当するとき、その他役員たるに適しないと認めるときは、その役員を解任することができる。", "answer": true, "explanation": "心身の故障や義務違反等がある場合、任命権者は当該役員を解任することができる。", "year": "R4", "category": "全国健康保険協会"}, {"id": 20, "question": "全国健康保険協会と協会の理事長又は理事との利益が相反する事項については、これらの者は代表権を有しない。この場合には、協会の監事が協会を代表することとされている。", "answer": true, "explanation": "協会と理事長等の利益が相反する場合、監事が協会を代表する規定の通りである。", "year": "R元", "category": "全国健康保険協会"}, {"id": 21, "question": "全国健康保険協会の運営委員会の委員は、9人以内とし、事業主、被保険者及び全国健康保険協会の業務の適正な運営に必要な学識経験を有する者のうちから、厚生労働大臣が各同数を任命することとされており、運営委員会は委員の総数の3分の2以上又は事業主、被保険者及び学識経験を有する者である委員の各3分の1以上が出席しなければ、議事を開くことができないとされている。", "answer": true, "explanation": "運営委員会の定数、任命、及び開催要件に関する規定通りである。", "year": "H30", "category": "全国健康保険協会"}, {"id": 22, "question": "全国健康保険協会は、役員として、理事長1人、理事6人以内及び監事2人を置く。役員の任期は3年とする。理事長に事故があるとき、又は理事長が欠けたときは、理事の互選により選ばれた者がその職務を代理し、又はその職務を行う。", "answer": false, "explanation": "理事長に事故がある等の場合は、「理事のうちから、あらかじめ理事長が指定する者」が職務を代理・代行する。", "year": "R5-1C改", "category": "全国健康保険協会"}, {"id": 23, "question": "全国健康保険協会の理事長、理事及び監事の任期は3年、全国健康保険協会の運営委員会の委員の任期は2年とされている。", "answer": true, "explanation": "協会役員の任期（3年）と運営委員の任期（2年）についての正しい記述である。", "year": "R元-1E改", "category": "全国健康保険協会"}, {"id": 24, "question": "全国健康保険協会は、毎事業年度、財務諸表を作成し、これに当該事業年度の事業報告書及び決算報告書を添え、監事及び厚生労働大臣が選任する会計監査人の意見を付けて、決算完結後2か月以内に厚生労働大臣に提出し、その承認を受けなければならない。", "answer": true, "explanation": "財務諸表等の作成、会計監査人の監査、及び大臣への提出期限に関する規定通りである。", "year": "R元-1E改", "category": "全国健康保険協会"}, {"id": 25, "question": "厚生労働大臣は、全国健康保険協会の事業年度ごとの業績について、評価を行わなければならず、この評価を行ったときは、遅滞なく、全国健康保険協会に対し、当該評価の結果を通知するとともに、これを公表しなければならない。", "answer": true, "explanation": "厚生労働大臣による実績評価及びその公表義務についての規定通りである。", "year": "H30-1オ", "category": "全国健康保険協会"}, {"id": 26, "question": "全国健康保険協会が業務上の余裕金で国債、地方債を購入し、運用を行うことは一切できないとされている。", "answer": false, "explanation": "余裕金を国債や地方債の取得によって運用することは認められている。", "year": "H30-1ウ", "category": "全国健康保険協会"}, {"id": 27, "question": "全国健康保険協会の役員若しくは役職員又はこれらの職にあった者は、健康保険事業に関して職務上知り得た秘密を正当な理由がなく漏らしてはならず、健康保険法の規定に違反して秘密を漏らした者は、1年以下の懲役又は100万円以下の罰金に処すると定められている。", "answer": true, "explanation": "守秘義務及びその違反に対する罰則規定通りの内容である。", "year": "R4-4E", "category": "全国健康保険協会"}, {"id": 28, "question": "健康保険組合は、毎年度終了後6か月以内に、厚生労働省令で定めるところにより、事業及び決算に関する報告書を作成し、厚生労働大臣に提出しなければならない。", "answer": true, "explanation": "健康保険組合の決算報告書の作成と提出義務についての規定通りである。", "year": "R6-4D", "category": "健康保険組合"}, {"id": 29, "question": "健康保険組合は、適用事業所の事業主、その適用事業所に使用される被保険者及び特例退職被保険者をもって組織する。", "answer": false, "explanation": "健康保険組合は、適用事業所の事業主及びその適用事業所に使用される被保険者をもって組織する。特例退職被保険者がいる場合はそれも加わるが、「任意継続被保険者」は組織の構成員には含まれない。", "year": "R3-3C", "category": "健康保険組合"}, {"id": 30, "question": "健康保険組合が解散する場合において、その財産をもって債務を完済することができないときは、当該健康保険組合は、設立事業所の事業主に対し、政令で定めるところにより、当該債務を完済するために要する費用の全部又は一部を負担することを求めることができる。", "answer": true, "explanation": "解散時に債務超過となる場合の事業主への費用負担請求についての規定通りである。", "year": "R3-4イ", "category": "健康保険組合"}, {"id": 31, "question": "代表者が1人の法人の事業所であって、代表者以外に従業員を雇用していないものについては、適用事業所とはならない。", "answer": false, "explanation": "法人の代表者であっても法人から報酬を受けていれば被保険者となり、常時1人以上の従業員（代表者含む）を使用する法人の事業所は、業種を問わず強制適用事業所となる。", "year": "R元-4ア", "category": "強制適用事業所及び任意適用事業所"}, {"id": 32, "question": "強制適用事業所が、健康保険法第3条第3項各号に定める強制適用事業所の要件に該当しなくなったとき、被保険者の2分の1以上が希望した場合には、事業主は厚生労働大臣に任意適用事業所の認可を申請しなければならない。", "answer": false, "explanation": "強制適用の要件に該当しなくなったときは、その時点で「任意適用の認可があったもの」とみなされる（擬制）ため、改めて認可申請を行う必要はない。", "year": "H27-5A", "category": "強制適用事業所及び任意適用事業所"}, {"id": 33, "question": "任意適用事業所に使用される者(被保険者である者に限る。)の4分の3以上が事業主に対して任意適用取消しの申請を求めた場合には、事業主は当該申請を厚生労働大臣に対して行わなければならない。", "answer": false, "explanation": "任意適用の取消申請を行うかどうかは事業主の任意であり、被保険者の4分の3以上の希望があっても申請する「義務」は生じない。", "year": "H28-1イ", "category": "強制適用事業所及び任意適用事業所"}, {"id": 34, "question": "適用事業所の事業主は、廃止、休止その他の事情により適用事業所に該当しなくなったときは、5日以内に、所定の事項を記載した届書を厚生労働大臣又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "適用事業所の廃止等による不該当の届出期限（5日以内）に関する規定通りである。", "year": "R6-3ウ", "category": "適用事業所に関する届出"}, {"id": 35, "question": "適用事業所の事業主に変更があったときは、変更後の事業主は、5日以内に、その旨を記載した届書を厚生労働大臣又は健康保険組合に提出しなければならない。", "answer": true, "explanation": "事業主変更時の届出義務及び期限（5日以内）についての正しい記述である。", "year": "H28-6E", "category": "適用事業所に関する届出"}, {"id": 36, "question": "特定適用事業所に使用される短時間労働者について、健康保険法第3条第1項第9号の規定によりその報酬が月額88,000円未満である場合には、被保険者になることができないが、この報酬とは、賃金、給料、俸給、手当、賞与その他いかなる名称であるかを問わず、労働者が労働の対償として受けるすべてのものをいう。", "answer": false, "explanation": "短時間労働者の88,000円判定における「報酬」には、臨時的な賃金や1月を超える期間ごとに支払われる賃金（賞与等）、時間外手当などは含まれない。", "year": "H29", "category": "一般の被保険者等"}, {"id": 37, "question": "特定適用事業所とは、事業主が同一である1又は2以上の適用事業所であって、当該1又は2以上の適用事業所に使用される特定労働者の総数が常時50人を超えるものの各適用事業所のことをいう。", "answer": true, "explanation": "特定適用事業所の定義に関する規定通りである。", "year": "H29", "category": "一般の被保険者等"}, {"id": 38, "question": "適用事業所に期間の定めなく採用された者は、採用当初の2か月が試用期間として定められていた場合であっても、当該試用期間を経過した日から被保険者となるのではなく、採用日に被保険者となる。", "answer": true, "explanation": "試用期間中であっても、事実上の使用関係がある以上、採用された日から被保険者資格を取得する。", "year": "R2", "category": "一般の被保険者等"}, {"id": 39, "question": "同一の事業所においては、雇用契約上一旦退職した者が1日の空白もなく引き続き再雇用された場合、退職金の支払いの有無又は身分関係若しくは職務内容の変更の有無にかかわらず、その者の事実上の使用関係は中断することなく存続しているものであるから、被保険者の資格も継続するものであるが、60歳以上の者であって、退職後継続して再雇用されるものについては、使用関係が一旦中断したものとみなし、当該事業所の事業主は、被保険者資格喪失届及び被保険者資格取得届を提出することができる。", "answer": true, "explanation": "いわゆる「同日得喪」の特例についての正しい記述である。60歳以上の定年再雇用等の場合に認められている。", "year": "R元", "category": "一般の被保険者等"}, {"id": 40, "question": "任意継続被保険者は、任意継続被保険者でなくなることを希望する旨を、厚生労働省令で定めるところにより、保険者に申し出た場合において、その申し出た日の属する月の末日が到来するに至ったときは、その翌日から任意継続被保険者の資格を喪失する。", "answer": false, "explanation": "喪失日は、「申出が受理された日」の属する月の末日の翌日である。申出日ではない。", "year": "R6", "category": "任意継続被保険者等"}, {"id": 41, "question": "任意継続被保険者の申出は、被保険者の資格を喪失した日から20日以内にしなければならず、いかなる場合においても、この期間を経過した後の申出は受理することができない。", "answer": false, "explanation": "正当な理由があると認められる場合には、20日を過ぎた後の申出も受理されることがある。", "year": "R2", "category": "任意継続被保険者等"}, {"id": 42, "question": "任意継続被保険者が、保険料(初めて納付すべき保険料を除く。)を納付期日までに納付しなかったときは、納付の遅延について正当な理由があると保険者が認めた場合を除き、督促状により指定する期限の翌日にその資格を喪失する。", "answer": false, "explanation": "督促状は発行されず、「本来の納付期日（その月の10日）」の翌日に当然に資格を喪失する。", "year": "H27", "category": "任意継続被保険者等"}, {"id": 43, "question": "任意継続被保険者が75歳に達し、後期高齢者医療の被保険者になる要件を満たしたとしても、任意継続被保険者となった日から起算して2年を経過していない場合は、任意継続被保険者の資格が継続するため、後期高齢者医療の被保険者になることはできない。", "answer": false, "explanation": "75歳に達したときは、2年経過前であっても任意継続被保険者の資格を喪失し、後期高齢者医療制度へ移行する。", "year": "H30", "category": "任意継続被保険者等"}, {"id": 44, "question": "特例退職被保険者の資格取得の申出は、健康保険組合において正当の理由があると認めるときを除き、特例退職被保険者になろうとする者に係る年金証書等が到達した日の翌日から起算して20日以内にしなければならない。", "answer": false, "explanation": "特例退職被保険者の申出期限は「20日以内」ではなく「3月以内」である。", "year": "H27", "category": "任意継続被保険者等"}, {"id": 45, "question": "後期高齢者医療の被保険者等その他健康保険法の適用を除外すべき特別の理由がある者として厚生労働省令で定める者は、被扶養者とならない。", "answer": true, "explanation": "後期高齢者医療制度の加入者などは、健康保険の被扶養者にはなれないとする規定通りである。", "year": "H27", "category": "被扶養者"}, {"id": 46, "question": "被保険者の直系尊属、配偶者、子、孫及び兄弟姉妹は、被保険者と同一の世帯に属していなくとも、主としてその被保険者により生計を維持されている場合は被扶養者となることができる。", "answer": true, "explanation": "直系尊属等については、同一世帯でなくても生計維持関係があれば被扶養者となれる。", "year": "H29", "category": "被扶養者"}, {"id": 47, "question": "被保険者の兄弟姉妹は、被保険者の直系尊属、配偶者、子、孫と同様に、被保険者と同一の世帯に属していなくとも、被扶養者となることができる。", "answer": true, "explanation": "兄弟姉妹も直系尊属等と同様に、同一世帯でなくても被扶養者として認定される。", "year": "R5", "category": "被扶養者"}, {"id": 48, "question": "被保険者の兄の配偶者が被保険者と同一の世帯に属し、主として被保険者により生計を維持している場合は、当該被保険者の被扶養者となることができる。", "answer": true, "explanation": "兄の配偶者は「その他の親族」に該当し、同一世帯かつ生計維持関係があれば被扶養者となれる。", "year": "H30", "category": "被扶養者"}, {"id": 49, "question": "被保険者の配偶者の父母は、被保険者と同一世帯に属し、主として被保険者により生計を維持されていても、被扶養者とは認められない。", "answer": false, "explanation": "配偶者の父母は「その他の親族」に該当し、同一世帯かつ生計維持関係があれば被扶養者として認定される。", "year": "R3", "category": "被扶養者"}, {"id": 50, "question": "被保険者の配偶者で届出をしていないが事実上婚姻関係と同様の事情にある者は、被扶養者として認められる場合がある。", "answer": true, "explanation": "内縁の配偶者も、実態として婚姻関係と同様の事情があれば被扶養者として認定される。", "year": "R2", "category": "被扶養者"}, {"id": 51, "question": "日本国内に住所を有しない者であっても、外国に赴任する被保険者に同行する者や留学する学生等については、被扶養者として認定される場合がある。", "answer": true, "explanation": "海外在住であっても、所定の要件を満たす場合は被扶養者として認定できる例外がある。", "year": "H29", "category": "被扶養者"}, {"id": 52, "question": "被保険者の被扶養者である配偶者が出産した場合、被保険者は家族出産育児一時金の支給を受けることができる。", "answer": true, "explanation": "被扶養者（配偶者）の出産に対しては、家族出産育児一時金が支給される。", "year": "H28", "category": "被扶養者"}, {"id": 53, "question": "被保険者が、標準報酬月額の基礎となる報酬の全部又は一部を受けることができなくなったときでも、その期間が1月を超えないときは、随時改定の対象とはならない。", "answer": true, "explanation": "随時改定（月変）は固定的賃金の変動が前提であり、一時的な不支給は対象外である。", "year": "R4", "category": "随時改定"}, {"id": 54, "question": "定時決定において、4月、5月、6月のうち支払基礎日数が17日未満の月がある場合には、その月を除いて報酬月額を算定する。", "answer": true, "explanation": "定時決定における支払基礎日数（17日）未満の月の除外についての規定通りである。", "year": "H28", "category": "定時決定"}, {"id": 55, "question": "被保険者の資格取得時において、月、週その他一定期間によって報酬が定められている場合は、被保険者の資格を取得した日現在の報酬の額をその期間の総日数で除して得た額の30倍に相当する額を報酬月額とする。", "answer": true, "explanation": "資格取得時決定における月額換算の計算方法についての規定通りである。", "year": "R3", "category": "資格取得時決定"}, {"id": 56, "question": "標準報酬月額の定時決定において、4月、5月及び6月の3か月のうちに報酬支払基礎日数が17日未満の月がある場合は、その月の報酬は除算して残りの月の報酬の平均により算定する。", "answer": true, "explanation": "定時決定の算定除外条件と計算方法についての規定通りである。", "year": "H30", "category": "定時決定"}, {"id": 57, "question": "育児休業等終了時改定は、育児休業等が終了した日の翌日が属する月以後3か月間に受けた報酬の総額をその期間の月数で除して得た額（報酬月額）が従前の標準報酬月額に比べて1等級以上変動した場合に、翌月から新標準報酬月額を適用するものである。", "answer": false, "explanation": "育児休業等終了時改定は、1等級以上ではなく「2等級以上」の差が生じた場合に適用される（随時改定と同様の要件）。", "year": "R4", "category": "育児休業等終了時改定"}, {"id": 58, "question": "産前産後休業を終了した被保険者は、当該産前産後休業を終了した日の翌日が属する月以後3か月間に受けた報酬の平均額に基づき、資格を喪失するまでの間の標準報酬月額を改定することができる。この場合の標準報酬月額の改定は、1等級以上の変動がある場合に行われる。", "answer": false, "explanation": "産前産後休業終了時改定における変動等級要件は「1等級以上」ではなく「2等級以上」である（随時改定と同様）。", "year": "H29", "category": "産前産後休業終了時改定"}, {"id": 59, "question": "傷病手当金の支給を受ける場合において、報酬の全部又は一部を受けることができる者に対しては、傷病手当金の支給額が報酬の額を上回る場合に、当該差額が支給される。", "answer": true, "explanation": "傷病手当金と報酬との調整において、報酬が傷病手当金を下回る場合は差額が支給される。", "year": "R3", "category": "傷病手当金"}, {"id": 60, "question": "被保険者が療養のため労務に服することができなくなった日から起算して3日を経過した日から傷病手当金が支給される。", "answer": true, "explanation": "傷病手当金の支給開始は、労務不能となった日から3日間の待期期間経過後の4日目からである。", "year": "H29", "category": "傷病手当金"}, {"id": 61, "question": "傷病手当金の支給期間は、支給開始日から起算して1年6か月が経過した場合には、その期間を経過した日の翌日以降は支給されない。", "answer": false, "explanation": "平成28年改正により、傷病手当金の支給期間は「支給を開始した日から通算して1年6か月」となった。", "year": "R4", "category": "傷病手当金"}, {"id": 62, "question": "同一の疾病又は負傷及びこれにより発した疾病について、傷病手当金の支給を受けることができる期間は、その支給を始めた日から起算して通算して1年6か月間である。", "answer": true, "explanation": "平成28年改正後の傷病手当金の支給期間（通算1年6か月）についての正しい記述である。", "year": "H29", "category": "傷病手当金"}, {"id": 63, "question": "傷病手当金の額は、1日につき、傷病手当金の支給を始める日の属する月以前の直近の継続した12か月間の各月の標準報酬月額を平均した額の30分の1に相当する額の3分の2に相当する金額である。", "answer": true, "explanation": "傷病手当金の支給額の計算方法についての正しい規定である。", "year": "R2", "category": "傷病手当金"}, {"id": 64, "question": "被保険者が出産のため仕事を休み、その期間に給与を受けた場合において、その給与が出産手当金より少ない場合には、差額が出産手当金として支給される。", "answer": true, "explanation": "出産手当金と報酬との調整において、報酬が出産手当金を下回る場合は差額が支給される。", "year": "R3", "category": "出産手当金"}, {"id": 65, "question": "出産手当金の支給期間は、出産の日（出産の日が出産の予定日後であるときは、出産の予定日）以前42日（多胎妊娠の場合においては、98日）から出産の日後56日までの間において労務に服さなかった期間（産前産後休業）である。", "answer": true, "explanation": "出産手当金の支給期間についての正しい記述である。", "year": "H28", "category": "出産手当金"}, {"id": 66, "question": "被保険者資格を喪失した後、傷病手当金の継続給付を受けることができる者が、その支給を受けている間に障害厚生年金を受けられるようになり、当該傷病手当金の額が当該障害厚生年金の日額に相当する額より少ないときは、傷病手当金は支給されない。", "answer": false, "explanation": "傷病手当金の額が障害厚生年金の日額を下回る場合ではなく、上回る場合に差額が支給される。", "year": "H29", "category": "資格喪失後の給付"}, {"id": 67, "question": "被保険者の資格を喪失した日の前日まで引き続き1年以上被保険者であった者が、その資格を喪失した際に傷病手当金の支給を受けていた場合には、資格喪失後も引き続き同一の傷病について、支給開始日から通算して1年6か月の支給期間が満了するまで傷病手当金が支給される。", "answer": true, "explanation": "資格喪失後の傷病手当金の継続給付の要件と支給期間についての正しい記述である。", "year": "R4", "category": "資格喪失後の給付"}, {"id": 68, "question": "保険者は、偽りその他不正の行為によって保険給付を受け、又は受けようとした者に対して、6か月以内の期間を定め、その者に支給すべき傷病手当金又は出産手当金の全部又は一部を支給しない旨の決定をすることができる。", "answer": true, "explanation": "不正受給に対する給付制限（傷病手当金・出産手当金の停止）についての規定通りである。", "year": "R3", "category": "給付制限・損害賠償との調整"}, {"id": 69, "question": "健康保険の保険給付を受ける権利は、これを行使することができる時から2年を経過したときは、時効によって消滅する。", "answer": true, "explanation": "健康保険の給付請求権の消滅時効（2年）についての規定通りである。", "year": "H28", "category": "時効"}, {"id": 70, "question": "被保険者証の返納をしない被保険者の世帯主又は被保険者に対しては、6か月以下の懲役又は50万円以下の罰金に処する。", "answer": false, "explanation": "被保険者証の返納義務違反に対しては「罰金」ではなく「過料」が科される。", "year": "R2", "category": "雑則・罰則"}, {"id": 71, "question": "全国健康保険協会が管掌する健康保険の保険料率は、各都道府県単位で設定され、都道府県ごとに異なることがある。", "answer": true, "explanation": "協会けんぽの保険料率は都道府県単位で決定されるため、都道府県によって異なる。", "year": "R4", "category": "保険料率"}, {"id": 72, "question": "健康保険組合は、一般保険料率を1000分の30から1000分の130までの範囲内において規約で定める。", "answer": true, "explanation": "健康保険組合の一般保険料率の範囲についての規定通りである。", "year": "H30", "category": "保険料率"}, {"id": 73, "question": "産前産後休業期間中の保険料免除の申出は、被保険者本人が行わなければならず、事業主が代わって行うことはできない。", "answer": false, "explanation": "産前産後休業期間中の保険料免除は、事業主が申出を行う。", "year": "R3", "category": "保険料の負担等"}, {"id": 74, "question": "育児休業等期間中の保険料の免除において、月を単位とする育児休業等の場合は、育児休業等を開始した日の属する月から終了する日の翌日が属する月の前月までの月分の保険料が免除される。", "answer": true, "explanation": "育児休業等期間中の保険料免除の期間についての正しい記述である。", "year": "R3", "category": "保険料の負担等"}, {"id": 75, "question": "事業主は、被保険者が育児休業等をしている間、当該被保険者及び当該事業主が負担すべき保険料を免除される。", "answer": true, "explanation": "育児休業等期間中の被保険者・事業主双方の保険料免除についての規定通りである。", "year": "H27", "category": "保険料の負担等"}, {"id": 76, "question": "療養の給付の対象となる診療材料の支給において、被保険者が保険医療機関で給付として受けるべきものを自費で購入したために療養費の支給を申請する場合、保険医療機関の医師が指示書を発行すれば、その費用が療養費として支給される。", "answer": true, "explanation": "医師の指示に基づく治療材料の購入費用は療養費として支給されうる。", "year": "H27", "category": "療養費"}, {"id": 77, "question": "柔道整復師による施術については、骨折及び脱臼の施術に関しては、医師の同意がなくても療養費の支給対象となる。", "answer": false, "explanation": "骨折・脱臼の場合は緊急の場合を除き、あらかじめ医師の同意が必要である。打撲・捻挫は同意不要。", "year": "H28", "category": "療養費"}, {"id": 78, "question": "訪問看護療養費は、指定訪問看護事業者から訪問看護を受けた被保険者に対し、その費用について保険者が直接指定訪問看護事業者に支払う現物給付の方式で行われる。", "answer": true, "explanation": "訪問看護療養費の現物給付化（直接支払い）についての正しい記述である。", "year": "H30", "category": "訪問看護療養費"}, {"id": 79, "question": "入院時食事療養費について、標準負担額は厚生労働大臣が定め、その額は食事療養に通常要する費用のうち、食材料費及び光熱水費を勘案して算定される。", "answer": false, "explanation": "標準負担額は「食材料費相当」を勘案して算定される。光熱水費は入院時生活療養費の居住費相当部分で考慮されるもので、食事療養費には含まれない。", "year": "H29", "category": "入院時食事療養費"}, {"id": 80, "question": "保険外併用療養費の支給対象となる評価療養には、先進医療（高度の医療技術を用いた療養であって、当該療養を受けようとする者の選定に係るものを除く。）が含まれる。", "answer": true, "explanation": "先進医療は評価療養の一類型として正しく、選定療養ではなく評価療養に区分される。", "year": "H30", "category": "保険外併用療養費"}, {"id": 81, "question": "被保険者証を紛失したり、汚損したりして再交付を受ける場合は、被保険者は事業主を経由して再交付の申請を行うことができる。", "answer": true, "explanation": "被保険者証の再交付申請は事業主経由で行うことができる。", "year": "H27", "category": "被保険者証等"}, {"id": 82, "question": "資格喪失後の傷病手当金の継続給付の要件として、資格喪失の前日まで引き続き1年以上の被保険者期間が必要であるが、この期間には任意継続被保険者であった期間は算入されない。", "answer": true, "explanation": "継続給付の資格要件における1年以上の被保険者期間には、任意継続被保険者期間は含まれない。", "year": "H29", "category": "資格喪失後の給付"}, {"id": 83, "question": "埋葬料は、被保険者が死亡した場合に、その者により生計を維持していた者であって埋葬を行うものに対して支給するが、生計を維持していた者がいない場合は、実際に埋葬を行った者に対して埋葬に要した費用に相当する金額（5万円を限度）が支給される。", "answer": true, "explanation": "埋葬料と埋葬費の支給対象についての正しい記述である。", "year": "H28", "category": "埋葬料、埋葬費及び家族埋葬料"}, {"id": 84, "question": "出産育児一時金の支給額は、産科医療補償制度に加入する医療機関等における出産に係るものは50万円、それ以外は48万8千円である。", "answer": true, "explanation": "産科医療補償制度加入の有無による出産育児一時金の支給額の違いについての規定通りである。", "year": "R5", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 85, "question": "出産育児一時金は、被保険者が出産した場合に支給されるが、妊娠4か月（85日）以上であれば、死産の場合にも支給される。", "answer": true, "explanation": "妊娠85日以上であれば死産・流産を問わず出産育児一時金の支給対象となる。", "year": "H28", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 86, "question": "高額療養費の支給において、被保険者が同一月に複数の医療機関で受診した場合、各医療機関の自己負担額を合算して限度額を超えた分が支給されるが、合算する際の各医療機関の自己負担額は、2万1千円以上のものに限られる（70歳未満の場合）。", "answer": true, "explanation": "70歳未満の世帯合算における各医療機関の自己負担額の下限（2万1千円以上）についての規定通りである。", "year": "H30", "category": "高額療養費"}, {"id": 87, "question": "保険者は、健康保険事業に関連して、被保険者及び被扶養者の健康の保持増進のために必要な保健事業及び福祉事業（保健福祉事業）を行うことができる。", "answer": true, "explanation": "保健福祉事業の実施についての規定通りである。", "year": "H27", "category": "保健福祉事業"}, {"id": 88, "question": "健康保険の被保険者が、故意の犯罪行為により生じた疾病の療養を受ける場合、健康保険からの給付は一切行われない。", "answer": true, "explanation": "故意の犯罪行為による給付制限（全額不支給）についての規定通りである。", "year": "H29", "category": "給付制限・損害賠償との調整"}, {"id": 89, "question": "高額療養費の算定において、70歳未満の被保険者の世帯合算を行う場合、被扶養者の自己負担額も合算対象となるが、被扶養者の各医療機関での自己負担額が2万1千円未満の場合は合算対象とならない。", "answer": true, "explanation": "70歳未満の世帯合算における被扶養者分の2万1千円未満の自己負担は除外される。", "year": "H28", "category": "高額療養費"}, {"id": 90, "question": "被保険者が第三者の行為によって生じた疾病又は負傷について保険給付を受けた場合、保険者は、その給付の価額の限度において、被保険者が第三者に対して有する損害賠償の請求権を取得する。", "answer": true, "explanation": "第三者行為による傷病に係る損害賠償請求権の代位取得についての規定通りである。", "year": "R2", "category": "給付制限・損害賠償との調整"}, {"id": 91, "question": "保険者は、偽りその他不正の行為によって保険給付を受けた者があるときは、その者からその給付の価額の全部又は一部を徴収することができる。", "answer": true, "explanation": "不正受給者からの給付価額の徴収についての規定通りである。", "year": "H27", "category": "給付制限・損害賠償との調整"}, {"id": 92, "question": "健康保険の保険料に関する請求権の消滅時効は2年であり、保険料の督促状の発送により時効の進行は中断される。", "answer": true, "explanation": "保険料の消滅時効（2年）と督促による時効中断についての規定通りである。", "year": "H30", "category": "時効"}, {"id": 93, "question": "保険者は、被保険者、事業主又は被保険者であった者に対して、必要と認めるときは、被保険者の資格、標準報酬又は保険給付に関して必要な書類の提出を命じることができる。", "answer": true, "explanation": "保険者による書類提出命令についての規定通りである。", "year": "R3", "category": "雑則等"}, {"id": 94, "question": "全国健康保険協会は、健康保険事業に関して不正を行った場合に、厚生労働大臣が業務の全部を停止させることができる。", "answer": true, "explanation": "厚生労働大臣による業務停止命令についての規定通りである。", "year": "H29", "category": "雑則等"}, {"id": 95, "question": "被保険者が療養の給付を受ける際に支払う一部負担金の割合は、被保険者の年齢によって異なる。", "answer": true, "explanation": "70歳未満は3割、70歳以上75歳未満は2割（現役並み所得者は3割）と、年齢によって一部負担金の割合が異なる。", "year": "H27", "category": "療養の給付"}, {"id": 96, "question": "保険医療機関等において療養の給付を受けた被保険者は、その費用の一部負担金として、当該療養の給付について法律で定められた割合に相当する額を当該保険医療機関等に支払わなければならない。", "answer": true, "explanation": "一部負担金の支払義務についての規定通りである。", "year": "H28", "category": "療養の給付"}, {"id": 97, "question": "健康保険の被保険者が出産した場合、その出産が妊娠4月（85日）以降の死産であっても、出産育児一時金が支給される。", "answer": true, "explanation": "妊娠85日以上であれば、死産の場合にも出産育児一時金が支給される。", "year": "H30", "category": "出産育児一時金及び家族出産育児一時金"}, {"id": 98, "question": "日雇特例被保険者に関する保険給付のうち、傷病手当金については、受給資格者票に健康保険印紙を受給資格月の前2月間に通算して26日分以上受けた者に対して支給される。", "answer": true, "explanation": "日雇特例被保険者の傷病手当金受給要件（前2月26日分以上）についての規定通りである。", "year": "R2", "category": "日雇特例被保険者"}, {"id": 99, "question": "移送費は、被保険者が移送された場合において、保険者がやむを得ないものと認めたときは、最も経済的な通常の経路及び方法により移送された場合の移送に要する費用として算定した額を支給する。", "answer": true, "explanation": "移送費の支給要件と支給額の計算方法についての規定通りである。", "year": "H29", "category": "移送費"}, {"id": 100, "question": "高額療養費として支給された額は、一部負担金等の額から控除される。", "answer": true, "explanation": "高額療養費の支給と一部負担金等との関係についての規定通りである。", "year": "H28", "category": "高額療養費"}, {"id": 101, "question": "保険医療機関が保険診療を行うにあたって守るべきルールは、保険医療機関及び保険医療養担当規則（療担規則）に定められており、この規則は厚生労働省令として定められている。", "answer": true, "explanation": "療担規則の法的根拠についての正しい記述である。", "year": "H28", "category": "療養担当者"}, {"id": 102, "question": "不服申立ての手続として、全国健康保険協会が管掌する健康保険については社会保険審査官に対する審査請求、健康保険組合が管掌する健康保険については社会保険審査会に対する審査請求がそれぞれの第一次審査機関となっている。", "answer": false, "explanation": "健康保険組合が管掌する健康保険の第一次審査機関も「社会保険審査官」への審査請求が原則。社会保険審査会は第二段階（再審査請求）である。", "year": "H27", "category": "不服申立て"}, {"id": 103, "question": "健康保険組合が行った処分に不服がある者は、社会保険審査会に審査請求をすることができる。", "answer": false, "explanation": "健康保険組合の処分に不服がある者は、まず「社会保険審査官」に審査請求をする。社会保険審査会への再審査請求は第二段階である。", "year": "H29", "category": "不服申立て"}, {"id": 104, "question": "健康保険の審査請求及び再審査請求は、時効の中断に関しては、裁判上の請求とみなされる。", "answer": true, "explanation": "審査請求・再審査請求が時効中断効を有することについての規定通りである。", "year": "R3", "category": "不服申立て"}, {"id": 105, "question": "全国健康保険協会が管掌する健康保険における疾病、負傷に関する保険給付に関する処分に不服がある被保険者は、社会保険審査官に対し審査請求をし、その決定に不服がある者は社会保険審査会に対し再審査請求をすることができる。", "answer": true, "explanation": "不服申立ての手続（審査請求→再審査請求）についての規定通りである。", "year": "H28", "category": "不服申立て"}, {"id": 106, "question": "入院時食事療養費は、被保険者が保険医療機関から入院時食事療養に係る療養を受けたときに、当該保険医療機関から当該被保険者に対し現金で支給される。", "answer": false, "explanation": "入院時食事療養費は被保険者に対して現金で支給されるのではなく、保険者から保険医療機関に直接支払われる（現物給付的な方式）。", "year": "H27", "category": "入院時食事療養費"}, {"id": 107, "question": "在宅療養中の難病患者等が訪問看護を受けた場合に支給される訪問看護療養費については、指定訪問看護事業者からの請求に基づき、保険者が指定訪問看護事業者に直接支払う方式をとっている。", "answer": true, "explanation": "訪問看護療養費の現物給付方式（直接支払い）についての規定通りである。", "year": "H29", "category": "訪問看護療養費"}, {"id": 108, "question": "特定適用事業所の短時間労働者は、1週間の所定労働時間が20時間以上であること、雇用期間が2か月を超えることが見込まれること、学生でないことの全ての要件を満たした場合に健康保険の被保険者となる。", "answer": false, "explanation": "短時間労働者の被保険者要件には、上記の他に「月額賃金が8.8万円以上」の要件も必要である。", "year": "R4", "category": "一般の被保険者等"}, {"id": 109, "question": "任意継続被保険者の標準報酬月額は、資格喪失時の標準報酬月額か、前年の9月30日における当該保険者の全被保険者の標準報酬月額の平均額のいずれか低い額とされる。", "answer": true, "explanation": "任意継続被保険者の標準報酬月額の決定基準についての規定通りである。", "year": "H30", "category": "任意継続被保険者等"}, {"id": 110, "question": "健康保険組合が管掌する健康保険の任意継続被保険者の標準報酬月額は、規約に定めることにより、前年の9月30日における当該健康保険組合の全被保険者の標準報酬月額を超えない範囲で独自に設定することができる。", "answer": true, "explanation": "健康保険組合における任意継続被保険者の標準報酬月額の規約による特例についての規定通りである。", "year": "R6", "category": "任意継続被保険者等"}, {"id": 111, "question": "保険医療機関の指定は、医療法第7条第1項又は第2項の許可を受けた病院若しくは診療所又は薬局の開設者の申請により行われ、申請のあった保険医療機関について欠格事由がない限り指定しなければならない。", "answer": false, "explanation": "保険医療機関の指定には裁量的拒否事由があり、欠格事由がなければ必ず指定しなければならないとは限らない。", "year": "H28", "category": "保険医療機関及び保険薬局等"}, {"id": 112, "question": "保険医療機関及び保険薬局の指定を行うのは、厚生労働大臣（実際には地方厚生局長）であるが、病院・診療所については保険医の登録が別途必要である。", "answer": true, "explanation": "保険医療機関の指定と保険医の登録が別々の手続きである点についての正しい記述である。", "year": "H29", "category": "保険医療機関及び保険薬局等"}, {"id": 113, "question": "保険医療機関の指定の効力は、6年ごとに更新を受けなければ失効する。", "answer": true, "explanation": "保険医療機関の指定は6年ごとの更新制である。", "year": "R3", "category": "保険医療機関及び保険薬局等"}, {"id": 114, "question": "保険医療機関又は保険薬局の指定取消の際には、地方社会保険医療協議会への諮問が必要である。", "answer": true, "explanation": "指定取消の際の地方社会保険医療協議会への諮問義務についての規定通りである。", "year": "H28", "category": "保険医療機関及び保険薬局等"}, {"id": 115, "question": "保険医の登録は、保険医療機関ごとに行う必要があり、複数の保険医療機関に勤務する場合は各機関について登録が必要である。", "answer": false, "explanation": "保険医の登録は個人単位で全国共通であり、保険医療機関ごとに登録し直す必要はない。", "year": "H27", "category": "保険医及び保険薬剤師"}, {"id": 116, "question": "保険医療機関の指定は、病院又は診療所の開設者から申請があった場合に、厚生労働大臣が行うが、病床を有する診療所については6年ごとの更新は不要である。", "answer": false, "explanation": "病床の有無にかかわらず、保険医療機関の指定は6年ごとの更新が必要である。", "year": "H30", "category": "保険医療機関及び保険薬局等"}, {"id": 117, "question": "健康保険の被保険者が、故意に給付事由を生じさせたときは、当該給付事由に係る保険給付は行われない。", "answer": true, "explanation": "故意による給付事由の発生に対する給付制限についての規定通りである。", "year": "H27", "category": "給付制限・損害賠償との調整"}, {"id": 118, "question": "健康保険の給付を受ける権利について、その権利を行使することができる時から2年で消滅時効が完成するが、保険給付の請求があった場合には、この時効は中断される。", "answer": true, "explanation": "給付請求権の消滅時効（2年）と、請求による時効中断についての規定通りである。", "year": "H28", "category": "時効"}, {"id": 119, "question": "指定訪問看護事業者の指定は、訪問看護事業を行う者の申請により、都道府県知事が行う。", "answer": false, "explanation": "指定訪問看護事業者の指定は「厚生労働大臣（実際には地方厚生局長）」が行う。都道府県知事ではない。", "year": "H29", "category": "指定訪問看護事業者"}, {"id": 120, "question": "健康保険の被保険者が、正当な理由がなく療養に関する指示に従わないときは、保険者は、保険給付の一部を行わないことができる。", "answer": true, "explanation": "療養指示不遵守に対する給付の一部制限についての規定通りである。", "year": "H27", "category": "給付制限・損害賠償との調整"}, {"id": 121, "question": "被扶養者としての届出に係る者（以下「認定対象者」という。）が日本国内に住所を有し、被保険者と同一世帯に属している場合、当該認定対象者の年間収入が130万円未満（認定対象者が60歳以上の者である場合又は概ね厚生年金保険法による障害厚生年金の受給要件に該当する程度の障害者である場合にあっては180万円未満）であって、かつ、被保険者の年間収入を上回らない場合には、当該世帯の生計の状況を総合的に勘案して、当該被保険者がその世帯の生計維持の中心的役割を果たしていると認められるときは、被扶養者に該当する。", "answer": true, "explanation": "被扶養者の認定において、同一世帯かつ収入基準を満たす場合であっても、最終的には生計維持関係の実態（中心的役割を果たしているか）により判断される。", "year": "R元-5C改", "category": "被扶養者"}, {"id": 122, "question": "共に全国健康保険協会管掌健康保険の被保険者である夫婦が共同して扶養している者に係る被扶養者の認定においては、被扶養者とすべき者の員数にかかわらず、被保険者の年間収入が多い方の被扶養者とし、夫婦双方の年間収入の差額が年間収入が多い方の1割以内である場合は、届出により、主として生計を維持する者の被扶養者とするものとされている。", "answer": true, "explanation": "夫婦共同扶養の場合の認定基準についての正しい記述である。収入差が1割以内の場合は、届出によって主たる扶養者を決定できる特例がある。", "year": "H29-6C改", "category": "被扶養者"}, {"id": 123, "question": "夫婦共同扶養の場合における被扶養者の認定について、夫婦の一方が被用者保険の被保険者で、もう一方が国民健康保険の被保険者の場合には、被用者保険の被保険者については年間収入を、国民健康保険の被保険者については直近の年間所得で見込んだ年間収入を比較し、いずれか多い方を主として生計を維持する者とする。", "answer": false, "explanation": "被用者保険と国民健康保険の比較であっても、双方の「年間収入」を比較して判断する。国民健康保険側だけ「直近の年間所得」とするわけではない。", "year": "R5-2A", "category": "被扶養者"}, {"id": 124, "question": "夫婦共同扶養の場合における被扶養者の認定については、夫婦とも被用者保険の被保険者である場合には、被扶養者とすべき者の員数にかかわらず、健康保険被扶養者（異動）届が出された日の属する年の前年分の年間収入の多い方の被扶養者とする。", "answer": false, "explanation": "「前年分の年間収入」ではなく、過去の収入や現時点の状況等から算出される「今後1年間の収入の見込み」で比較する。", "year": "R4-4A", "category": "被扶養者"}, {"id": 125, "question": "被扶養者の要件として、被保険者と同一の世帯に属する者とは、被保険者と住居及び家計を共同にする者をいい、同一戸籍内にあることは必ずしも必要ではないが、被保険者が世帯主でなければならない。", "answer": false, "explanation": "同一世帯とは実態として住居及び家計を共にしている状態を指し、被保険者が世帯主である必要はない。", "year": "R2-5ア", "category": "被扶養者"}, {"id": 126, "question": "適用事業所の事業主は、厚生労働省令で定めるところにより、被保険者の資格の取得に関する事項を保険者等に届け出なければならない。この届出については、被保険者の住所等を記載した被保険者資格取得届を提出することによって行うこととされているが、当該被保険者が健康保険組合が管掌する健康保険の被保険者であって、当該健康保険組合が当該被保険者の住所に係る情報を求めないときは、被保険者の住所は記載が不要である。", "answer": false, "explanation": "健康保険法施行規則24条1項1号ニにより、被保険者の住所は届出事項として規定されており、健康保険組合の意向で不要とすることはできない。", "year": "R6-5E", "category": "資格の得喪の確認及び届出等"}, {"id": 127, "question": "任意適用事業所の適用の取消しによる被保険者の資格の喪失並びに任意継続被保険者及び特例退職被保険者の資格の喪失の要件に該当した場合は、被保険者が保険者等に資格喪失の届書を提出しなければならず、当該資格喪失の効力は、保険者等の確認によって生ずる。", "answer": false, "explanation": "任意適用取消や任意継続等の資格喪失は、保険者等の「確認」を待たず、喪失の事由（要件）が生じた時にその効力が発生する。", "year": "H30-2C", "category": "資格の得喪の確認及び届出等"}, {"id": 128, "question": "保険者等は被保険者の資格の取得及び喪失の確認又は標準報酬の決定を行うため必要があると認めるときは、適用事業所の事業主に対し、健康保険に関する帳簿書類その他の物件の提示を命じ、又は当該職員に質問させることができる。", "answer": true, "explanation": "保険者等が行う調査・報告命令に関する権限についての正しい記述である。", "year": "R元-1B", "category": "資格の得喪の確認及び届出等"}, {"id": 129, "question": "全国健康保険協会管掌健康保険の任意継続被保険者の妻が被扶養者となった場合は、5日以内に、被保険者は所定の事項を記入した被扶養者届を、事業主を経由して全国健康保険協会に提出しなければならない。", "answer": false, "explanation": "任意継続被保険者には使用主（事業主）が存在しないため、届出は事業主を経由せず、本人が直接全国健康保険協会に提出する。", "year": "H30-4C", "category": "資格の得喪の確認及び届出等"}, {"id": 130, "question": "一般の被保険者は、その住所を変更したときは、速やかに、変更後の住所を事業主に申し出るとともに、被保険者証を事業主に提出しなければならない。事業主は、その申出を受けたときは、遅滞なく、変更後の住所を被保険者証を添えて厚生労働大臣又は健康保険組合に届け出なければならない。", "answer": false, "explanation": "住所変更の届出に際して、被保険者証を事業主に提出したり、届書に被保険者証を添えたりする必要はない。", "year": "H28-2E", "category": "資格の得喪の確認及び届出等"}, {"id": 131, "question": "50歳である一般の被保険者は、当該被保険者又はその被扶養者が介護保険第2号被保険者に該当しなくなったときは、遅滞なく、所定の事項を記載した届書を事業主を経由して厚生労働大臣又は健康保険組合に届け出なければならないが、事業主の命により被保険者が外国に勤務することとなったため、いずれの市町村又は特別区の区域内にも住所を有しなくなったときは、当該事業主は、被保険者に代わってこの届書を厚生労働大臣又は健康保険組合に届け出ることができる。", "answer": true, "explanation": "介護保険第2号被保険者の資格喪失届に関する規定通りである。海外赴任による住所喪失の場合、事業主による代行が認められている。", "year": "H29-6D", "category": "資格の得喪の確認及び届出等"}, {"id": 132, "question": "被保険者は、被保険者又はその被扶養者が65歳に達することにより、介護保険第2号被保険者に該当しなくなったときは、遅滞なく、事業所整理記号及び被保険者整理番号等を記載した届書を事業主を経由して厚生労働大臣又は健康保険組合に届け出なければならない。", "answer": false, "explanation": "65歳に達したことによる介護保険第2号被保険者の資格喪失については、年齢で判別可能なため届出は不要とされている。", "year": "R4-7A", "category": "資格の得喪の確認及び届出等"}, {"id": 133, "question": "被保険者は、被保険者又はその被扶養者が40歳に達することにより介護保険第2号被保険者に該当するに至ったときは、遅滞なく、所定の事項を記載した届書を事業主を経由して日本年金機構又は健康保険組合に届け出なければならない。", "answer": false, "explanation": "40歳に達したことによる介護保険第2号被保険者への該当についても、年齢で判別可能なため届出は不要である。", "year": "H29-2A", "category": "資格の得喪の確認及び届出等"}, {"id": 134, "question": "保険者は、被保険者（任意継続被保険者を除く。）に被保険者証を交付しようとするときは、これを事業主に送付しなければならないとされているが、保険者が支障がないと認めるときは、これを被保険者に送付することができる。", "answer": true, "explanation": "被保険者証の交付（送付）ルートに関する規定通りの内容である。", "year": "R4-2E", "category": "被保険者証等"}, {"id": 135, "question": "特例退職被保険者が被保険者証を紛失した場合の被保険者証の再交付申請は、一般の被保険者であったときの事業主を経由して行う。ただし、災害その他やむを得ない事情により、当該事業主を経由して行うことが困難であると保険者が認めるときは、事業主を経由することを要しない。", "answer": false, "explanation": "特例退職被保険者の再交付申請は、旧事業主を経由する必要はなく、直接健康保険組合に対して行う。", "year": "H27-1E", "category": "被保険者証等"}, {"id": 136, "question": "健康保険法施行規則においては、保険者は3年ごとに一定の期日を定め、被扶養者に係る確認をすることができることを規定している。", "answer": false, "explanation": "被扶養者の確認は「3年ごと」ではなく、「毎年」一定の期日を定めて行うことができると規定されている。", "year": "H27-5C", "category": "被保険者証等"}, {"id": 137, "question": "保険者は、毎年一定の期日を定め、被保険者証の検認又は更新をすることができるが、この検認又は更新を行った場合において、その検認又は更新を受けない被保険者証は無効である。", "answer": true, "explanation": "被保険者証の検認・更新に応じなかった場合の効力に関する正しい記述である。", "year": "R元-8C", "category": "被保険者証等"}, {"id": 138, "question": "事業主は、被保険者が資格を喪失したときは、遅滞なく被保険者証を回収して、これを保険者に返納しなければならないが、テレワークの普及等に対応した事務手続きの簡素化を図るため、被保険者は、被保険者証を事業主を経由せずに直接保険者に返納することが可能になった。", "answer": false, "explanation": "現在も被保険者証の返納は原則として事業主を経由して行う必要があり、被保険者が直接保険者に返納する仕組みは導入されていない。", "year": "R4-1C", "category": "被保険者証等"}, {"id": 139, "question": "資格を取得する際に厚生労働大臣から被保険者資格証明書の交付を受けた被保険者に対して被保険者証が交付されたときは、当該資格証明書はその被保険者に係る適用事業所の事業主が回収し、破棄しなければならない。", "answer": false, "explanation": "被保険者証が交付された場合、不要となった資格証明書は事業主が回収し、厚生労働大臣（日本年金機構）へ返納しなければならない。", "year": "H27-8D", "category": "被保険者証等"}, {"id": 140, "question": "全国健康保険協会（以下本問において「協会」という。）は、全国健康保険協会管掌健康保険の被保険者に対して被保険者証の交付、返付又は再交付が行われるまでの間、必ず被保険者資格証明書を有効期限を定めて交付しなければならない。また、被保険者資格証明書の交付を受けた被保険者に対して被保険者証が交付されたときは、当該被保険者は直ちに被保険者資格証明書を協会に返納しなければならない。", "answer": false, "explanation": "協会は資格証明書を「必要があると認めるとき」に交付するのであり、必ず交付しなければならないわけではない。また返納先は日本年金機構である。", "year": "R3-3D", "category": "被保険者証等"}, {"id": 141, "question": "高齢受給者証を交付された特例退職被保険者は、高齢受給者証に記載されている一部負担金の割合が変更されるとき、当該被保険者は5日以内に高齢受給者証を返納しなければならないが、そのときは事業主を通じて保険者に返納しなければならない。", "answer": false, "explanation": "特例退職被保険者の高齢受給者証の返納は、事業主を通さず本人が直接保険者（健康保険組合）に対して行う。", "year": "H28-2D", "category": "被保険者証等"}, {"id": 142, "question": "全国健康保険協会管掌健康保険において、事業主が負担すべき出張旅費を被保険者が立て替え、その立て替えた実費を弁償する目的で被保険者に出張旅費が支給された場合、当該出張旅費は労働の対償とは認められないため、報酬には該当しないものとして取り扱われる。", "answer": true, "explanation": "実費弁償的な出張旅費等は労働の対償ではないため、健康保険法上の「報酬」には含まれない。", "year": "H30-4B", "category": "報酬等の定義"}, {"id": 143, "question": "健康保険法第3条第5項によると、健康保険法において「報酬」とは、賃金、給料、俸給、手当、賞与その他いかなる名称であるかを問わず、労働者が、労働の対償として受けるすべてのものをいう。したがって、名称は異なっても同一性質を有すると認められるものが、年間を通じ4回以上支給される場合において、当該報酬の支給が給与規定、賃金協約等によって客観的に定められており、また、当該報酬の支給が1年間以上にわたって行われている場合は、報酬に該当する。", "answer": true, "explanation": "「報酬」と「賞与」の区分に関する正しい基準である。年4回以上の支給実態があるものは報酬として扱う。", "year": "R4-7B", "category": "報酬等の定義"}, {"id": 144, "question": "保険料徴収の対象となる賞与とは、いかなる名称であるかを問わず、労働者が、労働の対償として3か月を超える期間ごとに支給されるものをいうが、6か月ごとに支給される通勤手当は、賞与ではなく報酬とされる。", "answer": true, "explanation": "通勤手当は支給回数にかかわらず、原則として「報酬」の範囲に含まれる。", "year": "R元-3B", "category": "報酬等の定義"}, {"id": 145, "question": "報酬又は賞与の全部又は一部が、通貨以外のもので支払われる場合においては、その価額は、その地方の時価によって、厚生労働大臣が定めるが、健康保険組合は、規約で別段の定めをすることができる。", "answer": true, "explanation": "現物給与の価額算定に関する規定通りの内容である。", "year": "H28-9オ", "category": "報酬等の定義"}, {"id": 146, "question": "退職を事由に支払われる退職金であって、退職時に支払われるものは報酬又は賞与として扱うものではないが、被保険者の在職時に、退職金相当額の全部又は一部を給与や賞与に上乗せするなど前払いされる場合は、労働の対償としての性格が明確であり、被保険者の通常の生計にあてられる経常的な収入としての意義を有することから、原則として、報酬又は賞与に該当する。", "answer": true, "explanation": "退職金の前払い分については、その性質上、報酬又は賞与として保険料賦課の対象となる。", "year": "R元-8A", "category": "報酬等の定義"}, {"id": 147, "question": "健康保険の標準報酬月額は、第1級の58,000円から第47級の1,210,000円までの等級区分となっている。", "answer": false, "explanation": "健康保険の標準報酬月額の等級区分は、現在、第1級（58,000円）から第50級（1,390,000円）までである。", "year": "H29-2B", "category": "標準報酬月額"}, {"id": 148, "question": "毎年3月31日における標準報酬月額等級の最高等級に該当する被保険者数の被保険者総数に占める割合が100分の1.5を超える場合において、その状態が継続すると認められるときは、その年の9月1日から、政令で、当該最高等級の上に更に等級を加える標準報酬月額の等級区分の改定を行うことができるが、その年の3月31日において、改定後の標準報酬月額等級の最高等級に該当する被保険者数の同日における被保険者総数に占める割合が100分の1を下回ってはならない。", "answer": false, "explanation": "改定後の最高等級の割合の下限は、100分の1ではなく「100分の0.5」である。", "year": "H28-2C", "category": "標準報酬月額"}, {"id": 149, "question": "定時決定の対象となるのは、毎年7月1日現在使用される被保険者である。", "answer": true, "explanation": "標準報酬月額の定時決定における基準日に関する正しい記述である。", "year": "R5-9ア", "category": "定時決定"}, {"id": 150, "question": "被保険者であって、その1か月間の所定労働日数が同一の事業所に使用される通常の労働者の1か月間の所定労働日数の4分の3未満である短時間労働者に係る定時決定について、報酬支払基礎日数が、4月は10日、5月は11日、6月は13日であった場合は、6月の報酬月額をもとに、標準報酬月額を決定する。", "answer": false, "explanation": "短時間労働者（4分の3未満）の場合、報酬支払基礎日数が11日以上の月を対象とするため、この場合は「5月と6月」の平均により決定する。", "year": "H27-6A", "category": "定時決定"}, {"id": 151, "question": "特定適用事業所に使用される短時間労働者の被保険者の報酬支払の基礎となった日数が4月は11日、5月は15日、6月は16日であった場合、報酬支払の基礎となった日数が15日以上の月である5月及び6月の報酬月額の平均額をもとにその年の標準報酬月額の定時決定を行う。", "answer": false, "explanation": "短時間労働者の定時決定の算定対象月は「11日以上」の月である。したがって、11日以上の「4月、5月、6月」すべての平均で算出する。", "year": "R4-10C", "category": "定時決定"}, {"id": 152, "question": "介護休業期間中の標準報酬月額は、その休業期間中に一定の介護休業手当の支給があったとしても、休業直前の標準報酬月額の算定の基礎となった報酬に基づき算定した額とされる。", "answer": true, "explanation": "介護休業期間中は、原則として休業開始直前の標準報酬月額がそのまま適用される。", "year": "R元-10E", "category": "定時決定"}, {"id": 153, "question": "短時間労働者の標準報酬月額の定時決定について、4月、5月及び6月における算定対象となる報酬の支払基礎日数が、各月それぞれ16日であった場合、従前の標準報酬月額で決定される。なお、当該短時間労働者は、通常の労働者の所定労働時間の4分の3以上である者とする。", "answer": false, "explanation": "通常の労働者の4分の3以上の者の場合、17日以上の月が算定対象となる。各月16日（17日未満）の場合は、いずれも算定対象月とならないため、保険者算定により従前の標準報酬月額が適用されるが、設問のように「従前の額で決定される」という単純な帰結にはならない（算定の仕組みが異なる）。", "year": "H28-9エ改", "category": "定時決定"}, {"id": 154, "question": "給与規程が7月10日に改定され、その日以降の賞与の支給回数が年間を通じて4回から3回に変更された適用事業所における被保険者については、翌年の標準報酬月額の定時決定による標準報酬月額が適用されるまでの間において支給された賞与については、標準賞与額の決定は行われない。なお、当該事業所の全ての被保険者について標準報酬月額の随時改定は行われないものとする。", "answer": true, "explanation": "定時決定時点（7月1日）の支給実態で「年間4回以上の賞与」は報酬とみなされる。7月10日の改定後に支給された賞与も、その年は引き続き報酬（の算定基礎）として扱われるため、標準賞与額の決定（保険料賦課）は行わない。", "year": "H27-3A", "category": "定時決定"}, {"id": 155, "question": "標準報酬月額の定時決定等における支払基礎日数の取扱いとして、月給者で欠勤日数分に応じ給与が差し引かれる場合にあっては、その月における暦日の数から当該欠勤日数を控除した日数を支払基礎日数とする。", "answer": false, "explanation": "「暦日」から控除するのではなく、その事業所の就業規則等で定められた「所定労働日数」から欠勤日数を控除して算出する。", "year": "H28-10C", "category": "定時決定"}, {"id": 156, "question": "標準報酬月額の定時決定に際し、給与の締め日が変更になったため、支払基礎日数が暦日を超えて増加した場合は、超過分の報酬を除外した上で、その他の月の報酬との平均を算出することとされている。", "answer": true, "explanation": "締め日の変更により1ヶ月に2回分の給与が支払われるような例外的な場合の算定ルールについての正しい記述である。", "year": "R4-8A", "category": "定時決定"}, {"id": 157, "question": "標準報酬月額の定時決定に際し、給与締め日の変更によって給与支給日数が減少し、支払基礎日数が17日未満となった場合には、その月を除外した上で報酬の平均を算出し、標準報酬月額を算定するものとされている。", "answer": true, "explanation": "締め日の変更により支払対象期間が短くなった月（17日未満）を算定から除外する正しいルールである。", "year": "R4-8C", "category": "定時決定"}, {"id": 158, "question": "被保険者Bは、4月から6月の期間中、当該労働日における労働契約上の労務の提供地が自宅とされたことから、テレワーク勤務を行うこととなったが、業務命令により、週に2回事業所へ一時的に出社した。Bが事業所へ出社した際に支払った交通費を事業主が負担する場合、当該費用は報酬に含まれるため、標準報酬月額の定時決定の手続きにおいてこれらを含めて計算を行った。", "answer": false, "explanation": "テレワーク（在宅勤務）が基本の者が、業務命令により一時的に出社するための旅費（実費）は、実費弁償的性格が強く、報酬には含まれない。", "year": "R4-8B", "category": "定時決定"}, {"id": 159, "question": "被保険者Cは、4月から6月の期間、業務のために使用する通信費等として事業主より仮払いを受けた。その後、実費の精算を行った際、実際に支払った分も含め、仮払い金は、経費であり、標準報酬月額の定時決定の手続きにおける報酬には該当しないため、定時決定の手続きの際に報酬には含めず算定した。", "answer": false, "explanation": "業務に使用せず被保険者の手元に残った仮払い金（返還不要なもの）については、実質的に労働の対償としての利益供与となり、「報酬」に含まれる。", "year": "R4-8D", "category": "定時決定"}, {"id": 160, "question": "標準報酬月額の定時決定について、賃金計算の締切日が末日であって、その月の25日に賃金が支払われる適用事業所において、6月1日に被保険者資格を取得した者については6月25日に支給される賃金を報酬月額として定時決定が行われるが、7月1日に被保険者資格を取得した者については、その年に限り定時決定が行われない。", "answer": false, "explanation": "6月1日から7月1日の間に資格取得した者については、その年の定時決定は行わないと規定されている。したがって、6月1日取得者についても定時決定は行われない。", "year": "H29-10D", "category": "定時決定"}, {"id": 161, "question": "7月から9月までのいずれかの月から標準報酬月額が改定され、又は改定されるべき被保険者については、その年における標準報酬月額の定時決定を行わないが、7月から9月までのいずれかの月に育児休業等を終了した際の標準報酬月額の改定若しくは産前産後休業を終了した際の標準報酬月額の改定が行われた場合は、その年の標準報酬月額の定時決定を行わなければならない。", "answer": false, "explanation": "7月〜9月の間に、育休終了時改定や産前産後休業終了時改定によって標準報酬月額が改定される場合も、定時決定は行われない。", "year": "R3-1D", "category": "定時決定"}, {"id": 162, "question": "保険者が健康保険組合であるときは、健康保険法第44条第1項の規定による保険者算定の算定方法は、規約で定めなければならない。", "answer": true, "explanation": "健康保険組合における保険者算定のルール設定に関する正しい記述である。", "year": "H27-7エ", "category": "定時決定"}, {"id": 163, "question": "全国健康保険協会管掌健康保険の被保険者について、標準報酬月額の定時決定に際し、4月、5月、6月のいずれかの1か月において休職し、事業所から低額の休職給を受けた場合、その休職給を受けた月を除いて報酬月額を算定する。", "answer": true, "explanation": "一時的な休職により低額の給与となった月は、通常の報酬実態を反映しないため、定時決定の算定対象から除外する。", "year": "H30-3D", "category": "定時決定"}, {"id": 164, "question": "標準報酬月額の定時決定に際し、当年の4月、5月、6月の3か月間に受けた報酬の額に基づいて算出した標準報酬月額と、前年の7月から当年の6月までの間に受けた報酬の額に基づいて算出した標準報酬月額の間に2等級以上の差が生じ、この差が業務の性質上例年発生することが見込まれるため保険者算定に該当する場合の手続きはその被保険者が保険者算定の要件に該当すると考えられる理由を記載した申立書にその申立に関する被保険者の同意書を添付して提出する必要がある。", "answer": true, "explanation": "いわゆる「年間平均による保険者算定」の適用手続きについての正しい記述である。被保険者の同意が必要となる点に注意。", "year": "H27-8E", "category": "定時決定"}, {"id": 165, "question": "4月、5月、6月における定時決定の対象月に一時帰休が実施されていた場合、7月1日の時点で一時帰休の状況が解消していれば、休業手当等を除いて標準報酬月額の定時決定を行う。例えば、4月及び5月は通常の給与の支払いを受けて6月のみ一時帰休による休業手当等が支払われ、7月1日の時点で一時帰休の状況が解消していた場合には、6月分を除いて4月及び5月の報酬月額を平均して標準報酬月額の定時決定を行う。", "answer": true, "explanation": "一時帰休中の定時決定に関する正しいルールである。解消している場合は、解消後の報酬（通常の報酬）を反映させるように算定する。", "year": "R元-9オ", "category": "定時決定"}, {"id": 166, "question": "毎年7月1日現に使用する被保険者の標準報酬月額の定時決定の届出は、同月末日までに、健康保険被保険者報酬月額算定基礎届を日本年金機構又は健康保険組合に提出することによって行う。", "answer": false, "explanation": "算定基礎届の提出期限は、毎年「7月10日」までである。", "year": "R3-5C", "category": "定時決定"}, {"id": 167, "question": "健康保険被保険者報酬月額算定基礎届の届出は、事業年度開始の時における資本金の額が1億円を超える法人の事業所の事業主にあっては、電子情報処理組織を使用して行うものとする。ただし、電気通信回線の故障、災害その他の理由により電子情報処理組織を使用することが困難であると認められる場合で、かつ、電子情報処理組織を使用しないで当該届出を行うことができると認められる場合は、この限りでない。", "answer": true, "explanation": "特定法人における電子申請義務化に関する正しい規定である。", "year": "R2-8A", "category": "定時決定"}, {"id": 168, "question": "月、週その他一定期間によって報酬が定められている被保険者に係る資格取得時の標準報酬月額は、被保険者の資格を取得した日現在の報酬の額をその期間における所定労働日数で除して得た額の30倍に相当する額を報酬月額として決定される。", "answer": false, "explanation": "所定労働日数ではなく、その期間の「総日数」で除して得た額を30倍して算出する。", "year": "H27-8C", "category": "資格取得時決定"}, {"id": 169, "question": "適用事業所に新たに使用されることになったが、使用されるに至った日から自宅待機とされた場合は、雇用契約が成立しており、かつ、休業手当が支払われるときには、その休業手当の支払いの対象となった日の初日に被保険者の資格を取得する。また、当該資格取得時における標準報酬月額の決定については、現に支払われる休業手当等に基づき決定し、その後、自宅待機が解消したときは、標準報酬月額の随時改定の対象とする。", "answer": true, "explanation": "自宅待機中の資格取得およびその後の標準報酬月額の改定に関する正しい運用ルールである。", "year": "R4-2B", "category": "資格取得時決定"}, {"id": 170, "question": "全国健康保険協会管掌健康保険の被保険者資格を取得した際の標準報酬月額の決定について、固定的賃金の算定誤りがあった場合には訂正することはできるが、残業代のような非固定的賃金について、その見込みが当初の算定額より増減した場合には訂正することができないとされている。", "answer": true, "explanation": "資格取得時の報酬決定において、非固定的賃金の見込み違いは遡及訂正の対象とはならないとする正しい実務運用である。", "year": "R2-9D", "category": "資格取得時決定"}, {"id": 171, "question": "賃金が時間給で支給されている被保険者について、時間給の単価に変動はないが、労働契約上の1日の所定労働時間が8時間から6時間に変更になった場合、標準報酬月額の随時改定の要件の1つである固定的賃金の変動に該当する。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。単価の変更だけでなく、所定労働時間の変更に伴う報酬の変動も「固定的賃金の変動」に含まれる。", "year": "R3", "category": "随時改定"}, {"id": 172, "question": "被保険者が産前産後休業をする期間について、基本給は休業前と同様に支給するが、通勤の実績がないことにより、通勤手当が支給されない場合、その事業所の通勤手当の制度自体が廃止されたわけではないことから、賃金体系の変更にはあたらず、標準報酬月額の随時改定の対象とはならない。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。一時的な不支給（実実績に基づく停止）は固定的賃金の変動には該当しない。", "year": "H28", "category": "随時改定"}, {"id": 173, "question": "全国健康保険協会管掌健康保険の被保険者が、報酬の一部を現物給与として受け取っている場合において、当該現物給与の標準価額が厚生労働大臣告示により改正されたときは、標準報酬月額の随時改定を行う要件である固定的賃金の変動に該当するものとして取り扱われる。", "answer": true, "explanation": "法43条、法46条、令和5.6.27事務連絡。現物給与の標準価額の改正も、固定的賃金の変動として随時改定の契機となる。", "year": "H29", "category": "随時改定"}, {"id": 174, "question": "全国健康保険協会管掌健康保険において、給与計算期間の途中で昇給した場合、昇給した給与が実績として1か月分確保された月を固定的賃金の変動が報酬に反映された月として扱い、それ以後3か月間に受けた報酬を計算の基礎として随時改定に該当するか否かを判断するものとされている。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。給与計算期間の中途で昇給した場合は、その変動分が「1か月分まるまる」反映された月を起算月とする。", "year": "H30", "category": "随時改定"}, {"id": 175, "question": "育児休業取得中の被保険者について、給与の支払いが一切ない育児休業取得中の期間において昇給があり、固定的賃金に変動があった場合、実際に報酬の支払いがないため、育児休業取得中や育児休業を終了した際に当該固定的賃金の変動を契機とした標準報酬月額の随時改定が行われることはない。", "answer": false, "explanation": "法43条1項、令和5.6.27事務連絡。休業中に固定的賃金の変動があった場合でも、職場復帰後に実際にその変動後の報酬が支払われた月を起算月として随時改定を行うことができる。", "year": "R2", "category": "随時改定"}, {"id": 176, "question": "自動車通勤者に対してガソリン単価を設定して通勤手当を算定している事業所において、ガソリン単価の見直しが月単位で行われ、その結果、毎月ガソリン単価を変更し通勤手当を支給している場合、固定的賃金の変動には該当せず、標準報酬月額の随時改定の対象とならない。", "answer": false, "explanation": "法43条1項、令和5.6.27事務連絡。ガソリン単価の変動に基づく手当額の変更であっても、毎月のように変動する場合は、それを固定的賃金の変動として随時改定の対象とし得る。", "year": "R4", "category": "随時改定"}, {"id": 177, "question": "Ｘ事業所では、新たに在宅勤務手当を設けることとしたが、当該手当は実費弁償分であることが明確にされている部分とそれ以外の部分があるものとなった。この場合には、当該実費弁償分については「報酬等」に含める必要はなく、それ以外の部分は「報酬等」に含まれる。また、当該手当について、月々の実費弁償分の算定に伴い実費弁償分以外の部分の金額に変動があったとしても、固定的賃金の変動に該当しないことから、随時改定の対象にはならない。", "answer": true, "explanation": "法3条5項、令和5.6.27事務連絡。実費弁償的な性質の部分は報酬から除外し、それ以外の変動が固定的賃金の変動に該当しない場合は随時改定の対象外となる。", "year": "R5", "category": "随時改定"}, {"id": 178, "question": "被保険者Ａは、労働基準法第91条の規定により減給の制裁が6か月にわたり行われることになった。そのため、減給の制裁が行われた月から継続した3か月間（各月とも、報酬支払基礎日数が17日以上あるものとする。）に受けた報酬の総額を3で除して得た額が、その者の標準報酬月額の基礎となった従前の報酬月額に比べて2等級以上の差が生じたため、標準報酬月額の随時改定の手続きを行った。なお、減給の制裁が行われた月以降、他に報酬の変動がなかったものとする。", "answer": false, "explanation": "法43条1項、令和5.6.27事務連絡。労働基準法に基づく「減給の制裁」は、賃金体系そのものの変更ではないため、固定的賃金の変動には該当せず、随時改定の対象とはならない。", "year": "R4", "category": "随時改定"}, {"id": 179, "question": "Ｘ事業所では、働き方改革の一環として、超過勤務を禁止することにしたため、Ｘ事業所の給与規定で定められていた超過勤務手当を廃止することにした。これにより、当該事業所に勤務する被保険者Ｄは、超過勤務手当の支給が廃止された月から継続した3か月間に受けた報酬の総額を3で除した額が、その者の標準報酬月額の基礎となった従前の報酬月額に比べて2等級以上の差が生じた。超過勤務手当の廃止をした月から継続する3か月間の報酬支払基礎日数はすべて17日以上であったが、超過勤務手当は非固定的賃金であるため、当該事業所は標準報酬月額の随時改定の手続きは行わなかった。なお、超過勤務手当の支給が廃止された月以降、他に報酬の変動がなかったものとする。", "answer": false, "explanation": "法43条1項、令和5.6.27事務連絡。手当そのものが「廃止」された場合は賃金体系の変更（固定的賃金の変動）に該当するため、2等級以上の差が生じれば随時改定の対象となる。", "year": "R4", "category": "随時改定"}, {"id": 180, "question": "Ｙ事業所では、給与規定の見直しを行うに当たり、同時に複数の変動的な手当の新設及び廃止が発生した。その結果、被保険者Ｅは当該変動的な手当の新設及び廃止が発生した月から継続した3か月間（各月とも、報酬支払基礎日数は17日以上あるものとする。）に受けた報酬の総額を3で除して得た額が、その者の標準報酬月額の基礎となった従前の報酬月額に比べて2等級以上の差が生じたため、標準報酬月額の随時改定の手続きを行った。なお、当該変動的な手当の新設及び廃止が発生した月以降、他に報酬の変動がなかったものとする。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。非固定的手当であっても、その「新設」や「廃止」は賃金体系の変更に当たるため、随時改定の要因となる。", "year": "R4", "category": "随時改定"}, {"id": 181, "question": "標準報酬月額が1,330,000円（標準報酬月額等級第49級）である被保険者が、現に使用されている事業所において、固定的賃金の変動により変動月以降継続した3か月間（各月とも、報酬支払の基礎となった日数が、17日以上であるものとする。）に受けた報酬の総額を3で除して得た額が1,415,000円となった場合、随時改定の要件に該当する。", "answer": true, "explanation": "法43条1項、平成30.3.1保発0301第8号。最高等級付近において、算定月額が一定額（1,415,000円等）を超えた場合は、2等級以上の差が生じたものとみなして随時改定が行われる。", "year": "H30", "category": "随時改定"}, {"id": 182, "question": "一時帰休に伴い、就労していたならば受けられるであろう報酬よりも低額な休業手当が支払われることとなり、その状態が継続して3か月を超える場合には、固定的賃金の変動とみなされ、標準報酬月額の随時改定の対象となる。", "answer": true, "explanation": "法43条1項、平成15.2.25保保発0225004号。一時帰休による休業手当の支払いが3か月を超えて継続する場合は、固定的賃金の変動として随時改定を行う。", "year": "R3", "category": "随時改定"}, {"id": 183, "question": "賃金が月末締め月末払いの事業所において、2月19日から一時帰休で低額な休業手当等の支払が行われ、5月1日に一時帰休の状況が解消した場合には、2月、3月、4月の報酬を平均して2等級以上の差が生じていれば、5月以降の標準報酬月額から随時改定を行う。", "answer": false, "explanation": "法43条1項、令和5.6.27事務連絡。5月1日の時点で一時帰休が解消している場合、解消した月（5月）は通常の報酬に戻るため、3か月継続した低額な報酬実態がないとみなされ、随時改定は行われない。", "year": "R3", "category": "随時改定"}, {"id": 184, "question": "3か月間の報酬の平均から算出した標準報酬月額（通常の随時改定の計算方法により算出した標準報酬月額。「標準報酬月額Ａ」という。）と、昇給月又は降給月以後の継続した3か月の間に受けた固定的賃金の月平均額に昇給月又は降給月前の継続した12か月及び昇給月又は降給月以後の継続した3か月の間に受けた非固定的賃金の月平均額を加えた額から算出した標準報酬月額（以下「標準報酬月額Ｂ」という。）との間に2等級以上の差があり、当該差が業務の性質上例年発生することが見込まれる場合であって、現在の標準報酬月額と標準報酬月額Ｂとの間に1等級以上の差がある場合は保険者算定の対象となる。", "answer": false, "explanation": "法43条1項、平成30.3.1保保発0301第2号。設問文中の「継続した12か月」は、正しくは「継続した9か月」である。", "year": "R元", "category": "随時改定"}, {"id": 185, "question": "さかのぼって降給が発生した場合、その変動が反映された月（差額調整が行われた月）を起算月として、それ以後継続した3か月間（いずれの月も支払基礎日数が17日以上であるものとする。）に受けた報酬を基礎として、保険者算定による随時改定を行うこととなるが、超過支給分の報酬がその後の報酬から差額調整された場合、調整対象となった月の報酬は、本来受けるべき報酬よりも低額となるため、調整対象となった月に控除された降給差額分を含まず、差額調整前の報酬額で随時改定を行う。", "answer": true, "explanation": "法43条1項、令和5.6.27事務連絡。差額調整（精算）により一時的に低額になった報酬ではなく、本来の（降給後の）報酬額に基づき算定を行う。", "year": "R元", "category": "随時改定"}, {"id": 186, "question": "その年の1月から6月までのいずれかの月に随時改定された標準報酬月額は、再度随時改定、育児休業等を終了した際の標準報酬月額の改定又は産前産後休業を終了した際の標準報酬月額の改定を受けない限り、その年の8月までの標準報酬月額となり、7月から12月までのいずれかの月に改定された標準報酬月額は、再度随時改定、育児休業等を終了した際の標準報酬月額の改定又は産前産後休業を終了した際の標準報酬月額の改定を受けない限り、翌年の8月までの標準報酬月額となる。", "answer": true, "explanation": "法43条2項。随時改定された標準報酬月額の有効期間に関する規定通りである。", "year": "R3", "category": "随時改定"}, {"id": 187, "question": "育児休業等を終了した際の標準報酬月額の改定の要件に該当する被保険者の報酬月額に関する届出は、当該育児休業等を終了した日から5日以内に、当該被保険者が所属する適用事業所の事業主を経由して、所定の事項を記載した届書を日本年金機構又は健康保険組合に提出することによって行う。", "answer": false, "explanation": "法43条の2第1項、則26条の2。届出期限は「5日以内」ではなく「速やかに」である。", "year": "R4", "category": "育児休業等終了時改定"}, {"id": 188, "question": "産前産後休業を終了した際の改定は、固定的賃金に変動がなく残業手当の減少によって報酬月額が変動した場合も、その対象となる。", "answer": true, "explanation": "法43条の3第1項。随時改定と異なり、産前産後休業終了時改定（および育休終了時改定）は、固定的賃金の変動を問わず、非固定的賃金の変動のみでも改定の対象となる。", "year": "H28", "category": "産前産後休業終了時改定"}, {"id": 189, "question": "産前産後休業終了時改定の規定によって改定された標準報酬月額は、産前産後休業終了日の翌日から起算して2か月を経過した日の属する月の翌月からその年の8月までの各月の標準報酬月額とされる。当該翌月が7月から12月までのいずれかの月である場合は、翌年8月までの各月の標準報酬月額とする。なお、当該期間中に、随時改定、育児休業等を終了した際の標準報酬月額の改定又は産前産後休業を終了した際の標準報酬月額の改定を受けないものとする。", "answer": true, "explanation": "法43条の3第2項。改定時期および有効期間についての規定通りである。", "year": "R5", "category": "産前産後休業終了時改定"}, {"id": 190, "question": "健康保険組合において、任意継続被保険者が被保険者の資格を喪失したときの標準報酬月額が、当該被保険者の属する健康保険組合の全被保険者における前年度の9月30日の標準報酬月額を平均した額を標準報酬月額の基礎となる報酬月額とみなしたときの標準報酬月額を超える場合は、規約で定めるところにより、資格喪失時の標準報酬月額をその者の標準報酬月額とすることができる。", "answer": true, "explanation": "法47条1項、法附則3条4項。健康保険組合における、任意継続被保険者の標準報酬月額の決定に係る特例（規約による定め）についての規定通りである。", "year": "R6", "category": "任意継続被保険者等の標準報酬月額"}, {"id": 191, "question": "特例退職被保険者の標準報酬月額については、健康保険法第41条から同法第44条までの規定にかかわらず、当該特定健康保険組合が管掌する前年（1月から3月までの標準報酬月額については、前々年）の9月30日における特例退職被保険者を含む全被保険者の同月の標準報酬月額を平均した額の範囲内においてその規約で定めた額を標準報酬月額の基礎となる報酬月額とみなしたときの標準報酬月額となる。", "answer": false, "explanation": "法附則3条4項。標準報酬月額の算定基礎となる平均額の算出対象には、特例退職被保険者「以外」の全被保険者が用いられる。[R6-3I]", "year": "R6", "category": "任意継続被保険者等の標準報酬月額"}, {"id": 192, "question": "任意継続被保険者の標準報酬月額は、原則として当該任意継続被保険者が被保険者の資格を喪失したときの標準報酬月額、又は前年（1月から3月までの標準報酬月額については、前々年）の9月30日における当該任意継続被保険者の属する保険者が管掌する全被保険者の同月の標準報酬月額を平均した額を標準報酬月額の基礎となる報酬月額とみなしたときの標準報酬月額のいずれか少ない額とされるが、その保険者が健康保険組合の場合、当該平均した額の範囲内においてその規約で定めた額があるときは、当該任意継続被保険者が被保険者の資格を喪失したときの標準報酬月額又は当該規約で定めた額を標準報酬月額の基礎となる報酬月額とみなしたときの標準報酬月額のいずれか少ない額とすることができる。", "answer": true, "explanation": "法47条1項。任意継続被保険者の標準報酬月額の決定原則と、健康保険組合における規約による特例についての正しい記述である。[H29-10B改]", "year": "H29", "category": "任意継続被保険者等の標準報酬月額"}, {"id": 193, "question": "全国健康保険協会管掌健康保険の適用事業所であるA社で、3月に200万円、6月に280万円の賞与が支給され、それぞれ標準賞与額が200万円及び280万円に決定された被保険者が、A社を同年8月31日付で退職し、その翌日に資格喪失した。その後、同年9月11日に健康保険組合管掌健康保険の適用事業所であるB社で被保険者資格を取得し、同年12月に100万円の賞与の支給を受けた。この場合、「健康保険標準賞与額累計申出書」を当該健康保険組合に提出することにより、当該被保険者の標準賞与額は60万円と決定される。", "answer": false, "explanation": "法45条1項。標準賞与額の年度累計額（上限573万円）の計算は保険者ごとに行う。また、3月に支給された賞与は前年度分となるため、4月以降の賞与とは合算されない。[H27-9B]", "year": "H27", "category": "標準賞与額"}, {"id": 194, "question": "保険者等は、被保険者が賞与を受けた月において、その月に当該被保険者が受けた賞与額に基づき、これに千円未満の端数を生じたときは、これを切り捨てて、その月における標準賞与額を決定する。ただし、その月に当該被保険者が受けた賞与によりその年度における標準賞与額の累計額が540万円を超えることとなる場合には、当該累計額が540万円となるようその月の標準賞与額を決定し、その年度においてその月の翌月以降に受ける賞与の標準賞与額は零とする。", "answer": false, "explanation": "法45条1項。標準賞与額の年度累計額の上限は、現在「573万円」である。[H28-4C]", "year": "H28", "category": "標準賞与額"}, {"id": 195, "question": "前月から引き続き被保険者であり、12月10日に賞与を50万円支給された者が、同月20日に退職した場合、事業主は当該賞与に係る保険料を納付する義務はないが、標準賞与額として決定され、その年度における標準賞与額の累計額に含まれる。", "answer": true, "explanation": "法45条1項、法156条3項。資格を喪失した月に支払われた賞与は保険料賦課の対象外だが、年度累計額には算入される。[R3-1D]", "year": "R3", "category": "標準賞与額"}, {"id": 196, "question": "全国健康保険協会管掌健康保険における同一の適用事業所において、7月、11月及び翌年3月にそれぞれ200万円、300万円、100万円の賞与を受けた場合、標準賞与額は、7月200万円、11月300万円、翌年3月73万円となる。", "answer": true, "explanation": "法45条1項。同一年度内の標準賞与額の合計が573万円を超える場合、その超える月の標準賞与額は累計が573万円に達するまでの額（本問では573-500=73万円）として決定される。[R元-10]", "year": "R元", "category": "標準賞与額"}, {"id": 197, "question": "育児休業期間中に賞与が支払われた者が、育児休業期間中につき保険料免除の取扱いが行われている場合は、当該賞与に係る保険料が徴収されることはないが、標準賞与額として決定され、その年度における標準賞与額の累計額に含めなければならない。", "answer": true, "explanation": "法45条1項、法159条1項。保険料が免除される期間に支払われた賞与であっても、標準賞与額として決定し、年度累計額の対象とする。[R4-10D]", "year": "R4", "category": "標準賞与額"}, {"id": 198, "question": "同時に2以上の事業所で報酬を受ける被保険者について、それぞれの事業所において同一月に賞与が支給された場合、その合算額をもって標準賞与額が決定される。", "answer": true, "explanation": "法45条2項。二以上事業所勤務者の賞与については、各事業所の支給額を合算して一つの標準賞与額を決定する。[H28-10B]", "year": "H28", "category": "標準賞与額"}, {"id": 199, "question": "全国健康保険協会管掌健康保険の適用事業所の事業主は、被保険者に賞与を支払った場合は、支払った日から5日以内に、健康保険被保険者賞与支払届を日本年金機構に提出しなければならないとされている。", "answer": true, "explanation": "則27条1項。賞与支払届の提出期限（5日以内）に関する正しい記述である。[H30-3C]", "year": "H30", "category": "標準賞与額"}, {"id": 200, "question": "国庫は、毎年度、予算の範囲内において健康保険事業の事務の執行に要する費用を負担することになっており、健康保険組合に対して交付する国庫負担金は、各健康保険組合における被保険者数を基準として、厚生労働大臣が算定する。また、その国庫負担金は概算払いをすることができる。", "answer": true, "explanation": "法151条、法152条。事務費の国庫負担および健康保険組合への算定基準・交付方法についての正しい記述である。[R6-2C]", "year": "R6", "category": "国庫負担等"}, {"id": 201, "question": "健康保険事業の事務の執行に要する費用について、国庫は、全国健康保険協会に対して毎年度、予算の範囲内において負担しているが、健康保険組合に対しては負担を行っていない。", "answer": false, "explanation": "法151条。国庫は全国健康保険協会だけでなく、健康保険組合に対しても事務費を負担する。[H29-4ウ]", "year": "H29", "category": "国庫負担等"}, {"id": 202, "question": "全国健康保険協会管掌健康保険の事業の執行に要する費用のうち、出産育児一時金、家族出産育児一時金、埋葬料（埋葬費）及び家族埋葬料の支給に要する費用については、国庫補助は行われない。", "answer": true, "explanation": "法153条。協会けんぽの給付費に対する国庫補助の対象は、療養の給付、傷病手当金、出産手当金等に限られており、一時金や埋葬料等は対象外である。[R3-2C]", "year": "R3", "category": "国庫負担等"}, {"id": 203, "question": "国庫は、予算の範囲内において、健康保険事業の執行に要する費用のうち、高齢者医療確保法の規定による特定健康診査及び特定保健指導の実施に要する費用の全部を補助することができる。", "answer": false, "explanation": "法154条の2。特定健康診査等に要する費用の補助は「一部」とされている。[H30-4D]", "year": "H30", "category": "国庫負担等"}, {"id": 204, "question": "厚生労働大臣が健康保険料を徴収する場合において、適用事業所の事業主から健康保険料、厚生年金保険料及び子ども・子育て拠出金の一部の納付があったときは、当該事業主が納付すべき健康保険料、厚生年金保険料及び子ども・子育て拠出金の額を基準として按分した額に相当する健康保険料の額が納付されたものとされる。", "answer": true, "explanation": "法159条の2。一部納付があった場合の充当（按分）ルールについての規定通りである。[R2-4A]", "year": "R2", "category": "保険料"}, {"id": 205, "question": "厚生労働大臣は、全国健康保険協会と協議を行い、効果的な保険料の徴収を行うために必要があると認めるときは、全国健康保険協会に保険料の滞納者に関する情報その他必要な情報を提供するとともに、当該滞納者に係る保険料の徴収を行わせることができる。", "answer": true, "explanation": "法181条の3。厚生労働大臣による徴収業務の協会への委託等に関する規定通りの内容である。[R元-6D]", "year": "R元", "category": "保険料"}, {"id": 206, "question": "政令で定める要件に該当するものとして厚生労働大臣の承認を受けた健康保険組合は、介護保険第2号被保険者である被保険者に関する保険料額を、一般保険料額と特別介護保険料額との合算額とすることができる。", "answer": true, "explanation": "法附則8条1項。特定健康保険組合における保険料の合算徴収に関する正しい記述である。[R元-4オ]", "year": "R元", "category": "保険料"}, {"id": 207, "question": "前月から引き続き被保険者であり、7月10日に賞与を30万円支給された者が、その支給後である同月25日に退職し、同月26日に被保険者資格を喪失した。この場合、事業主は当該賞与に係る保険料を納付する義務はない。", "answer": true, "explanation": "法156条3項。賞与保険料は、賞与を支払った月に資格を喪失した被保険者については徴収されない。[H29-10C]", "year": "H29", "category": "保険料"}, {"id": 208, "question": "全国健康保険協会は、2年ごとに、翌事業年度以降の5年間についての全国健康保険協会が管掌する健康保険の被保険者数及び総報酬額の見通し並びに保険給付に要した費用の額、保険料の額（各事業年度において財政の均衡を保つことができる保険料率の水準を含む。）その他の健康保険事業の収支の見通しを作成し、厚生労働大臣に届け出るものとする。", "answer": false, "explanation": "法160条5項。作成した収支の見通しについては、厚生労働大臣への届出ではなく、遅滞なく「公表」しなければならない。[R6-3オ改]", "year": "R6", "category": "保険料率"}, {"id": 209, "question": "全国健康保険協会が都道府県単位保険料率を変更しようとするときは、あらかじめ、協会の理事長が当該変更に係る都道府県に所在する協会支部の支部長の意見を聴いたうえで、運営委員会の議を経なければならない。その議を経た後、協会の理事長は、その変更について厚生労働大臣の認可を受けなければならない。", "answer": true, "explanation": "法160条6項、8項。協会けんぽの保険料率変更における手続き（支部長の意見聴取、運営委員会の議、大臣認可）に関する正しい記述である。[R4-3ウ]", "year": "R4", "category": "保険料率"}, {"id": 210, "question": "厚生労働大臣は、都道府県単位保険料率が、当該都道府県における健康保険事業の収支の均衡を図る上で不適当であり、全国健康保険協会が管掌する健康保険の事業の健全な運営に支障がある旨の認定をする場合には、全国健康保険協会に対し、相当の期間を定めて、当該都道府県単位保険料率の変更の認可を申請すべきことを命ずることができる。", "answer": false, "explanation": "法160条10項。厚生労働大臣が変更を命ずることができるのは、当該保険料率が不適当であり、運営に支障があると「認めるとき」であり、「認定」という手続きは規定されていない。[H29-4ア改]", "year": "H29", "category": "保険料率"}, {"id": 211, "question": "被保険者の長期にわたる休職状態が続き実務に服する見込がない場合又は公務に就任しこれに専従する場合においては被保険者資格を喪失するが、被保険者の資格を喪失しない病気休職の場合は、賃金の支払停止は一時的であり、使用関係は存続しているため、事業主及び被保険者はそれぞれ賃金支給停止前の標準報酬に基づく保険料を折半負担し、事業主はその納付義務を負う。", "answer": true, "explanation": "法36条、法161条1項、2項、昭和26.3.9保文発619号。設問の通り正しい。[R元-10B]", "year": "R元", "category": "保険料の負担等"}, {"id": 212, "question": "被保険者が同一疾病について通算して1年6か月間傷病手当金の支給を受けたが疾病が治癒せず、その療養のため労務に服することができず収入の途がない場合であっても、被保険者である間は保険料を負担する義務を負わなければならない。", "answer": true, "explanation": "法99条4項、法161条1項、昭和2.9.2保理3240号。設問の通り正しい。[R2-1B改]", "year": "R2", "category": "保険料の負担等"}, {"id": 213, "question": "健康保険組合は、規約で定めるところにより、事業主の負担すべき一般保険料額又は介護保険料額の負担の割合を増加することができる。", "answer": true, "explanation": "法162条。設問の通り正しい。[H30-5オ]", "year": "H30", "category": "保険料の負担等"}, {"id": 214, "question": "被保険者が刑事施設に拘禁されたときは、原則として、疾病、負傷又は出産につき、その期間に係る保険給付は行われない。また、前月から引き続き一般の被保険者である者が刑事施設に拘禁された場合については、原則として、その翌月以後、拘禁されなくなった月までの期間、保険料は徴収されない。", "answer": false, "explanation": "法118条1項2号、法158条。前月から引き続き一般の被保険者である者が刑事施設に拘禁された場合、保険料が免除される期間は、原則として、その月以後、拘禁されなくなった月の「前月」までの期間である。[H27-3D]", "year": "H27", "category": "保険料の負担等"}, {"id": 215, "question": "前月から引き続き任意継続被保険者である者が、刑事施設に拘禁されたときは、原則として、その月以後、拘禁されなくなった月までの期間、保険料は徴収されない。", "answer": false, "explanation": "法158条カッコ書。任意継続被保険者及び特例退職被保険者には、保険料の免除に係る規定は適用されないため、保険料は徴収される。[H29-4オ]", "year": "H29", "category": "保険料の負担等"}, {"id": 216, "question": "被保険者乙の育児休業等開始日が令和5年1月10日で、育児休業等終了日が令和5年3月31日の場合は、令和5年1月から令和5年3月までの期間中の当該被保険者に関する保険料は徴収されない。", "answer": true, "explanation": "法159条1項1号。育児休業等を開始した日の属する月と終了する日の翌日が属する月が異なる場合、開始月～終了日の翌日が属する月の前月まで免除される。[R5-9イ]", "year": "R5", "category": "保険料の負担等"}, {"id": 217, "question": "被保険者丙の育児休業等開始日が令和5年1月4日で、育児休業等終了日が令和5年1月16日の場合は、令和5年1月の当該被保険者に関する保険料は徴収されない。", "answer": false, "explanation": "法159条1項2号、則135条4項。開始月と終了日の翌日が属する月が同一の場合、休業日数が14日以上でなければ免除されない。設問の休業日数は13日（1/4～1/16）であるため免除されない。[R5-9ウ]", "year": "R5", "category": "保険料の負担等"}, {"id": 218, "question": "被保険者である法人の代表取締役が育児休業を取得した場合、その期間中の保険料免除の対象となる。", "answer": false, "explanation": "昭和24.7.28保発74号、平成21.12.28雇児発1228第2号。健康保険法における育児休業は育児介護休業法に基づくものであり、同法の対象は労働基準法上の労働者に限られるため、代表取締役は免除対象外である（産前産後休業免除は対象となる）。[Q25-12]", "year": null, "category": "保険料の負担等"}, {"id": 219, "question": "事業主は、当該事業主が被保険者に対して支払うべき報酬額が保険料額に満たないため保険料額の一部のみを控除できた場合においては、当該控除できた額についてのみ保険者等に納付する義務を負う。", "answer": false, "explanation": "法161条2項、昭和2.2.14保理218号。事業主は、被保険者の報酬から控除できた額のいかんにかかわらず、保険料全額の納付義務を負う。[H29-6B]", "year": "H29", "category": "保険料の納付"}, {"id": 220, "question": "事業主は、被保険者に支払う報酬がないため保険料を控除できない場合でも、被保険者の負担する保険料について納付する義務を負う。", "answer": true, "explanation": "法161条2項、昭和2.2.18保理578号、昭和4.1.18事発125号。設問の通り正しい。[R5-5オ]", "year": "R5", "category": "保険料の納付"}, {"id": 221, "question": "給与計算の締切り日が毎月15日であって、その支払日が当該月の25日である場合、7月30日で退職し、被保険者資格を喪失した者の保険料は7月分まで生じ、8月25日支払いの給与（7月16日から7月30日までの期間に係るもの）まで保険料を控除する。", "answer": false, "explanation": "法156条3項、法167条1項。7月30日退職の場合、資格喪失日は7月31日となり、喪失月の前月である「6月分」までしか保険料は徴収されない。[R元-10C]", "year": "R元", "category": "保険料の納付"}, {"id": 222, "question": "事業主は、被保険者に対して通貨をもって報酬を支払う場合においては、被保険者の負担すべき前月の標準報酬月額に係る保険料を報酬から控除することができる。ただし、被保険者がその事業所に使用されなくなった場合においては、前月及びその月の標準報酬月額に係る保険料を報酬から控除することができる。", "answer": true, "explanation": "法167条1項。報酬からの保険料控除に関する規定通りの内容である。[Q26-4]", "year": null, "category": "保険料の納付"}, {"id": 223, "question": "4月1日にA社に入社し、協会けんぽの被保険者資格を取得した者が4月15日に退職し、4月16日にB社に就職して再び被保険者資格を取得した場合、B社は当該被保険者の4月分の一般保険料額を控除するが、A社が徴収した4月分の一般保険料額は被保険者に返還されない。", "answer": true, "explanation": "法156条3項、法167条1項。同一月に資格の取得と喪失がある同月得喪の場合、事業主は保険料を控除できる。その後に他社で資格取得し継続した場合は、後者の事業主にも控除権が認められ、二重徴収分が返還される規定はない。[R4-10C]", "year": "R4", "category": "保険料の納付"}, {"id": 224, "question": "6月25日に40歳に到達する被保険者に対し、6月10日に通貨をもって夏季賞与を支払った場合、当該標準賞与額から被保険者が負担すべき一般保険料額とともに介護保険料額を控除することができる。", "answer": true, "explanation": "法156条1項1号、法167条2項、介保法9条2号。介護保険第2号被保険者に該当する月に支払われる賞与からは、支払日が誕生日前であっても介護保険料を控除できる。[R4-10B]", "year": "R4", "category": "保険料の納付"}, {"id": 225, "question": "任意継続被保険者に関する毎月の保険料は、その月の10日までに納付しなければならないが、初めて納付すべき保険料については、被保険者が任意継続被保険者の資格取得の申出をした日に納付しなければならない。", "answer": false, "explanation": "法164条1項。初めて納付すべき任意継続被保険者の保険料は、「保険者が指定する日」までに納付しなければならない。[H30-5I]", "year": "H30", "category": "保険料の納付"}, {"id": 226, "question": "任意継続被保険者が初めて納付すべき保険料を除き、保険料を納付期日（その月の10日）までに納めなかった場合は、納付の遅延について正当な理由があると保険者が認めたときを除き、その翌日に任意継続被保険者の資格を喪失する。", "answer": true, "explanation": "法38条3号、法164条1項。任意継続被保険者の保険料未納による資格喪失の規定通りである。[H29-2E]", "year": "H29", "category": "保険料の納付"}, {"id": 227, "question": "保険者等は、納付した被保険者に関する保険料額が当該納付義務者の納付すべき保険料額を超えていることを知ったときは、その超えている部分を、その告知又は納付の日の翌日から6か月以内の期日に納付されるべき保険料について納期を繰り上げてしたものとみなすことができる。", "answer": true, "explanation": "法164条2項。過誤納金の納期繰上充当に関する規定通りの内容である。[R3-7E]", "year": "R3", "category": "保険料の納付"}, {"id": 228, "question": "任意継続被保険者は将来の一定期間の保険料を前納することができるが、この場合において前納すべき額は、前納に係る期間の各月の保険料の額の合計額である。", "answer": false, "explanation": "法165条1項、2項、令49条。前納すべき額は、各月の保険料額の合計から、年4%の利率による複利現価法で割り引いた額を控除した額（割引後の額）である。[R2-7E]", "year": "R2", "category": "保険料の納付"}, {"id": 229, "question": "任意継続被保険者は、将来の一定期間の保険料を前納することができるが、前納された保険料については、前納に係る期間の各月の初日が到来したときに、それぞれその月の保険料が納付されたものとみなす。", "answer": true, "explanation": "法165条1項、3項。任意継続被保険者の前納保険料の納付擬制時期に関する規定通りである。[R5-3ウ]", "year": "R5", "category": "保険料の納付"}, {"id": 230, "question": "任意継続被保険者が保険料を前納する場合、4月から9月まで若しくは10月から翌年3月までの6か月間のみを単位として行わなければならない。", "answer": false, "explanation": "法165条1項、令48条。前納の単位は6か月（4～9月、10～翌3月）のほか、「4月から翌年3月までの12か月」を単位とすることもできる。[H30-6C]", "year": "H30", "category": "保険料の納付"}, {"id": 231, "question": "任意継続被保険者は、保険料が前納された後、前納に係る期間の経過前において任意継続被保険者に係る保険料の額の引上げが行われることとなった場合においては、当該保険料の額の引上げが行われることとなった後の期間に係る保険料に不足する額を、前納された保険料のうち当該保険料の額の引上げが行われることとなった後の期間に係るものが健康保険法施行令第50条の規定により当該期間の各月につき納付すべきこととなる保険料に順次充当されてもなお保険料に不足が生じる場合は、当該不足の生じる月の初日までに払い込まなければならない。", "answer": false, "explanation": "則139条2項。不足額の払い込み期限は、当該不足の生じる月の「初日」ではなく、「10日」までである。[R元-6E]", "year": "R元", "category": "保険料の納付"}, {"id": 232, "question": "倒産、解雇などにより離職した者及び雇止めなどにより離職された者が任意継続被保険者となり、保険料を前納したが、その後に国民健康保険法施行令第29条の7の2に規定する国民健康保険料（税）の軽減制度について知った場合、当該任意継続被保険者が保険者に申し出ることにより、当該前納を初めからなかったものとすることができる。", "answer": true, "explanation": "平成22.3.24保保発0324第3号。特定受給資格者等が任意継続被保険者となった後に国保料の軽減制度を知った場合、申出により前納を初めからなかったものとすることができる。[R3-10D]", "year": "R3", "category": "保険料の納付"}, {"id": 233, "question": "健康保険組合連合会は、全国健康保険協会の後期高齢者支援金に係る負担の不均衡を調整するために、全国健康保険協会に対する交付金の交付事業を行っている。", "answer": false, "explanation": "法附則2条1項。健保連が行う調整交付金の交付事業は、「全国健康保険協会」に対してではなく、会員である「健康保険組合」に対して行われる。[H28-1I]", "year": "H28", "category": "調整保険料"}, {"id": 234, "question": "保険料及びその他健康保険法の規定による徴収金を滞納する者に対して督促をしたときは、保険者は徴収金額に督促状の到達の翌日から徴収金完納又は財産差押えの日の前日までの期間の日数に応じて、年14.6％（当該督促が保険料に係るものであるときは、当該納期限の翌日から3か月を経過する日までの期間については、年7.3％）の割合を乗じて計算した延滞金を徴収する。", "answer": false, "explanation": "法181条1項。延滞金の計算期間の起算日は「督促状の到達の翌日」ではなく、「納期限の翌日」である。[R6-8A]", "year": "R6", "category": "滞納に対する措置等"}, {"id": 235, "question": "保険料の納付義務者が、国税、地方税その他の公課の滞納により、滞納処分を受けるときは、保険者は、保険料の納期が到来したときに初めて強制的に保険料を徴収することができる。", "answer": false, "explanation": "法172条1項1号イ。滞納処分を受けるとき等は、保険料の納期を待たずに（繰り上げて）徴収することができる。[R5-4D]", "year": "R5", "category": "滞納に対する措置等"}, {"id": 236, "question": "健康保険法第172条によると、保険料は、納付義務者が破産手続開始の決定を受けたときは、納期前であっても、すべて徴収することができる。", "answer": true, "explanation": "法172条1項1号ハ。破産手続開始の決定は、保険料の繰上徴収ができる事由として規定されている。[R5-5E]", "year": "R5", "category": "滞納に対する措置等"}, {"id": 237, "question": "工場の事業譲渡によって、被保険者を使用している事業主が変更した場合、保険料の繰上徴収が認められる事由に該当することはない。", "answer": false, "explanation": "法172条3号、昭和5.11.5保理513号。事業所が廃止された場合は繰上徴収の対象となり、工場の事業譲渡による事業主の変更は事業所の廃止に含まれる。[H30-6B]", "year": "H30", "category": "滞納に対する措置等"}, {"id": 238, "question": "健康保険組合が保険料の納付義務者に対して所定の事項を記載した納入告知書で納入の告知をした後、健康保険法第172条の規定により納期日前に保険料のすべてを徴収しようとする場合、当該納期日の変更については、口頭で告知することができる。", "answer": false, "explanation": "法172条、則137条2項。納期日を変更して繰上徴収を行う場合は、「書面」で告知しなければならない。[H27-3C]", "year": "H27", "category": "滞納に対する措置等"}, {"id": 239, "question": "保険料その他健康保険法の規定による徴収金を滞納する者があるときは、原則として、保険者は期限を指定してこれを督促しなければならない。督促をしようとするときは、保険者は納付義務者に対して督促状を発する。督促状により指定する期限は、督促状を発する日から起算して14日以上を経過した日でなければならない。", "answer": false, "explanation": "法180条1項〜3項。督促状で指定すべき期限は、督促状を発する日から起算して「10日」以上経過した日でなければならない。[H30-5ウ]", "year": "H30", "category": "滞納に対する措置等"}, {"id": 240, "question": "適用事業所の事業主が納期限が5月31日である保険料を滞納し、指定期限を6月20日とする督促を受けたが、実際に保険料を完納したのが7月31日である場合は、原則として6月1日から7月30日までの日数によって計算された延滞金が徴収されることになる。", "answer": true, "explanation": "法181条1項。延滞金は、納期限の翌日から完納の日の「前日」までの日数により計算される。[H28-5B]", "year": "H28", "category": "滞納に対する措置等"}, {"id": 241, "question": "健康保険組合は、健康保険法第180条第1項の規定による督促を受けた納付義務者がその指定の期限までに保険料等を納付しないときは、厚生労働大臣の認官を受け、国税滞納処分の例によってこれを処分することができる。", "answer": true, "explanation": "法180条4項1号、5項。滞納処分を行う際、健康保険組合（または全国健康保険協会）は厚生労働大臣の認可が必要である。[H27-7イ]", "year": "H27", "category": "滞納に対する措置等"}, {"id": 242, "question": "保険料の先取特権の順位は、国税及び地方税に優先する。また、保険料は、健康保険法に別段の規定があるものを除き、国税徴収の例により徴収する。", "answer": false, "explanation": "法182条。保険料の先取特権の順位は、国税及び地方税に「次ぐ（あと）」ものとされている。[R元-6B]", "year": "R元", "category": "滞納に対する措置等"}, {"id": 243, "question": "健康保険組合である保険者の開設する病院若しくは診療所又は薬局は、保険医療機関としての指定を受けなくとも当該健康保険組合以外の保険者の被保険者の診療を行うことができる。", "answer": false, "explanation": "法63条3項3号、昭和32.9.2保険発123号。自組合以外の被保険者を診療するためには、保険医療機関としての指定を受ける必要がある。[R6-7B]", "year": "R6", "category": "保険医療機関及び保険薬局等"}, {"id": 244, "question": "厚生労働大臣により保険医療機関の指定を受けた病院及び病床を有する診療所は、指定の日から起算して6年を経過したときは、その効力を失うが、その指定の効力を失う日前6か月から同日前3か月までの間に、別段の申出がないときは、保険医療機関の申請があったものとみなす。", "answer": false, "explanation": "法68条。指定の申請のみなし規定（自動更新）が適用されるのは、「病院及び病床を有する診療所」を除いた個人開業の医療機関等に限られる。[R6-97]", "year": "R6", "category": "保険医療機関及び保険薬局等"}, {"id": 245, "question": "厚生労働大臣は、保険医療機関又は保険薬局の指定の申請があった場合において、当該申請に係る病院若しくは診療所又は薬局が健康保険法第65条第3項第1号の規定（指定の取消し）により保険医療機関又は保険薬局としての指定を取り消され、その取消しの日から5年を経過しないものであるときは、その指定をしないことができる。", "answer": true, "explanation": "法65条3項1号。指定の取消しから5年を経過していないことは、指定の拒否事由となる。[R4-3A]", "year": "R4", "category": "保険医療機関及び保険薬局等"}, {"id": 246, "question": "厚生労働大臣は、保険医療機関又は保険薬局の指定の申請があった場合において、当該申請に係る病院若しくは診療所又は薬局の開設者又は管理者が、健康保険法その他国民の保健医療に関する法律で、政令で定めるものの規定により罰金の刑に処せられ、その執行を終わり、又は執行を受けることがなくなるまでの者であるときは、その指定をしないことができる。", "answer": true, "explanation": "法65条3項3号。罰金刑の執行中等は、厚生労働大臣はその指定を拒否することができる。[R元-7イ]", "year": "R元", "category": "保険医療機関及び保険薬局等"}, {"id": 247, "question": "厚生労働大臣は、保険医療機関若しくは保険薬局又は指定訪問看護事業者の指定に関し必要があると認めるときは、当該指定に係る開設者若しくは管理者又は申請者の社会保険料の納付状況につき、当該社会保険料を徴収する者に対し、必要な書類の閲覧又は資料の提供を求めることができる。", "answer": true, "explanation": "法199条2項。指定に際して必要がある場合、厚生労働大臣には社会保険料の納付状況を調査する権限がある。[R2-8B]", "year": "R2", "category": "保険医療機関及び保険薬局等"}, {"id": 248, "question": "厚生労働大臣は、保険医療機関の指定をしないこととするときは、当該医療機関に対し弁明の機会を与えなければならない。", "answer": true, "explanation": "法83条。指定の拒否や制限を行う際には、あらかじめ書面で通知し、弁明の機会を与える必要がある。[R元-4イ]", "year": "R元", "category": "保険医療機関及び保険薬局等"}, {"id": 249, "question": "保険医療機関又は保険薬局は、14日以上の予告期間を設けて、その指定を辞退することができ、保険医又は保険薬剤師は、14日以上の予告期間を設けて、その登録の抹消を求めることができる。", "answer": false, "explanation": "法79条。指定の辞退や登録の抹消申出に必要な予告期間は「1か月」である。[H29-7B]", "year": "H29", "category": "保険医療機関及び保険薬局等"}, {"id": 250, "question": "保険医療機関において健康保険の診療に従事する医師若しくは歯科医師又は保険薬局において健康保険の調剤に従事する薬剤師は、厚生労働大臣の登録を受けた医師若しくは歯科医師又は薬剤師（以下本肢において「保険医等」という。）でなければならない。当該登録の日から起算して6年を経過したときは、その効力を失うが、その登録の効力を失う日前6か月から同日前3か月までの間に、別段の申出がないときは、保険医等の申請があったものとみなす。", "answer": false, "explanation": "法64条。保険医等の登録には有効期間の規定はなく、抹消や取消しがない限りその効力を失うことはない（6年での失効・更新規定は「保険医療機関の指定」に関するものである）。[R6-9ウ]", "year": "R6", "category": "保険医及び保険薬剤師"}, {"id": 251, "question": "指定訪問看護事業者の指定を受けようとする者は、当該指定に係る訪問看護事業の開始の予定年月日等を記載した申請書及び書類を当該申請に係る訪問看護事業を行う事業所の所在地を管轄する地方厚生局長等に提出しなければならないが、開始の予定年月日とは、指定訪問看護の事業の業務開始予定年月日をいう。", "answer": true, "explanation": "法89条、則74条1項。設問の通り、業務開始予定年月日を記載して申請を行う。[R3-7C]", "year": "R3", "category": "指定訪問看護事業者"}, {"id": 252, "question": "指定訪問看護事業者の指定について、厚生労働大臣は、その申請があった場合において、申請者が健康保険法の規定により指定訪問看護事業者に係る指定を取り消され、その取消しの日から5年を経過しない者であるときは指定をしてはならない。", "answer": true, "explanation": "法89条4項4号。指定の取消しから5年を経過していないことは、指定の欠格事由に該当する。[H28-6D]", "year": "H28", "category": "指定訪問看護事業者"}, {"id": 253, "question": "厚生労働大臣は、指定訪問看護事業を行う者の指定の申請があった場合において、申請者が、社会保険料について、当該申請をした日の前日までに、社会保険各法又は地方税法の規定に基づく滞納処分を受け、かつ、当該処分を受けた日から正当な理由なく3か月以上の期間にわたり、当該処分を受けた日以降に納期限の到来した社会保険料又は地方税法に基づく税を一部でも引き続き滞納している者であるときは、その指定をしてはならない。", "answer": false, "explanation": "法89条4項7号。滞納により指定を拒否されるのは、一部ではなく「社会保険料のすべて」を引き続き滞納している場合に限られる。[R5-6E]", "year": "R5", "category": "指定訪問看護事業者"}, {"id": 254, "question": "指定訪問看護事業者は、当該指定に係る訪問看護事業所の名称及び所在地その他厚生労働省令で定める事項に変更があったとき、又は当該指定訪問看護の事業を廃止し、休止し、若しくは再開したときは、厚生労働省令で定めるところにより、20日以内に、その旨を厚生労働大臣に届け出なければならない。", "answer": false, "explanation": "法93条。名称変更や事業廃止等の届出期限は、20日以内ではなく「10日以内」である。[R元-7オ]", "year": "R元", "category": "指定訪問看護事業者"}, {"id": 255, "question": "指定訪問看護事業者が、訪問看護事業所の看護師等の従業者について、厚生労働省令で定める基準や員数を満たすことができなくなったとしても、厚生労働大臣は指定訪問看護事業者の指定を取り消すことはできない。", "answer": false, "explanation": "法95条1号。人員基準等を満たさなくなった場合は、指定の取消し事由に該当する。[R2-2D]", "year": "R2", "category": "指定訪問看護事業者"}, {"id": 256, "question": "付加給付は、保険給付の一部であり、かつ法定給付に併せて行われるべきものであるから、法の目的に適いその趣旨に沿ったものでなければならない。法定給付期間を超えるもの、健康保険法の目的を逸脱するもの、又はこの制度で定める医療の内容又は医療の給付の範囲を超えるもの若しくは、保健施設的なものは廃止しなければならないが、家族療養費の付加給付は、特定の医療機関を受診した場合に限り認めることは差し支えない。", "answer": false, "explanation": "法53条、昭和32.2.1保発3号。付加給付は法定給付に併せて行われるものであり、特定の医療機関に限定して支給することは認められない。[R6-7E]", "year": "R6", "category": "保険給付の分類・種類"}, {"id": 257, "question": "健康保険組合は、規約で定めるところにより、被保険者が保険医療機関又は保険薬局に支払った一部負担金の一部を付加給付として被保険者に払い戻すことができる。", "answer": true, "explanation": "法53条。一部負担金の払戻し（一部負担還元金等）を付加給付として規約で定めることができる。[H29-3C]", "year": "H29", "category": "保険給付の分類・種類"}, {"id": 258, "question": "入院時の食事の提供に係る費用、特定長期入院被保険者に係る生活療養に係る費用、評価療養・患者申出療養・選定療養に係る費用、正常分娩及び単に経済的理由による人工妊娠中絶に係る費用は、療養の給付の対象とはならない。", "answer": true, "explanation": "法63条2項。食事療養、生活療養、評価療養などは「療養の給付」からは除外され、それぞれの項目に応じた給付が行われる。[R6-4A]", "year": "R6", "category": "療養の給付"}, {"id": 259, "question": "療養の給付を受けようとする者は、厚生労働省令で定めるところにより、保険医療機関等のうち、自己の選定するものから、電子資格確認その他厚生労働省令で定める方法により、被保険者であることの確認を受けて療養の給付を受ける。被保険者資格の確認方法の1つに、保険医療機関等が、過去に取得した療養又は指定訪問看護を受けようとする者の被保険者の資格に係る情報を用いて、保険者に対して電子情報処理組織を使用する方法その他の情報通信の技術を利用する方法により、あらかじめ照会を行い、保険者から回答を受けて取得した直近の当該情報を確認する方法がある。", "answer": true, "explanation": "法63条3項、則53条1項3号。電子資格確認等による受診手続きに関する正しい記述である。[R6-7D]", "year": "R6", "category": "療養の給付"}, {"id": 260, "question": "健康保険組合は、特定の保険医療機関と合意した場合には、自ら審査及び支払いに関する事務を行うことができ、また、この場合、健康保険組合は当該事務を社会保険診療報酬支払基金以外の事業者に委託することができるが、公費負担医療に係る診療報酬請求書の審査及び支払いに関する事務を行う場合には、その旨を支払基金に届け出なければならない。", "answer": false, "explanation": "法76条5項。公費負担医療に係る審査支払事務は支払基金が行うこととされており、健康保険組合が自ら行うことはできない。[R6-4B]", "year": "R6", "category": "療養の給付"}, {"id": 261, "question": "定期健康診断によって初めて結核症と診断された患者について、その時のツベルクリン反応、血沈検査、エックス線検査等の費用は保険給付の対象とはならない。", "answer": true, "explanation": "法63条1項、昭和28.4.3保険発59号。定期健康診断としての検査費用は、療養の給付（保険給付）の対象外である。[R2-4B]", "year": "R2", "category": "療養の給付"}, {"id": 262, "question": "定期的健康診査の結果、疾病の疑いがあると診断された被保険者が精密検査を行った場合、その精密検査が定期的健康診査の一環として予め計画されたものでなくとも、当該精密検査は療養の給付の対象とはならない。", "answer": false, "explanation": "法63条、昭和39.3.18保文発176号。疑いがある場合の二次検査（精密検査）は「治療の必要性」に基づくため、療養の給付の対象となる。[H28-3B]", "year": "H28", "category": "療養の給付"}, {"id": 263, "question": "食事の提供である療養であって入院療養と併せて行うもの（療養病床への入院及びその療養に伴う世話その他の看護であって、当該療養を受ける際、65歳に達する日の属する月の翌月以後である被保険者に係るものを除く。）は、療養の給付に含まれる。", "answer": false, "explanation": "法63条2項1号。入院時の食事療養は、療養の給付から除外され「入院時食事療養費」として給付される。[R5-1E]", "year": "R5", "category": "療養の給付"}, {"id": 264, "question": "被保険者が単に経済的理由により人工妊娠中絶術を受けた場合は、療養の給付の対象とならない。", "answer": true, "explanation": "法63条、昭和27.9.29保発56号。単なる経済的理由による中絶は「疾病」に該当しないため、保険給付の対象外である。[H28-7A]", "year": "H28", "category": "療養の給付"}, {"id": 265, "question": "保険者は、震災、風水害、火災その他これらに類する災害により、住宅、家財又はその他の財産について著しい損害を受けた被保険者であって、保険医療機関又は保険薬局に一部負担金を支払うことが困難であると認められるものに対し、一部負担金の支払いを免除することができる。", "answer": true, "explanation": "法75条の2第1項2号。災害等による特別の事情がある場合、一部負担金の免除等の措置が認められている。[R2-8D]", "year": "R2", "category": "療養の給付"}, {"id": 266, "question": "保険者から一部負担金等の徴収猶予又は減免の措置を受けた被保険者が、その証明書を提出して保険医療機関で療養の給付を受けた場合、保険医療機関は徴収猶予又は減免された一部負担金等相当額については、審査支払機関に請求することとされている。", "answer": true, "explanation": "法75条の2第1項。猶予・減免された一部負担金相当額は、保険者が負担するため、医療機関は審査支払機関（支払基金等）を通じて請求する。[R元-3C]", "year": "R元", "category": "療養の給付"}, {"id": 267, "question": "保険者は、保険医療機関又は保険薬局から療養の給付に関する費用の請求があったときは、その費用の請求に関する審査及び支払に関する事務を社会保険診療報酬支払基金又は健康保険組合連合会に委託することができる。", "answer": false, "explanation": "法76条4項。委託先は「社会保険診療報酬支払基金」又は「国民健康保険団体連合会」であり、健保連は含まれない。[R5-3イ]", "year": "R5", "category": "療養の給付"}, {"id": 268, "question": "特定長期入院被保険者（療養病床に入院する65歳以上の被保険者）が、厚生労働省令で定めるところにより、保険医療機関等である病院又は診療所のうち自己の選定するものから、電子資格確認等により、被保険者であることの確認を受け、療養の給付と併せて受けた生活療養に要した費用について、入院時食事療養費を支給する。", "answer": false, "explanation": "法63条2項1号、法85条の2第1項。特定長期入院被保険者（65歳以上）の生活療養については、「入院時生活療養費」が支給される。[R5-9オ]", "year": "R5", "category": "入院時食事療養費"}, {"id": 269, "question": "入院時食事療養費の額は、当該食事療養につき食事療養に要する平均的な費用の額を勘案して厚生労働大臣が定める基準により算定した費用の額（その額が現に当該食事療養に要した費用の額を超えるときは、当該現に食事療養に要した費用の額）とする。", "answer": false, "explanation": "法85条2項。入院時食事療養費の額は、算定額から「食事療養標準負担額」を控除した額である。[R5-9イ]", "year": "R5", "category": "入院時食事療養費"}, {"id": 270, "question": "入院時生活療養費に係る生活療養の費用の額の算定に関する基準を定めようとするとき、厚生労働大臣は中央社会保険医療協議会に諮問するものとされている。", "answer": false, "explanation": "法85条の2第3項。生活療養の費用算定基準の策定に際しては、中央社会保険医療協議会の「意見を聴く」必要はあるが、「諮問」という用語は使われていない。[R元-4イ改]", "year": "R元", "category": "入院時生活療養費"}, {"id": 271, "question": "患者申出療養とは、高度の医療技術を用いた療養であって、当該療養を受けようとする者の申出に基づき、療養の給付の対象とすべきものであるか否かについて、適正な医療の効率的な提供を図る観点から評価を行うことが必要な療養として厚生労働大臣が定めるものをいい、被保険者が厚生労働省令で定めるところにより、保険医療機関等のうち、自己の選定するものから、電子資格確認等により、被保険者であることの確認を受け、患者申出療養を受けたときは、療養の給付の対象とはならず、その療養に要した費用について保険外併用療養費が支給される。", "answer": true, "explanation": "法63条2項4号、法86条1項。患者申出療養の定義及び、支給される給付の種類についての正しい記述である。[H28-3D改]", "year": "H28", "category": "保険外併用療養費"}, {"id": 272, "question": "患者申出療養の申出は、厚生労働大臣が定めるところにより、厚生労働大臣に対し、当該申出に係る療養を行う医療法第4条の3に規定する臨床研究中核病院（保険医療機関であるものに限る。）の開設者の意見書その他必要な書類を添えて行う。", "answer": true, "explanation": "法63条4項。患者申出療養の申出先（厚生労働大臣）及び、必要な書類（臨床研究中核病院の意見書等）に関する規定通りである。[R2-1C]", "year": "R2", "category": "保険外併用療養費"}, {"id": 273, "question": "被保険者が、厚生労働省令で定めるところにより、保険医療機関等のうち自己の選定するものから、電子資格確認等により、被保険者であることの確認を受け、評価療養、患者申出療養又は選定療養を受けたときは、その療養に要した費用について、保険外併用療養費を支給する。保険外併用療養費の支給対象となる先進医療の実施に当たっては、先進医療ごとに、保険医療機関が別に厚生労働大臣が定める施設基準に適合していることを地方厚生局長又は地方厚生支局長に届け出るものとされている。", "answer": true, "explanation": "法86条1項、平成28.3.4保医発0304第12号。保険外併用療養費の仕組み及び、先進医療の実施に係る届出手続きについての正しい記述である。[R元-3D改]", "year": "R元", "category": "保険外併用療養費"}, {"id": 274, "question": "食事療養に要した費用は、保険外併用療養費の支給の対象とはならない。", "answer": false, "explanation": "法86条2項2号。食事療養に要した費用も、保険外併用療養費の支給対象に含まれる。[R3-3B]", "year": "R3", "category": "保険外併用療養費"}, {"id": 275, "question": "被保険者が予約診察制をとっている病院で予約診察を受けた場合には、保険外併用療養費制度における選定療養の対象となり、その特別料金は、全額自己負担となる。", "answer": true, "explanation": "法63条2項5号、法86条1項、令和6.3.27厚労告122号。予約診察は選定療養に該当し、その加算分（特別料金）は保険給付の対象外として全額自己負担となる。[H28-7C]", "year": "H28", "category": "保険外併用療養費"}, {"id": 276, "question": "患者自己負担割合が3割である被保険者が保険医療機関で保険診療と選定療養を併せて受け、その療養に要した費用が、保険診療が30万円、選定療養が10万円であるときは、被保険者は保険診療の自己負担額と選定療養に要した費用を合わせて12万円を当該保険医療機関に支払う。", "answer": false, "explanation": "法86条2項。支払額は「保険診療分の3割（9万円）」と「選定療養費の全額（10万円）」を合わせた「19万円」となる。[R4-4D]", "year": "R4", "category": "保険外併用療養費"}, {"id": 277, "question": "被保険者が病床数200床以上の病院で、他の病院や診療所の文書による紹介なしに初診を受け、保険外併用療養費の選定療養として特別の費用を徴収する場合、当該病院は同時に2以上の傷病について初診を行ったときはそれぞれの傷病について特別の料金を徴収することができる。", "answer": false, "explanation": "法63条2項5号、令和6.3.27厚労告122号、平成26.11.25保医発1125第9号。同時に複数の傷病を初診した場合であっても、選定療養としての特別料金の徴収は1回に限られる。[H27-3B]", "year": "H27", "category": "保険外併用療養費"}, {"id": 278, "question"
